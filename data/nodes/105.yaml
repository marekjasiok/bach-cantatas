wiki:
  summary: "Herr, gehe nicht ins Gericht mit deinem Knecht, BWV\_105 is a church cantata by Johann Sebastian Bach. He composed it in Leipzig for the ninth Sunday after Trinity and first performed it on 25 July 1723. The musicologist Alfred Dürr has described the cantata as one of \"the most sublime descriptions of the soul in baroque and Christian art\"."
  image: >-
    https://upload.wikimedia.org/wikipedia/commons/thumb/4/41/Thomaskirche_und_-schule_1723.jpg/330px-Thomaskirche_und_-schule_1723.jpg
  url: https://en.wikipedia.org/wiki/Herr%2C_gehe_nicht_ins_Gericht_mit_deinem_Knecht%2C_BWV_105
  summary_html: "<p><b><span><i lang=\"de\">Herr, gehe nicht ins Gericht mit deinem Knecht</i></span></b>, <b><span><abbr>BWV</abbr></span><span class=\"nowrap\">\_</span>105</b> is a church cantata by Johann Sebastian Bach. He composed it in Leipzig for the ninth Sunday after Trinity and first performed it on 25 July 1723. The musicologist Alfred Dürr has described the cantata as one of \"the most sublime descriptions of the soul in baroque and Christian art\".</p>"
