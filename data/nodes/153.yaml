wiki:
  summary: >-
    Schau, lieber Gott, wie meine Feind, BWV 153, is a church cantata by Johann Sebastian Bach. He composed it in
    Leipzig for the Sunday after New Year's Day and first performed it on 2 January 1724.
  image: >-
    https://upload.wikimedia.org/wikipedia/commons/thumb/f/fa/Rembrandt_Harmensz._van_Rijn_052.jpg/330px-Rembrandt_Harmensz._van_Rijn_052.jpg
  url: https://en.wikipedia.org/wiki/Schau%2C_lieber_Gott%2C_wie_meine_Feind%2C_BWV_153
  summary_html: >-
    <p><b><span><i lang="de">Schau, lieber Gott, wie meine Feind</i></span></b>, <span class="nowrap">BWV 153</span>, is
    a church cantata by Johann Sebastian Bach. He composed it in Leipzig for the Sunday after New Year's Day and first
    performed it on 2 January 1724.</p>
