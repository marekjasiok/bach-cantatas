wiki:
  summary: "Herz und Mund und Tat und Leben, BWV\_147.1, BWV 147a, is a cantata by Johann Sebastian Bach. He composed it in Weimar in 1716 for the fourth Sunday in Advent, 20 December. It is uncertain if the work was performed then. He later expanded the work in 1723 as Herz und Mund und Tat und Leben, BWV 147."
  image: >-
    https://upload.wikimedia.org/wikipedia/commons/thumb/2/24/Schlosskirche_Weimar_1660.jpg/330px-Schlosskirche_Weimar_1660.jpg
  url: https://en.wikipedia.org/wiki/Herz_und_Mund_und_Tat_und_Leben%2C_BWV_147a
  summary_html: "<p><i><b><span><i lang=\"de\">Herz und Mund und Tat und Leben</i></span></b></i>, BWV\_147.1, <b><span class=\"nowrap\">BWV 147a</span></b>, is a cantata by Johann Sebastian Bach. He composed it in Weimar in 1716 for the fourth Sunday in Advent, 20 December. It is uncertain if the work was performed then. He later expanded the work in 1723 as <span><i>Herz und Mund und Tat und Leben</i>, BWV 147</span>.</p>"
