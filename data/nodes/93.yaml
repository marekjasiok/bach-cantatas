wiki:
  summary: "Johann Sebastian Bach composed the church cantata Wer nur den lieben Gott läßt walten, BWV\_93, in Leipzig for the fifth Sunday after Trinity and first performed it on 9 July 1724. It is part of his chorale cantata cycle, the second cantata cycle he started after being appointed Thomaskantor in 1723."
  image: >-
    https://upload.wikimedia.org/wikipedia/commons/thumb/c/ca/Georg_Neumark_%28144355593%29.jpg/330px-Georg_Neumark_%28144355593%29.jpg
  url: https://en.wikipedia.org/wiki/Wer_nur_den_lieben_Gott_l%C3%A4%C3%9Ft_walten%2C_BWV_93
  summary_html: "<p>Johann Sebastian Bach composed the church cantata <b><span><i lang=\"de\">Wer nur den lieben Gott läßt walten</i></span></b>, <b><abbr>BWV</abbr><span class=\"nowrap\">\_</span>93</b>, in Leipzig for the fifth Sunday after Trinity and first performed it on 9 July 1724. It is part of his chorale cantata cycle, the second cantata cycle he started after being appointed Thomaskantor in 1723.</p>"
