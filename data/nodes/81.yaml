    https://upload.wikimedia.org/wikipedia/commons/thumb/f/f3/Rembrandt_Christ_in_the_Storm_on_the_Lake_of_Galilee.jpg/330px-Rembrandt_Christ_in_the_Storm_on_the_Lake_of_Galilee.jpg
  url: https://en.wikipedia.org/wiki/Jesus_schl%C3%A4ft%2C_was_soll_ich_hoffen%3F_BWV_81
  summary_html: "<p><b><span><i lang=\"de\">Jesus schläft, was soll ich hoffen?</i></span></b>, <b><abbr>BWV</abbr><span class=\"nowrap\">\_</span>81</b>, is a church cantata by Johann Sebastian Bach. He composed it in 1724 in Leipzig for the fourth Sunday after Epiphany and first performed it on 30 January 1724.</p>"
