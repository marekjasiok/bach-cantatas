wiki:
  summary: "Jesus schläft, was soll ich hoffen?, BWV\_81, is a church cantata by Johann Sebastian Bach. He composed it in 1724 in Leipzig for the fourth Sunday after Epiphany and first performed it on 30 January 1724."
