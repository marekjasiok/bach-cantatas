wiki:
  summary: "Johann Sebastian Bach composed the church cantata Gott soll allein mein Herze haben, BWV\_169, a solo cantata for an alto soloist, in Leipzig for the 18th Sunday after Trinity, and first performed it on 20 October 1726."
  image: https://upload.wikimedia.org/wikipedia/commons/thumb/0/0d/Thomaskirche-1885.png/330px-Thomaskirche-1885.png
  url: https://en.wikipedia.org/wiki/Gott_soll_allein_mein_Herze_haben%2C_BWV_169
  summary_html: "<p>Johann Sebastian Bach composed the church cantata <b><span><i lang=\"de\">Gott soll allein mein Herze haben</i></span></b>, <b><abbr>BWV</abbr><span class=\"nowrap\">\_</span>169</b>, a solo cantata for an alto soloist, in Leipzig for the 18th Sunday after Trinity, and first performed it on 20 October 1726.</p>"
