  summary_html: "<p><b><span><i lang=\"de\">Wahrlich, wahrlich, ich sage euch</i></span></b>, <b><abbr>BWV</abbr><span class=\"nowrap\">\_</span>86</b>, is a church cantata by Johann Sebastian Bach. He composed it in Leipzig for Rogate, the fifth Sunday after Easter, and first performed it on 14 May 1724.</p>"
