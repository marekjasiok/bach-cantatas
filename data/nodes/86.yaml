bwv: '86'
title: Wahrlich, wahrlich, ich sage euch
cycle: C1
occasion: Rogate
date: '1724-05-14'
url: https://en.wikipedia.org/wiki/BWV_86
edges: {}
movements:
  - num: 1
    type: Aria
    voices: B
    instruments: Violino I/II, Viola, Continuo
    de: |-
      Wahrlich, wahrlich, ich sage euch,
      so ihr den Vater etwas bitten werdet in meinem Namen, so wird er's
      euch geben.
  - num: 2
    type: Aria
    voices: A
    instruments: Violino solo, Continuo
    de: |-
      Ich will doch wohl Rosen brechen,
      Wenn mich gleich die Dornen stechen.
      Denn ich bin der Zuversicht,
      Dass mein Bitten und mein Flehen
      Gott gewiss zu Herzen gehen,
      weil es mir sein Wort verspricht.
  - num: 3
    type: Chorale
    voices: S
    instruments: Oboe d'amore I/II, Continuo
    de: |-
      Und was der ewig gültig Gott
      In seinem Wort versprochen hat,
      Geschworn bei seinem Namen,
      Das hält und gibt er gwiß fürwahr.
      Der helf uns zu der Engel Schar
      Durch Jesum Christum, amen.
  - num: 4
    type: Recitative
    voices: T
    instruments: Continuo
    de: |-
      Gott macht es nicht gleichwie die Welt,
      Die viel verspricht und wenig hält;
      Denn was er zusagt, muss geschehen,
      Dass man daran kann seine Lust und Freude sehen.
  - num: 5
    type: Aria
    voices: T
    instruments: Violino I/II, Viola, Continuo
    de: |-
      Gott hilft gewiss;
      Wird gleich die Hilfe aufgeschoben,
      Wird sie doch drum nicht aufgehoben.
      Denn Gottes Wort bezeiget dies:
      Gott hilft gewiss!
  - num: 6
    type: Chorale
    voices: SATB
    instruments: Instrumentierung nicht überliefert
    de: |-
      Die Hoffnung wart' der rechten Zeit,
      Was Gottes Wort zusaget,
      Wenn das geschehen soll zur Freud,
      Setzt Gott kein g'wisse Tage.
      Er weiß wohl, wenn's am besten ist,
      Und braucht an uns kein arge List;
      Des solln wir ihm vertrauen.
