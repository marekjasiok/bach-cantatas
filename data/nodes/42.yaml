wiki:
  summary: "Am Abend aber desselbigen Sabbats, BWV\_42, is a church cantata by Johann Sebastian Bach. He composed it in Leipzig for the first Sunday after Easter and first performed it on 8 April 1725. The cantata is part of Bach's second cantata cycle during his tenure as Thomaskantor that began in 1723. It is the only cantata of that cycle to begin with a sinfonia."
