    https://upload.wikimedia.org/wikipedia/commons/thumb/6/6c/Der_ungl%C3%A4ubige_Thomas_-_Michelangelo_Merisi%2C_named_Caravaggio.jpg/330px-Der_ungl%C3%A4ubige_Thomas_-_Michelangelo_Merisi%2C_named_Caravaggio.jpg
  url: https://en.wikipedia.org/wiki/Am_Abend_aber_desselbigen_Sabbats%2C_BWV_42
  summary_html: "<p><b><span><i lang=\"de\">Am Abend aber desselbigen Sabbats</i></span></b>, <b><abbr>BWV</abbr><span class=\"nowrap\">\_</span>42</b>, is a church cantata by Johann Sebastian Bach. He composed it in Leipzig for the first Sunday after Easter and first performed it on 8 April 1725. The cantata is part of Bach's second cantata cycle during his tenure as Thomaskantor that began in 1723. It is the only cantata of that cycle to begin with a sinfonia.</p>"
