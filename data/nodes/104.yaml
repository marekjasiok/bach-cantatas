wiki:
  summary: "Du Hirte Israel, höre, BWV\_104, is a church cantata by Johann Sebastian Bach for the second Sunday after Easter. Bach composed the work as part of his first cantata cycle for Leipzig and first performed it on 23 April 1724."
  image: https://upload.wikimedia.org/wikipedia/commons/thumb/1/1f/Champaigne_shepherd.jpg/330px-Champaigne_shepherd.jpg
  url: https://en.wikipedia.org/wiki/Du_Hirte_Israel%2C_h%C3%B6re%2C_BWV_104
  summary_html: "<p><b><span><i lang=\"de\">Du Hirte Israel, höre</i></span></b>, <span><abbr>BWV</abbr></span><span class=\"nowrap\">\_</span>104, is a church cantata by Johann Sebastian Bach for the second Sunday after Easter. Bach composed the work as part of his first cantata cycle for Leipzig and first performed it on 23 April 1724.</p>"
