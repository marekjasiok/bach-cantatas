wiki:
  summary: "The Easter Oratorio, BWV\_249, is an oratorio by Johann Sebastian Bach. He wrote an autograph score in Leipzig in 1738 under this title, matching his Christmas Oratorio and Ascension Oratorio. Bach had already composed the work in 1725, when he used most of its music for two compositions, the congratulatory Shepherd Cantata, BWV 249a, and a church cantata for Easter Sunday, Kommt, gehet und eilet, BWV 249.3, that later became the oratorio. The two 1725 works, premiered a few weeks apart, are both musical dramas involving characters: in the secular cantata two shepherds and two shepherdesses, and in the Easter cantata four Biblical figures from the Easter narratives in the Gospel of Luke and other Evangelists. In the oratorio, Bach assigned the music to voice parts instead."
  image: >-
    https://upload.wikimedia.org/wikipedia/commons/thumb/7/7a/Title_page_of_1738_autograph_of_Easter_Oratorio_BWV_249_by_J.S._Bach.jpg/330px-Title_page_of_1738_autograph_of_Easter_Oratorio_BWV_249_by_J.S._Bach.jpg
  url: https://en.wikipedia.org/wiki/Easter_Oratorio
  summary_html: "<p>The <i><b>Easter Oratorio</b></i>, <b><abbr>BWV</abbr><span class=\"nowrap\">\_</span>249</b>, is an oratorio by Johann Sebastian Bach. He wrote an autograph score in Leipzig in 1738 under this title, matching his <i>Christmas Oratorio</i> and <i>Ascension Oratorio</i>. Bach had already composed the work in 1725, when he used most of its music for two compositions, the congratulatory <i>Shepherd Cantata</i>, BWV 249a, and a church cantata for Easter Sunday, <b><span><i lang=\"de\">Kommt, gehet und eilet</i></span></b>, BWV 249.3, that later became the oratorio. The two 1725 works, premiered a few weeks apart, are both musical dramas involving characters: in the secular cantata two shepherds and two shepherdesses, and in the Easter cantata four Biblical figures from the Easter narratives in the Gospel of Luke and other Evangelists. In the oratorio, Bach assigned the music to voice parts instead.</p>"
