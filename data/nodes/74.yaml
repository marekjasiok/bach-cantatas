  summary_html: "<p><b><span><i lang=\"de\">Wer mich liebet, der wird mein Wort halten</i></span></b>, <b>BWV<span class=\"nowrap\">\_</span>74</b>, is a church cantata by Johann Sebastian Bach. He composed it in Leipzig for Pentecost and first performed it on 20 May 1725.</p>"
