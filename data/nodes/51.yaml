wiki:
  summary: "Johann Sebastian Bach composed the church cantata Jauchzet Gott in allen Landen BWV\_51, in Leipzig. The work is Bach's only church cantata scored for a solo soprano and trumpet. He composed it for general use, in other words not for a particular date in the church calendar, although he used it for the 15th Sunday after Trinity: the first known performance was on 17 September 1730 in Leipzig. The work may have been composed earlier, possibly for an occasion at the court of Christian, Duke of Saxe-Weissenfels, for whom Bach had composed the Hunting Cantata and the Shepherd Cantata."
  image: https://upload.wikimedia.org/wikipedia/commons/thumb/b/bf/Gottfried_reiche.jpg/330px-Gottfried_reiche.jpg
  url: https://en.wikipedia.org/wiki/Jauchzet_Gott_in_allen_Landen%2C_BWV_51
  summary_html: "<p>Johann Sebastian Bach composed the church cantata <b><span><i lang=\"de\">Jauchzet Gott in allen Landen</i></span></b> <b><abbr>BWV</abbr><span class=\"nowrap\">\_</span>51</b>, in Leipzig. The work is Bach's only church cantata scored for a solo soprano and trumpet. He composed it for general use, in other words not for a particular date in the church calendar, although he used it for the 15th Sunday after Trinity: the first known performance was on 17 September 1730 in Leipzig. The work may have been composed earlier, possibly for an occasion at the court of Christian, Duke of Saxe-Weissenfels, for whom Bach had composed the <i>Hunting Cantata</i> and the <i>Shepherd Cantata</i>.</p>"
