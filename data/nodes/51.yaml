bwv: '51'
title: Jauchzet Gott in allen Landen
cycle: LATE
occasion: Trinity XV
date: '1730'
url: https://en.wikipedia.org/wiki/BWV_51
edges: {}
movements:
  - num: 1
    type: Aria
    voices: S
    instruments: Tromba, Violino I/II, Viola, Continuo
    de: |-
      Jauchzet Gott in allen Landen!
      Was der Himmel und die Welt
      An Geschöpfen in sich hält,
      Müssen dessen Ruhm erhöhen,
      Und wir wollen unserm Gott
      Gleichfalls itzt ein Opfer bringen,
      Dass er uns in Kreuz und Not
      Allezeit hat beigestanden.
  - num: 2
    type: Recitative
    voices: S
    instruments: Violino I/II, Viola, Continuo
    de: |-
      Wir beten zu dem Tempel an,
      Da Gottes Ehre wohnet,
      Da dessen Treu,
      So täglich neu,
      Mit lauter Segen lohnet.
      Wir preisen, was er an uns hat getan.
      Muss gleich der schwache Mund von seinen Wundern lallen,
      So kann ein schlechtes Lob ihm dennoch wohlgefallen.
  - num: 3
    type: Aria
    voices: S
    instruments: Continuo
    de: |-
      Höchster, mache deine Güte
      Ferner alle Morgen neu.
      So soll vor die Vatertreu
      Auch ein dankbares Gemüte
      Durch ein frommes Leben weisen,
      Dass wir deine Kinder heißen.
  - num: 4
    type: Chorale
    voices: S
    instruments: Violino I/II, Continuo
    de: |-
      Sei Lob und Preis mit Ehren
      Gott Vater, Sohn, Heiligem Geist!
      Der woll in uns vermehren,
      Was er uns aus Gnaden verheißt,
      Dass wir ihm fest vertrauen,
      Gänzlich uns lass'n auf ihn,
      Von Herzen auf ihn bauen,
      Dass uns'r Herz, Mut und Sinn
      Ihm festiglich anhangen;
      Drauf singen wir zur Stund:
      Amen, wir werdn's erlangen,
      Glaub'n wir aus Herzensgrund.
  - num: 5
    type: Aria
    voices: S
    instruments: Tromba, Violino I/II, Viola, Continuo
    de: Alleluja!
