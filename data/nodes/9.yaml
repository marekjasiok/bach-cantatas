wiki:
  summary: "Johann Sebastian Bach composed the church cantata Es ist das Heil uns kommen her, BWV\_9 in Leipzig for the sixth Sunday after Trinity and first performed it on 1 August 1734. It is a chorale cantata, based on the hymn \"Es ist das Heil uns kommen her\" by Paul Speratus. Bach composed the cantata to fill a gap in his chorale cantata cycle written for performances in Leipzig from 1724."
  image: https://upload.wikimedia.org/wikipedia/commons/thumb/9/9e/Paul_Speratus.jpg/330px-Paul_Speratus.jpg
  url: https://en.wikipedia.org/wiki/Es_ist_das_Heil_uns_kommen_her%2C_BWV_9
  summary_html: "<p>Johann Sebastian Bach composed the church cantata <b><span><i lang=\"de\">Es ist das Heil uns kommen her</i></span></b>, <b><abbr>BWV</abbr><span class=\"nowrap\">\_</span>9</b> in Leipzig for the sixth Sunday after Trinity and first performed it on 1 August 1734. It is a chorale cantata, based on the hymn \"<span><span style=\"font-style:normal\">Es ist das Heil uns kommen her</span></span>\" by Paul Speratus. Bach composed the cantata to fill a gap in his chorale cantata cycle written for performances in Leipzig from 1724.</p>"
