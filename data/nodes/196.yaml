wiki:
  summary: >-
    Der Herr denket an uns, BWV 196, is a cantata by Johann Sebastian Bach. The early church cantata, possibly for a
    wedding, is difficult to date, but is generally considered to be an early work on stylistic grounds. The text is a
    passage from Psalm 115, assuring of God's blessing, especially for children. Scholars have suggested the work may
    have been written for the wedding of Johann Lorenz Stauber, the minister in Dornheim who had married Bach and his
    first wife there in 1707, and Regina Wedemann, an aunt of Bach's wife, on 5 June 1708.
  image: https://upload.wikimedia.org/wikipedia/commons/thumb/f/f5/Kirche_Dornheim.JPG/330px-Kirche_Dornheim.JPG
  url: https://en.wikipedia.org/wiki/Der_Herr_denket_an_uns%2C_BWV_196
  summary_html: >-
    <p><i><b><span><i lang="de">Der Herr denket an uns</i></span></b></i>, <b><span class="nowrap">BWV 196</span></b>,
    is a cantata by Johann Sebastian Bach. The early church cantata, possibly for a wedding, is difficult to date, but
    is generally considered to be an early work on stylistic grounds. The text is a passage from Psalm 115, assuring of
    God's blessing, especially for children. Scholars have suggested the work may have been written for the wedding of
    Johann Lorenz Stauber, the minister in Dornheim who had married Bach and his first wife there in 1707, and Regina
    Wedemann, an aunt of Bach's wife, on 5 June 1708.</p>
