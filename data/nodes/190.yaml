wiki:
  summary: >-
    Singet dem Herrn ein neues Lied, BWV 190, is a church cantata by Johann Sebastian Bach. He wrote it in Leipzig for
    the New Year's Day and first performed it on 1 January 1724 as part of his first cantata cycle. He adapted it in
    1730 to Singet dem Herrn ein neues Lied, BWV 190a, for the celebration of the bicentennial of the Augsburg
    Confession.
  image: https://upload.wikimedia.org/wikipedia/commons/thumb/6/6c/Thomaskirche_Interior.jpg/330px-Thomaskirche_Interior.jpg
  url: https://en.wikipedia.org/wiki/Singet_dem_Herrn_ein_neues_Lied%2C_BWV_190
  summary_html: >-
    <p><b><span><i lang="de">Singet dem Herrn ein neues Lied</i></span></b>, <b><span class="nowrap">BWV 190</span></b>,
    is a church cantata by Johann Sebastian Bach. He wrote it in Leipzig for the New Year's Day and first performed it
    on 1 January 1724 as part of his first cantata cycle. He adapted it in 1730 to <span><span><span><i>Singet dem Herrn
    ein neues Lied</i>, BWV 190a</span></span></span>, for the celebration of the bicentennial of the Augsburg
    Confession.</p>
