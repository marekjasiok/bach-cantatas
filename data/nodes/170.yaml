  summary_html: "<p>Johann Sebastian Bach composed <b><span><i lang=\"de\">Vergnügte Ruh, beliebte Seelenlust</i></span></b>, <b><abbr>BWV</abbr><span class=\"nowrap\">\_</span>170</b>, a church cantata for the sixth Sunday after Trinity in Leipzig. It is a solo cantata for alto that he first performed on 28 July 1726.</p>"
