wiki:
  summary: "Johann Sebastian Bach composed Vergnügte Ruh, beliebte Seelenlust, BWV\_170, a church cantata for the sixth Sunday after Trinity in Leipzig. It is a solo cantata for alto that he first performed on 28 July 1726."
