bwv: '170'
title: Vergnügte Ruh, beliebte Seelenlust
cycle: C3
occasion: Trinity VI
date: '1726-07-28'
url: https://en.wikipedia.org/wiki/BWV_170
edges: {}
movements:
  - num: 1
    type: Aria
    voices: A
    instruments: Oboe d'amore, Violino I/II, Viola, Continuo
    de: |-
      Vergnügte Ruh, beliebte Seelenlust,
      Dich kann man nicht bei Höllensünden,
      Wohl aber Himmelseintracht finden;
      Du stärkst allein die schwache Brust.
      Drum sollen lauter Tugendgaben
      In meinem Herzen Wohnung haben.
  - num: 2
    type: Recitative
    voices: A
    instruments: Continuo
    de: |-
      Die Welt, das Sündenhaus,
      Bricht nur in Höllenlieder aus
      Und sucht durch Hass und Neid
      Des Satans Bild an sich zu tragen.
      Ihr Mund ist voller Ottergift,
      Der oft die Unschuld tödlich trifft,
      Und will allein von Racha sagen.
      Gerechter Gott, wie weit
      Ist doch der Mensch von dir entfernet;
      Du liebst, jedoch sein Mund
      Macht Fluch und Feindschaft kund
      Und will den Nächsten nur mit Füßen treten.
      Ach! diese Schuld ist schwerlich zu verbeten.
  - num: 3
    type: Aria
    voices: A
    instruments: Organo obligato a 2 claviature, Violino I/II, Viola
    de: |-
      Wie jammern mich doch die verkehrten Herzen,
      Die dir, mein Gott, so sehr zuwider sein;
      Ich zittre recht und fühle tausend Schmerzen,
      Wenn sie sich nur an Rach und Hass erfreun.
      Gerechter Gott, was magst du doch gedenken,
      Wenn sie allein mit rechten Satansränken
      Dein scharfes Strafgebot so frech verlacht.
      Ach! ohne Zweifel hast du so gedacht:
      Wie jammern mich doch die verkehrten Herzen!
  - num: 4
    type: Recitative
    voices: A
    instruments: Violino I/II, Viola, Continuo
    de: |-
      Wer sollte sich demnach
      Wohl hier zu leben wünschen,
      Wenn man nur Hass und Ungemach
      Vor seine Liebe sieht?
      Doch, weil ich auch den Feind
      Wie meinen besten Freund
      Nach Gottes Vorschrift lieben soll,
      So flieht
      Mein Herze Zorn und Groll
      Und wünscht allein bei Gott zu leben,
      Der selbst die Liebe heißt.
      Ach, eintrachtsvoller Geist,
      Wenn wird er dir doch nur sein Himmelszion geben?
  - num: 5
    type: Aria
    voices: A
    instruments: Organo obligato, Oboe d'amore, Violino I/II, Viola, Continuo
    de: |-
      Mir ekelt mehr zu leben,
      Drum nimm mich, Jesu, hin!
      Mir graut vor allen Sünden,
      Lass mich dies Wohnhaus finden,
      Wo selbst ich ruhig bin.
