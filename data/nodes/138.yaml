wiki:
  summary: "Johann Sebastian Bach composed the church cantata Warum betrübst du dich, mein Herz, BWV\_138, in Leipzig for the 15th Sunday after Trinity and first performed it on 5 September 1723. The text by an unknown author includes three stanzas from the hymn of the same name. Its text and melody were formerly attributed to Hans Sachs, but were written by an unknown hymn writer. The cantata has seven movements and is scored for SATB soloists and choir, two oboes d'amore, two violins, viola and basso continuo. The cantata has features of a chorale cantata although it was written a year before Bach's annual cycle of chorale cantatas. Bach used an aria as the base of the Gratias of his Missa in G major."
  image: https://upload.wikimedia.org/wikipedia/commons/thumb/0/0d/Thomaskirche-1885.png/330px-Thomaskirche-1885.png
  url: https://en.wikipedia.org/wiki/Warum_betr%C3%BCbst_du_dich%2C_mein_Herz%2C_BWV_138
  summary_html: "<p>Johann Sebastian Bach composed the church cantata <i><b><span><i lang=\"de\">Warum betrübst du dich, mein Herz</i></span></b></i>, <b><abbr>BWV</abbr><span class=\"nowrap\">\_</span>138</b>, in Leipzig for the 15th Sunday after Trinity and first performed it on 5 September 1723. The text by an unknown author includes three stanzas from the hymn of the same name. Its text and melody were formerly attributed to Hans Sachs, but were written by an unknown hymn writer. The cantata has seven movements and is scored for SATB soloists and choir, two oboes d'amore, two violins, viola and basso continuo. The cantata has features of a chorale cantata although it was written a year before Bach's annual cycle of chorale cantatas. Bach used an aria as the base of the <i><span><i lang=\"de\">Gratias</i></span></i> of his Missa in G major.</p>"
