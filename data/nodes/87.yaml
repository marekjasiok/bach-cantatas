  summary_html: >-
    <p><b><span><i lang="de">Bisher habt ihr nichts gebeten in meinem Namen</i></span></b>, <b><span class="nowrap">BWV
    87</span></b>, is a church cantata by Johann Sebastian Bach. He composed it in Leipzig for Rogate, the fifth Sunday
    after Easter, and first performed it on 6 May 1725.</p>
