bwv: '87'
title: Bisher habt ihr nichts gebeten...
cycle: C2
occasion: Rogate
date: '1725-05-06'
url: https://en.wikipedia.org/wiki/BWV_87
edges: {}
movements:
  - num: 1
    type: Aria
    voices: B
    instruments: Oboe I/II, Oboe da caccia, Violino I/II, Viola, Continuo
    de: Bisher habt ihr nichts gebeten in meinem Namen.
  - num: 2
    type: Recitative
    voices: A
    instruments: Continuo
    de: |-
      O Wort, das Geist und Seel erschreckt!
      Ihr Menschen, merkt den Zuruf, was dahinter steckt!
      Ihr habt Gesetz und Evangelium vorsätzlich übertreten;
      Und dies möcht' ihr ungesäumt in Buß und Andacht beten.
  - num: 3
    type: Aria
    voices: A
    instruments: Oboe da caccia I/II, Continuo
    de: |-
      Vergib, o Vater, unsre Schuld
      Und habe noch mit uns Geduld,
      Wenn wir in Andacht beten
      Und sagen: Herr, auf dein Geheiß,
      Ach, rede nicht mehr sprichwortsweis,
      Hilf uns vielmehr vertreten.
  - num: 4
    type: Recitative
    voices: T
    instruments: Violino I/II, Viola, Continuo
    de: |-
      Wenn unsre Schuld bis an den Himmel steigt,
      Du siehst und kennest ja mein Herz, das nichts vor dir verschweigt;
      Drum suche mich zu trösten!
  - num: 5
    type: Aria
    voices: B
    instruments: Continuo
    de: |-
      In der Welt habt ihr Angst;
      aber seid getrost, ich habe die Welt überwunden.
  - num: 6
    type: Aria
    voices: T
    instruments: Violino I/II, Viola, Continuo
    de: |-
      Ich will leiden, ich will schweigen,
      Jesus wird mir Hilf erzeigen,
      Denn er tröst' mich nach dem Schmerz.
      Weicht, ihr Sorgen, Trauer, Klagen,
      Denn warum sollt ich verzagen?
      Fasse dich betrübtes Herz!
  - num: 7
    type: Chorale
    voices: SATB
    instruments: >-
      Oboe I e Violino I col Soprano, Oboe da caccia I e Violino II coll' Alto, Oboe da caccia II e Viola col Tenore,
      Continuo
    de: |-
      Muss ich sein betrübet?
      So mich Jesus liebet,
      Ist mir aller Schmerz
      Über Honig süße,
      Tausend Zuckerküsse
      Drücket er ans Herz.
      Wenn die Pein sich stellet ein,
      Seine Liebe macht zur Freuden
      Auch das bittre Leiden.
