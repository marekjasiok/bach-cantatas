  url: https://en.wikipedia.org/wiki/Erh%C3%B6htes_Fleisch_und_Blut%2C_BWV_173
  summary_html: "<p><b><span><i lang=\"de\">Erhöhtes Fleisch und Blut</i></span></b>, <b><abbr>BWV</abbr><span class=\"nowrap\">\_</span>173</b>, is a church cantata by Johann Sebastian Bach. He composed it in Leipzig for Pentecost Monday and probably first performed it on 29 May 1724.</p>"
