wiki:
  summary: "The St Matthew Passion, BWV\_244, is a Passion, a sacred oratorio written by Johann Sebastian Bach in 1727 for solo voices, double choir and double orchestra, with libretto in German by Picander. It sets the 26th and 27th chapters of the Gospel of Matthew to music, with interspersed chorales and arias. It is widely regarded as one of the masterpieces of Baroque sacred music. The original Latin title Passio Domini nostri J.C. secundum Evangelistam Matthæum translates to \"The Passion of our Lord Jesus Christ according to the Evangelist Matthew\"."
  image: https://upload.wikimedia.org/wikipedia/commons/thumb/f/f8/BWV_244_Titelblatt.svg/330px-BWV_244_Titelblatt.svg.png
  url: https://en.wikipedia.org/wiki/St_Matthew_Passion
  summary_html: "<p>The <i><b>St Matthew Passion</b></i>, BWV\_244, is a <i>Passion</i>, a sacred oratorio written by Johann Sebastian Bach in 1727 for solo voices, double choir and double orchestra, with libretto in German by Picander. It sets the 26th and 27th chapters of the Gospel of Matthew to music, with interspersed chorales and arias. It is widely regarded as one of the masterpieces of Baroque sacred music. The original Latin title <b><span><i lang=\"la\">Passio Domini nostri J.C. secundum Evangelistam Matthæum</i></span></b> translates to \"The Passion of our Lord Jesus Christ according to the Evangelist Matthew\".</p>"
