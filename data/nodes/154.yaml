wiki:
  summary: >-
    Mein liebster Jesus ist verloren, BWV 154, is a church cantata by Johann Sebastian Bach. He composed it for the
    first Sunday after Epiphany and first performed it in Leipzig on 9 January 1724.
  image: https://upload.wikimedia.org/wikipedia/commons/thumb/0/0d/Thomaskirche-1885.png/330px-Thomaskirche-1885.png
  url: https://en.wikipedia.org/wiki/Mein_liebster_Jesus_ist_verloren%2C_BWV_154
  summary_html: >-
    <p><b><span><i lang="de">Mein liebster Jesus ist verloren</i></span></b>, <b><span class="nowrap">BWV
    154</span></b>, is a church cantata by Johann Sebastian Bach. He composed it for the first Sunday after Epiphany and
    first performed it in Leipzig on 9 January 1724.</p>
