bwv: '26'
title: Ach wie flüchtig, ach wie nichtig
cycle: C2
occasion: Trinity XXIV
date: '1724-11-19'
url: https://en.wikipedia.org/wiki/BWV_26
edges: {}
movements:
  - num: 1
    type: Chorus
    voices: SATB
    instruments: Violino I/II, Viola, Corno col Soprano, Flauto traverso, Oboe I-III, Organo, Continuo
    de: |-
      Ach wie flüchtig, ach wie nichtig
      Ist der Menschen Leben!
      Wie ein Nebel bald entstehet
      Und auch wieder bald vergehet,
      So ist unser Leben, sehet!
  - num: 2
    type: Aria
    voices: T
    instruments: Flauto traverso solo, Violino solo, Continuo
    de: |-
      So schnell ein rauschend Wasser schießt,
      So eilen unser Lebenstage.
      Die Zeit vergeht, die Stunden eilen,
      Wie sich die Tropfen plötzlich teilen,
      Wenn alles in den Abgrund schießt.
  - num: 3
    type: Recitative
    voices: A
    instruments: Organo, Continuo
    de: |-
      Die Freude wird zur Traurigkeit,
      Die Schönheit fällt als eine Blume,
      Die größte Stärke wird geschwächt,
      Es ändert sich das Glücke mit der Zeit,
      Bald ist es aus mit Ehr und Ruhme,
      Die Wissenschaft und was ein Mensche dichtet,
      Wird endlich durch das Grab vernichtet.
  - num: 4
    type: Aria
    voices: B
    instruments: Oboe I-III, Organo, Continuo
    de: |-
      An irdische Schätze das Herze zu hängen,
      Ist eine Verführung der törichten Welt.
      Wie leichtlich entstehen verzehrende Gluten,
      Wie rauschen und reißen die wallenden Fluten,
      Bis alles zerschmettert in Trümmern zerfällt.
  - num: 5
    type: Recitative
    voices: S
    instruments: Organo, Continuo
    de: |-
      Die höchste Herrlichkeit und Pracht
      Umhüllt zuletzt des Todes Nacht.
      Wer gleichsam als ein Gott gesessen,
      Entgeht dem Staub und Asche nicht,
      Und wenn die letzte Stunde schläget,
      Dass man ihn zu der Erde träget,
      Und seiner Hoheit Grund zerbricht,
      Wird seiner ganz vergessen.
  - num: 6
    type: Chorale
    voices: SATB
    instruments: >-
      Corno e Flauto traverso e Oboe I/II e Violino I col Soprano, Oboe III e Violino II coll' Alto, Viola col Tenore,
      Organo, Continuo
    de: |-
      Ach wie flüchtig, ach wie nichtig
      Sind der Menschen Sachen!
      Alles, alles, was wir sehen,
      Das muss fallen und vergehen.
      Wer Gott fürcht', bleibt ewig stehen.
scoring: 'Soli: S A T B, Coro: S A T B, Corno, Flauto traverso, Oboe I-III, Violino solo, Violino I/II, Viola, Organo, Continuo'
