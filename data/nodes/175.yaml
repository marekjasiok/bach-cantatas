  summary_html: "<p><b><span><i lang=\"de\">Er rufet seinen Schafen mit Namen</i></span></b>, <b><abbr>BWV</abbr><span class=\"nowrap\">\_</span>175</b>, is a church cantata by Johann Sebastian Bach. He composed the cantata in Leipzig for the third day of Pentecost and first performed it on 22 May 1725.</p>"
