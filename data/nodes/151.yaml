wiki:
  summary: "Süßer Trost, mein Jesus kömmt, BWV\_151, is a church cantata by Johann Sebastian Bach. He composed it in Leipzig for the third day of Christmas, in a cycle of works for the Christmas season mainly to texts by Georg Christian Lehms; he first performed it on 27 December 1725."
  image: >-
    https://upload.wikimedia.org/wikipedia/commons/thumb/b/bb/Galante_Poetinnen_0001.png/330px-Galante_Poetinnen_0001.png
  url: https://en.wikipedia.org/wiki/S%C3%BC%C3%9Fer_Trost%2C_mein_Jesus_k%C3%B6mmt%2C_BWV_151
  summary_html: "<p><b><span><i lang=\"de\">Süßer Trost, mein Jesus kömmt</i></span></b>, <b><span><abbr>BWV</abbr></span><span class=\"nowrap\">\_</span>151</b>, is a church cantata by Johann Sebastian Bach. He composed it in Leipzig for the third day of Christmas, in a cycle of works for the Christmas season mainly to texts by Georg Christian Lehms; he first performed it on 27 December 1725.</p>"
