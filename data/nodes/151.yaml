bwv: '151'
title: Süßer Trost, mein Jesus kömmt
cycle: C3
occasion: Christmas 3
date: '1725-12-27'
url: https://en.wikipedia.org/wiki/BWV_151
edges: {}
movements:
  - num: 1
    type: Aria
    voices: S
    instruments: Flauto traverso, Oboe d'amore, Violino I/II, Viola, Continuo
    de: |-
      Süßer Trost, mein Jesus kömmt,
      Jesus wird anitzt geboren!
      Herz und Seele freuet sich,
      Denn mein liebster Gott hat mich
      Nun zum Himmel auserkoren.
  - num: 2
    type: Recitative
    voices: B
    instruments: Continuo
    de: |-
      Erfreue dich, mein Herz,
      Denn itzo weicht der Schmerz,
      Der dich so lange Zeit gedrücket.
      Gott hat den liebsten Sohn,
      Den er so hoch und teuer hält,
      Auf diese Welt geschicket.
      Er lässt den Himmelsthron
      Und will die ganze Welt
      Aus ihren Sklavenketten
      Und ihrer Dienstbarkeit erretten.
      O wundervolle Tat!
      Gott wird ein Mensch und will auf Erden
      Noch niedriger als wir und noch viel ärmer werden.
  - num: 3
    type: Aria
    voices: A
    instruments: Oboe d'amore, Violino I/II, Viola, Continuo
    de: |-
      In Jesu Demut kann ich Trost,
      In seiner Armut Reichtum finden.
      Mir macht desselben schlechter Stand
      Nur lauter Heil und Wohl bekannt,
      Ja, seine wundervolle Hand
      Will mir nur Segenskränze winden.
  - num: 4
    type: Recitative
    voices: T
    instruments: Continuo
    de: |-
      Du teurer Gottessohn,
      Nun hast du mir den Himmel aufgemacht
      Und durch dein Niedrigsein
      Das Licht der Seligkeit zuwege bracht.
      Weil du nun ganz allein
      Des Vaters Burg und Thron
      Aus Liebe gegen uns verlassen,
      So wollen wir dich auch
      Dafür in unser Herze fassen.
  - num: 5
    type: Chorale
    voices: SATB
    instruments: Flauto traverso e Oboe d'amore e Violino I col Soprano, Violino II coll' Alto, Viola col Tenore, Continuo
    de: |-
      Heut schleußt er wieder auf die Tür
      Zum schönen Paradeis,
      Der Cherub steht nicht mehr dafür,
      Gott sei Lob, Ehr und Preis.
