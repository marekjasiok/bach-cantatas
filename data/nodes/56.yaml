bwv: '56'
title: Ich will den Kreuzstab gerne tragen
cycle: C3
occasion: Trinity XIX
date: '1726-10-27'
url: https://en.wikipedia.org/wiki/BWV_56
edges: {}
movements:
  - num: 1
    type: Aria
    voices: B
    instruments: Oboe I/II, Taille, Violino I/II, Viola, Continuo
    de: |-
      Ich will den Kreuzstab gerne tragen,
      Er kömmt von Gottes lieber Hand,
      Der führet mich nach meinen Plagen
      Zu Gott, in das gelobte Land.
      Da leg ich den Kummer auf einmal ins Grab,
      Da wischt mir die Tränen mein Heiland selbst ab.
  - num: 2
    type: Recitative
    voices: B
    instruments: Violoncello, Continuo
    de: |-
      Mein Wandel auf der Welt
      Ist einer Schiffahrt gleich:
      Betrübnis, Kreuz und Not
      Sind Wellen, welche mich bedecken
      Und auf den Tod
      Mich täglich schrecken;
      Mein Anker aber, der mich hält,
      Ist die Barmherzigkeit,
      Womit mein Gott mich oft erfreut.
      Der rufet so zu mir:
      Ich bin bei dir,
      Ich will dich nicht verlassen noch versäumen!
      Und wenn das wütenvolle Schäumen
      Sein Ende hat,
      So tret ich aus dem Schiff in meine Stadt,
      Die ist das Himmelreich,
      Wohin ich mit den Frommen
      Aus vielem Trübsal werde kommen.
  - num: 3
    type: Aria
    voices: B
    instruments: Oboe solo, Continuo
    de: |-
      Endlich, endlich wird mein Joch
      Wieder von mir weichen müssen.
      Da krieg ich in dem Herren Kraft,
      Da hab ich Adlers Eigenschaft,
      Da fahr ich auf von dieser Erden
      Und laufe sonder matt zu werden.
      O gescheh es heute noch!
  - num: 4
    type: Recitative
    voices: ''
    instruments: Violino I/II, Viola, Continuo
    de: |-
      Ich stehe fertig und bereit,
      Das Erbe meiner Seligkeit
      Mit Sehnen und Verlangen
      Von Jesus Händen zu empfangen.
      Wie wohl wird mir geschehn,
      Wenn ich den Port der Ruhe werde sehn.
      Da leg ich den Kummer auf einmal ins Grab,
      Da wischt mir die Tränen mein Heiland selbst ab.
  - num: 5
    type: Chorale
    voices: SATB
    instruments: Oboe II e Violino I col Soprano, Violino II coll' Alto, Taille e Viola col Tenore, Continuo
    de: |-
      Komm, o Tod, du Schlafes Bruder,
      Komm und führe mich nur fort;
      Löse meines Schiffleins Ruder,
      Bringe mich an sichern Port!
      Es mag, wer da will, dich scheuen,
      Du kannst mich vielmehr erfreuen;
      Denn durch dich komm ich herein
      Zu dem schönsten Jesulein.
