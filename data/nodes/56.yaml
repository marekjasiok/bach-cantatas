wiki:
  summary: "Ich will den Kreuzstab gerne tragen, BWV\_56, is a church cantata composed by Johann Sebastian Bach for the 19th Sunday after Trinity. It was first performed in Leipzig on 27\_October 1726. The composition is a solo cantata because, apart from the closing chorale, it requires only a single vocal soloist. The autograph score is one of a few cases where Bach referred to one of his compositions as a cantata. In English, the work is commonly referred to as the Kreuzstab cantata. Bach composed the cantata in his fourth year as Thomaskantor; it is regarded as part of his third cantata cycle."
  image: >-
    https://upload.wikimedia.org/wikipedia/commons/thumb/8/8f/BWV56-autograph-manuscript-first-page-Bach-1726.jpg/330px-BWV56-autograph-manuscript-first-page-Bach-1726.jpg
  url: https://en.wikipedia.org/wiki/Ich_will_den_Kreuzstab_gerne_tragen%2C_BWV_56
  summary_html: "<p><b><span><i lang=\"de\">Ich will den Kreuzstab gerne tragen</i></span></b>, <b><abbr>BWV</abbr>\_56</b>, is a church cantata composed by Johann Sebastian Bach for the 19th Sunday after Trinity. It was first performed in Leipzig on 27\_October 1726. The composition is a solo cantata because, apart from the closing chorale, it requires only a single vocal soloist. The autograph score is one of a few cases where Bach referred to one of his compositions as a cantata. In English, the work is commonly referred to as the <span><i lang=\"de\">Kreuzstab</i></span> cantata. Bach composed the cantata in his fourth year as Thomaskantor; it is regarded as part of his third cantata cycle.</p>"
