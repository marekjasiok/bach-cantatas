wiki:
  summary: "Es ist ein trotzig und verzagt Ding, BWV\_176, is a church cantata by Johann Sebastian Bach. He composed it in Leipzig for Trinity Sunday on a text by Christiana Mariana von Ziegler and first performed it on 27 May 1725. This cantata concluded his second year of cantata compositions in Leipzig, the last of nine cantatas on texts by Ziegler that Bach set at the end of the second cantata cycle."
  image: >-
    https://upload.wikimedia.org/wikipedia/commons/thumb/e/e9/Christiana_Mariana_von_Ziegler.jpg/330px-Christiana_Mariana_von_Ziegler.jpg
  url: https://en.wikipedia.org/wiki/Es_ist_ein_trotzig_und_verzagt_Ding%2C_BWV_176
  summary_html: "<p><b><span><i lang=\"de\">Es ist ein trotzig und verzagt Ding</i></span></b>, <b><abbr>BWV</abbr><span class=\"nowrap\">\_</span>176</b>, is a church cantata by Johann Sebastian Bach. He composed it in Leipzig for Trinity Sunday on a text by Christiana Mariana von Ziegler and first performed it on 27 May 1725. This cantata concluded his second year of cantata compositions in Leipzig, the last of nine cantatas on texts by Ziegler that Bach set at the end of the second cantata cycle.</p>"
