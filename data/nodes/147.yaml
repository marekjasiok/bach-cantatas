wiki:
  summary: "Johann Sebastian Bach composed the church cantata Herz und Mund und Tat und Leben, BWV\_147 in 1723 during his first year as Thomaskantor, the director of church music in Leipzig. His cantata is part of his first cantata cycle there and was written for the Marian feast of the Visitation on 2 July, which commemorates Mary's visit to Elizabeth as narrated in the Gospel of Luke in the prescribed reading for the feast day. Bach based the music on his earlier cantata BWV 147a, written originally in Weimar in 1716 for Advent. He expanded the Advent cantata in six movements to ten movements in two parts in the new work. While the text of the Advent cantata was written by the Weimar court poet Salomo Franck, the librettist of the adapted version who added several recitatives is anonymous."
  image: >-
    https://upload.wikimedia.org/wikipedia/commons/thumb/4/45/Wohl_mir%2C_dass_ich_Jesum_habe_%28Autograph%29.jpg/330px-Wohl_mir%2C_dass_ich_Jesum_habe_%28Autograph%29.jpg
  url: https://en.wikipedia.org/wiki/Herz_und_Mund_und_Tat_und_Leben%2C_BWV_147
  summary_html: "<p>Johann Sebastian Bach composed the church cantata <b><span><i lang=\"de\">Herz und Mund und Tat und Leben</i></span></b>, <b><abbr>BWV</abbr><span class=\"nowrap\">\_</span>147</b> in 1723 during his first year as Thomaskantor, the director of church music in Leipzig. His cantata is part of his first cantata cycle there and was written for the Marian feast of the Visitation on 2 July, which commemorates Mary's visit to Elizabeth as narrated in the Gospel of Luke in the prescribed reading for the feast day. Bach based the music on his earlier cantata BWV 147a, written originally in Weimar in 1716 for Advent. He expanded the Advent cantata in six movements to ten movements in two parts in the new work. While the text of the Advent cantata was written by the Weimar court poet Salomo Franck, the librettist of the adapted version who added several recitatives is anonymous.</p>"
