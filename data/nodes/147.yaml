movements:
  - num: 1
    type: Chorus
    voices: T
    instruments: Tromba, Oboe I/II, Violino I/II, Viola, Continuo
    de: |-
      Herz und Mund und Tat und Leben
      Muss von Christo Zeugnis geben
      Ohne Furcht und Heuchelei,
      Dass er Gott und Heiland sei.
  - num: 2
    type: Recitative
    voices: T
    instruments: Violino I/II, Viola, Continuo
    de: |-
      Gebenedeiter Mund!
      Maria macht ihr Innerstes der Seelen
      Durch Dank und Rühmen kund;
      Sie fänget bei sich an,
      Des Heilands Wunder zu erzählen,
      Was er an ihr als seiner Magd getan.
      O menschliches Geschlecht,
      Des Satans und der Sünden Knecht,
      Du bist befreit
      Durch Christi tröstendes Erscheinen
      Von dieser Last und Dienstbarkeit!
      Jedoch dein Mund und dein verstockt Gemüte
      Verschweigt, verleugnet solche Güte;
      Doch wisse, dass dich nach der Schrift
      Ein allzuscharfes Urteil trifft!
  - num: 3
    type: Aria
    voices: A
    instruments: Oboe d'amore, Continuo
    de: |-
      Schäme dich, o Seele, nicht,
      Deinen Heiland zu bekennen,
      Soll er dich die seine nennen
      Vor des Vaters Angesicht!
      Doch wer ihn auf dieser Erden
      Zu verleugnen sich nicht scheut,
      Soll von ihm verleugnet werden,
      Wenn er kommt zur Herrlichkeit.
  - num: 4
    type: Recitative
    voices: B
    instruments: Continuo
    de: |-
      Verstockung kann Gewaltige verblenden,
      Bis sie des Höchsten Arm vom Stuhle stößt;
      Doch dieser Arm erhebt,
      Obschon vor ihm der Erde Kreis erbebt,
      Hingegen die Elenden,
      So er erlöst.
      O hochbeglückte Christen,
      Auf, machet euch bereit,
      Itzt ist die angenehme Zeit,
      Itzt ist der Tag des Heils: der Heiland heißt
      Euch Leib und Geist
      Mit Glaubensgaben rüsten,
      Auf, ruft zu ihm in brünstigem Verlangen,
      Um ihn im Glauben zu empfangen!
  - num: 5
    type: Aria
    voices: S
    instruments: Violino solo, Continuo
    de: |-
      Bereite dir, Jesu, noch itzo die Bahn,
      Mein Heiland, erwähle
      Die gläubende Seele
      Und siehe mit Augen der Gnade mich an!
  - num: 6
    type: Chorale
    voices: T
    instruments: Tromba, Oboe I/II, Violino I/II, Viola, Continuo
    de: |-
      Wohl mir, dass ich Jesum habe,
      O wie feste halt ich ihn,
      Dass er mir mein Herze labe,
      Wenn ich krank und traurig bin.
      Jesum hab ich, der mich liebet
      Und sich mir zu eigen gibet;
      Ach drum lass ich Jesum nicht,
      Wenn mir gleich mein Herze bricht.
  - num: 7
    type: Aria
    voices: T
    instruments: Continuo
    de: |-
      Hilf, Jesu, hilf, dass ich auch dich bekenne
      In Wohl und Weh, in Freud und Leid,
      Dass ich dich meinen Heiland nenne
      Im Glauben und Gelassenheit,
      Dass stets mein Herz von deiner Liebe brenne.
  - num: 8
    type: Recitative
    voices: A
    instruments: Oboe da caccia I/II, Continuo
    de: |-
      Der höchsten Allmacht Wunderhand
      Wirkt im Verborgenen der Erden.
      Johannes muss mit Geist erfüllet werden,
      Ihn zieht der Liebe Band
      Bereits in seiner Mutter Leibe,
      Dass er den Heiland kennt,
      Ob er ihn gleich noch nicht
      Mit seinem Munde nennt,
      Er wird bewegt, er hüpft und springet,
      Indem Elisabeth das Wunderwerk ausspricht,
      Indem Mariae Mund der Lippen Opfer bringet.
      Wenn ihr, o Gläubige, des Fleisches Schwachheit merkt
      Wenn euer Herz in Liebe brennet,
      Und doch der Mund den Heiland nicht bekennet,
      Gott ist es, der euch kräftig stärkt,
      Er will in euch des Geistes Kraft erregen,
      Ja Dank und Preis auf eure Zunge legen.
  - num: 9
    type: Aria
    voices: B
    instruments: Tromba, Oboe I/II, Violino I/II, Viola, Continuo
    de: |-
      Ich will von Jesu Wundern singen
      Und ihm der Lippen Opfer bringen,
      Er wird nach seiner Liebe Bund
      Das schwache Fleisch, den irdischen Mund
      Durch heilges Feuer kräftig zwingen.
  - num: 10
    type: Chorale
    voices: T
    instruments: Tromba, Oboe I/II, Violino I/II, Viola, Continuo
    de: |-
      Jesus bleibet meine Freude,
      Meines Herzens Trost und Saft,
      Jesus wehret allem Leide,
      Er ist meines Lebens Kraft,
      Meiner Augen Lust und Sonne,
      Meiner Seele Schatz und Wonne;
      Darum lass ich Jesum nicht
      Aus dem Herzen und Gesicht.
