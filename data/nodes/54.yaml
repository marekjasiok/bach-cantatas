wiki:
  summary: "Widerstehe doch der Sünde, BWV\_54, is a church cantata by Johann Sebastian Bach. He composed the solo cantata for alto in Weimar between 1711 and 1714, and probably performed it on the seventh Sunday after Trinity, 15 July 1714. It is Bach's first extant church cantata for a solo voice."
  image: >-
    https://upload.wikimedia.org/wikipedia/commons/thumb/2/24/Schlosskirche_Weimar_1660.jpg/330px-Schlosskirche_Weimar_1660.jpg
  url: https://en.wikipedia.org/wiki/Widerstehe_doch_der_S%C3%BCnde%2C_BWV_54
  summary_html: "<p><b><span><i lang=\"de\">Widerstehe doch der Sünde</i></span></b>, <b>BWV\_54</b>, is a church cantata by Johann Sebastian Bach. He composed the solo cantata for alto in Weimar between 1711 and 1714, and probably performed it on the seventh Sunday after Trinity, 15 July 1714. It is Bach's first extant church cantata for a solo voice.</p>"
