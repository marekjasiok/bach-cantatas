wiki:
  summary: >-

    The St Mark Passion, BWV 247, is a lost Passion setting by Johann Sebastian Bach, first performed in Leipzig on Good
    Friday, 23 March 1731. Though Bach's music is lost, the libretto by Picander is still extant, and from this, the
    work can to some degree be reconstructed.
  image: null
  url: https://en.wikipedia.org/wiki/St_Mark_Passion%2C_BWV_247
  summary_html: >-
    <p>

    The <i><b>St Mark Passion</b></i>, BWV 247, is a lost Passion setting by Johann Sebastian Bach, first performed in
    Leipzig on Good Friday, 23 March 1731. Though Bach's music is lost, the libretto by Picander is still extant, and
    from this, the work can to some degree be reconstructed.</p>
