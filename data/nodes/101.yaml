wiki:
  summary: "Johann Sebastian Bach composed the church cantata Nimm von uns, Herr, du treuer Gott, BWV\_101, in Leipzig for the tenth Sunday after Trinity and first performed it on 13 August 1724. It is based on the seven stanzas of the hymn of the same name by Martin Moller (1584), which is sung to the tune of \"Vater unser im Himmelreich\", Luther's metred paraphrase of the Lord's Prayer. The tune is featured prominently in six of the work's seven movements."
  image: >-
    https://upload.wikimedia.org/wikipedia/commons/thumb/f/f3/Valentin_de_Boulogne%2C_Christ_Driving_the_Money_Changers_out_of_the_Temple.jpg/330px-Valentin_de_Boulogne%2C_Christ_Driving_the_Money_Changers_out_of_the_Temple.jpg
  url: https://en.wikipedia.org/wiki/Nimm_von_uns%2C_Herr%2C_du_treuer_Gott%2C_BWV_101
  summary_html: "<p>Johann Sebastian Bach composed the church cantata <b><span><i lang=\"de\">Nimm von uns, Herr, du treuer Gott</i></span></b>, <b><abbr>BWV</abbr><span class=\"nowrap\">\_</span>101</b>, in Leipzig for the tenth Sunday after Trinity and first performed it on 13 August 1724. It is based on the seven stanzas of the hymn of the same name by Martin Moller (1584), which is sung to the tune of \"Vater unser im Himmelreich\", Luther's metred paraphrase of the Lord's Prayer. The tune is featured prominently in six of the work's seven movements.</p>"
