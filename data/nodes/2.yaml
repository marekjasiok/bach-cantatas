wiki:
  summary: "Ach Gott, vom Himmel sieh darein, BWV\_2, is a chorale cantata composed by Johann Sebastian Bach for the second Sunday after Trinity in 1724. First performed on 18 June in Leipzig, it is the second cantata of his chorale cantata cycle. The church cantata is based on Martin Luther's 1524 hymn \"Ach Gott, vom Himmel sieh darein\", a paraphrase of Psalm 12."
  image: https://upload.wikimedia.org/wikipedia/commons/thumb/0/0d/Thomaskirche-1885.png/330px-Thomaskirche-1885.png
  url: https://en.wikipedia.org/wiki/Ach_Gott%2C_vom_Himmel_sieh_darein%2C_BWV_2
  summary_html: "<p><b><span><i lang=\"de\">Ach Gott, vom Himmel sieh darein</i></span></b>, <b><abbr>BWV</abbr><span class=\"nowrap\">\_</span>2</b>, is a chorale cantata composed by Johann Sebastian Bach for the second Sunday after Trinity in 1724. First performed on 18 June in Leipzig, it is the second cantata of his chorale cantata cycle. The church cantata is based on Martin Luther's 1524 hymn \"Ach Gott, vom Himmel sieh darein\", a paraphrase of Psalm 12.</p>"
