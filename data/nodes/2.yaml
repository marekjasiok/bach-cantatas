bwv: '2'
title: Ach Gott, vom Himmel sieh darein
cycle: C2
occasion: Trinity II
date: '1724-06-18'
url: https://en.wikipedia.org/wiki/BWV_2
edges: {}
movements:
  - num: 1
    type: Chorus
    voices: SATB
    instruments: >-
      Violino I e Trombone I col Soprano, Violino II e Oboe I/II e Trombone II coll' Alto, Viola e Trombone III col
      Tenore, Trombone IV col Basso, Continuo
    de: |-
      Ach Gott, vom Himmel sieh darein
      Und lass dich's doch erbarmen!
      Wie wenig sind der Heilgen dein,
      Verlassen sind wir Armen;
      Dein Wort man nicht lässt haben wahr,
      Der Glaub ist auch verloschen gar
      Bei allen Menschenkindern.
  - num: 2
    type: Recitative
    voices: T
    instruments: Continuo
    de: |-
      Sie lehren eitel falsche List,
      Was wider Gott und seine Wahrheit ist;
      Und was der eigen Witz erdenket,
      - O Jammer! der die Kirche schmerzlich kränket -
      Das muss anstatt der Bibel stehn.
      Der eine wählet dies, der andre das,
      Die törichte Vernunft ist ihr Kompass;
      Sie gleichen denen Totengräbern
      Die, ob sie zwar von außen schön,
      Nur Stank und Moder in sich fassen
      Und lauter Unflat sehen lassen.
  - num: 3
    type: Aria
    voices: A
    instruments: Violino solo, Continuo
    de: |-
      Tilg, o Gott, die Lehren,
      So dein Wort verkehren!
      Wehre doch der Ketzerei
      Und allen Rottengeistern;
      Denn sie sprechen ohne Scheu:
      Trotz dem, der uns will meistern!
  - num: 4
    type: Recitative
    voices: B
    instruments: Violino I/II, Viola, Continuo
    de: |-
      Die Armen sind verstört,
      Ihr seufzend Ach, ihr ängstlich Klagen
      Bei soviel Kreuz und Not,
      Wodurch die Feinde fromme Seelen plagen,
      Dringt in das Gnadenohr des Allerhöchsten ein.
      Darum spricht Gott: Ich muss ihr Helfer sein!
      Ich hab ihr Flehn erhört,
      Der Hilfe Morgenrot,
      Der reinen Wahrheit heller Sonnenschein
      Soll sie mit neuer Kraft,
      Die Trost und Leben schafft,
      Erquicken und erfreun.
      Ich will mich ihrer Not erbarmen,
      Mein heilsam Wort soll sein die Kraft der Armen.
  - num: 5
    type: Aria
    voices: T
    instruments: Oboe I/II, Violino I/II, Viola, Continuo
    de: |-
      Durchs Feuer wird das Silber rein,
      Durchs Kreuz das Wort bewährt erfunden.
      Drum soll ein Christ zu allen Stunden
      Im Kreuz und Not geduldig sein.
  - num: 6
    type: Chorale
    voices: SATB
    instruments: >-
      Violino I e Oboe I/II e Trombone I col Soprano, Violino II e Trombone II coll' Alto, Viola e Trombone III col
      Tenore, Trombone IV col Basso, Continuo
    de: |-
      Das wollst du, Gott, bewahren rein
      Für diesem arg'n Geschlechte;
      Und lass uns dir befohlen sein,
      Dass sichs in uns nicht flechte.
      Der gottlos Hauf sich umher findt,
      Wo solche lose Leute sind
      In deinem Volk erhaben.
