  summary_html: "<p><b><span><i lang=\"de\">Preise, Jerusalem, den Herrn</i></span></b>, <b>BWV\_119</b>, is a sacred cantata by Johann Sebastian Bach. He composed it in Leipzig for <i>Ratswechsel</i>, the inauguration of a new town council, and first performed it on 30 August 1723.</p>"
