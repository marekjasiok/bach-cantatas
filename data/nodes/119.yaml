wiki:
  summary: "Preise, Jerusalem, den Herrn, BWV\_119, is a sacred cantata by Johann Sebastian Bach. He composed it in Leipzig for Ratswechsel, the inauguration of a new town council, and first performed it on 30 August 1723."
