wiki:
  summary: >-
    Gott fähret auf mit Jauchzen, BWV 43, is a church cantata by Johann Sebastian Bach. He composed it in Leipzig for
    the Feast of the Ascension, and led the first performance on 30 May 1726. The work is part of Bach's third cantata
    cycle.
