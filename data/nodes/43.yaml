    https://upload.wikimedia.org/wikipedia/commons/thumb/a/a0/Gott_f%C3%A4hret_auf_mit_Jauchzen%2C_BWV_43_by_J.S._Bach_%281%29.png/330px-Gott_f%C3%A4hret_auf_mit_Jauchzen%2C_BWV_43_by_J.S._Bach_%281%29.png
  url: https://en.wikipedia.org/wiki/Gott_f%C3%A4hret_auf_mit_Jauchzen%2C_BWV_43
  summary_html: >-
    <p><b><span><i lang="de">Gott fähret auf mit Jauchzen</i></span></b>, <b><span class="nowrap">BWV 43</span></b>, is
    a church cantata by Johann Sebastian Bach. He composed it in Leipzig for the Feast of the Ascension, and led the
    first performance on 30 May 1726. The work is part of Bach's third cantata cycle.</p>
key: C major
