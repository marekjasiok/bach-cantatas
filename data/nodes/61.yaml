bwv: '61'
title: Nun komm, der Heiden Heiland
cycle: EARLY
occasion: Advent I
date: '1714-12-02'
url: https://en.wikipedia.org/wiki/BWV_61
edges: {}
movements:
  - num: 1
    type: Chorus
    voices: SATB
    instruments: Violino I/II, Viola I/II, Fagotto, Continuo
    de: |-
      Nun komm, der Heiden Heiland,
      Der Jungfrauen Kind erkannt,
      Des sich wundert alle Welt,
      Gott solch Geburt ihm bestellt.
  - num: 2
    type: Recitative
    voices: T
    instruments: Continuo
    de: |-
      Der Heiland ist gekommen,
      Hat unser armes Fleisch und Blut
      An sich genommen
      Und nimmet uns zu Blutsverwandten an.
      O allerhöchstes Gut,
      Was hast du nicht an uns getan?
      Was tust du nicht
      Noch täglich an den Deinen?
      Du kömmst und lässt dein Licht
      Mit vollem Segen scheinen.
  - num: 3
    type: Aria
    voices: T
    instruments: Violino I/II, Viola I/II, Continuo
    de: |-
      Komm, Jesu, komm zu deiner Kirche
      Und gib ein selig neues Jahr!
      Befördre deines Namens Ehre,
      Erhalte die gesunde Lehre
      Und segne Kanzel und Altar!
  - num: 4
    type: Recitative
    voices: B
    instruments: Violino I/II, Viola I/II, Continuo
    de: |-
      Siehe, ich stehe vor der Tür
      und klopfe an. So jemand meine Stimme hören wird und die Tür
      auftun, zu dem werde ich eingehen und das Abendmahl mit ihm halten
      und er mit mir.
  - num: 5
    type: Aria
    voices: S
    instruments: Violoncelli, Continuo
    de: |-
      Öffne dich, mein ganzes Herze,
      Jesus kömmt und ziehet ein.
      Bin ich gleich nur Staub und Erde,
      Will er mich doch nicht verschmähn,
      Seine Lust an mir zu sehn,
      Dass ich seine Wohnung werde.
      O wie selig werd ich sein!
  - num: 6
    type: Chorale
    voices: SATB
    instruments: Viola I coll' Alto, Viola II col Tenore, Fagotto col Basso, Violino I/II, Continuo
    de: |-
      Amen, amen!
      Komm, du schöne Freudenkrone, bleib nicht lange!
      Deiner wart ich mit Verlangen.
scoring: 'Soli: S T B, Coro: S A T B, Violino I/II, Viola I/II, Violoncello, Fagotto, Continuo'
