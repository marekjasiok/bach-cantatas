  summary_html: "<p>Johann Sebastian Bach composed the church cantata <b><span><i lang=\"de\">Nun komm, der Heiden Heiland</i></span></b>, <b><abbr>BWV</abbr><span class=\"nowrap\">\_</span>61</b>, in Weimar for the first Sunday in Advent, the Sunday which begins the liturgical year, and first performed it there on <span class=\"nowrap\">2 December</span> 1714.</p>"
