wiki:
  summary: "Herr Jesu Christ, du höchstes Gut, BWV\_113, is a church cantata by Johann Sebastian Bach. He composed it in Leipzig for the eleventh Sunday after Trinity and first performed it on 20 August 1724. It is based on the eight stanzas of the 1588 hymn \"Herr Jesu Christ, du höchstes Gut\" by Bartholomäus Ringwaldt, a penitential song."
