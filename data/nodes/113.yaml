    https://upload.wikimedia.org/wikipedia/commons/thumb/1/1a/Gelijkenis_van_een_farizee%C3%ABr_en_een_tollenaar%2C_RP-P-OB-44.953.jpg/330px-Gelijkenis_van_een_farizee%C3%ABr_en_een_tollenaar%2C_RP-P-OB-44.953.jpg
  url: https://en.wikipedia.org/wiki/Herr_Jesu_Christ%2C_du_h%C3%B6chstes_Gut%2C_BWV_113
  summary_html: "<p><b><span><i lang=\"de\">Herr Jesu Christ, du höchstes Gut</i></span></b>, <b><abbr>BWV</abbr><span class=\"nowrap\">\_</span>113</b>, is a church cantata by Johann Sebastian Bach. He composed it in Leipzig for the eleventh Sunday after Trinity and first performed it on 20 August 1724. It is based on the eight stanzas of the 1588 hymn \"Herr Jesu Christ, du höchstes Gut\" by Bartholomäus Ringwaldt, a penitential song.</p>"
