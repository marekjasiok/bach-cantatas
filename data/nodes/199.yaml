wiki:
  summary: "Johann Sebastian Bach composed the church cantata Mein Herze schwimmt im Blut BWV\_199 in Weimar between 1712 and 1713, and performed it on the eleventh Sunday after Trinity, 12 August 1714. It is a solo cantata for soprano."
