    https://upload.wikimedia.org/wikipedia/commons/thumb/2/24/Schlosskirche_Weimar_1660.jpg/330px-Schlosskirche_Weimar_1660.jpg
  url: https://en.wikipedia.org/wiki/Mein_Herze_schwimmt_im_Blut%2C_BWV_199
  summary_html: "<p>Johann Sebastian Bach composed the church cantata <b><span><i lang=\"de\">Mein Herze schwimmt im Blut</i></span></b> <b><abbr>BWV</abbr><span class=\"nowrap\">\_</span>199</b> in Weimar between 1712 and 1713, and performed it on the eleventh Sunday after Trinity, 12 August 1714. It is a solo cantata for soprano.</p>"
