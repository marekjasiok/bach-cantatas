    https://upload.wikimedia.org/wikipedia/commons/thumb/a/a1/Weimar-1840-Herderplatz-Oeder.jpg/330px-Weimar-1840-Herderplatz-Oeder.jpg
  url: https://en.wikipedia.org/wiki/Der_Himmel_lacht!_Die_Erde_jubilieret%2C_BWV_31
  summary_html: "<p><b><span><i lang=\"de\">Der Himmel lacht! Die Erde jubilieret</i></span></b>, <b><abbr>BWV</abbr><span class=\"nowrap\">\_</span>31</b>, is a church cantata by Johann Sebastian Bach for the first day of Easter. Bach composed the cantata in Weimar and first performed it on 21 April 1715.</p>"
