wiki:
  summary: >-
    Aus der Tiefen rufe ich, Herr, zu dir, BWV 131, is a church cantata by the German composer Johann Sebastian Bach. It
    was composed in either 1707 or 1708, which makes it one of Bach's earliest cantatas. Some sources suggest that it
    could be his earliest surviving work in this form, but current thinking is that there are one or two earlier
    examples.
  image: >-
    https://upload.wikimedia.org/wikipedia/commons/thumb/b/bc/Kirche_St._Marien_-_Innenraum.JPG/330px-Kirche_St._Marien_-_Innenraum.JPG
  url: https://en.wikipedia.org/wiki/Aus_der_Tiefen_rufe_ich%2C_Herr%2C_zu_dir%2C_BWV_131
  summary_html: >-
    <p><b><span><i lang="de">Aus der Tiefen rufe ich, Herr, zu dir</i></span></b>, <b><span class="nowrap">BWV
    131</span></b>, is a church cantata by the German composer Johann Sebastian Bach. It was composed in either 1707 or
    1708, which makes it one of Bach's earliest cantatas. Some sources suggest that it could be his earliest surviving
    work in this form, but current thinking is that there are one or two earlier examples.</p>
key: G minor
