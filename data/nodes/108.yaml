  summary_html: "<p><b><span><i lang=\"de\">Es ist euch gut, daß ich hingehe</i></span></b>, <b><abbr>BWV</abbr><span class=\"nowrap\">\_</span>108</b>, is a church cantata by Johann Sebastian Bach. He composed it in Leipzig for Cantate Sunday, the fourth Sunday after Easter, and first performed it on 29 April 1725.</p>"
