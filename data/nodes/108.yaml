wiki:
  summary: "Es ist euch gut, daß ich hingehe, BWV\_108, is a church cantata by Johann Sebastian Bach. He composed it in Leipzig for Cantate Sunday, the fourth Sunday after Easter, and first performed it on 29 April 1725."
