wiki:
  summary: "Johann Sebastian Bach composed the church cantata Wär Gott nicht mit uns diese Zeit, BWV\_14, in Leipzig in 1735 for the fourth Sunday after Epiphany and first performed it on 30 January 1735, a few weeks after his Christmas Oratorio. The cantata, in Bach's chorale cantata format, is based on Martin Luther's hymn \"Wär Gott nicht mit uns diese Zeit\". Its text paraphrases Psalm 124, focussing on the thought that the believers' life depends on God's help and is lost without it."
  image: null
  url: https://en.wikipedia.org/wiki/W%C3%A4r_Gott_nicht_mit_uns_diese_Zeit%2C_BWV_14
  summary_html: "<p>Johann Sebastian Bach composed the church cantata <b><span><i lang=\"de\">Wär Gott nicht mit uns diese Zeit</i></span></b>, <b><abbr>BWV</abbr><span class=\"nowrap\">\_</span>14</b>, in Leipzig in 1735 for the fourth Sunday after Epiphany and first performed it on 30 January 1735, a few weeks after his <i>Christmas Oratorio</i>. The cantata, in Bach's chorale cantata format, is based on Martin Luther's hymn \"Wär Gott nicht mit uns diese Zeit\". Its text paraphrases Psalm 124, focussing on the thought that the believers' life depends on God's help and is lost without it.</p>"
