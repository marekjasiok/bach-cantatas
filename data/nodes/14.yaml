bwv: '14'
title: Wär Gott nicht with uns diese Zeit
cycle: LATE
occasion: Epiphany IV
date: '1735'
url: https://en.wikipedia.org/wiki/BWV_14
edges: {}
movements:
  - num: 1
    type: Chorus
    voices: SATB
    instruments: Corno da caccia e Oboe I/II all' unisono, Violino I/II, Viola, Continuo
    de: |-
      Wär Gott nicht mit uns diese Zeit,
      So soll Israel sagen,
      Wär Gott nicht mit uns diese Zeit,
      Wir hätten müssen verzagen,
      Die so ein armes Häuflein sind,
      Veracht' von so viel Menschenkind,
      Die an uns setzen alle.
  - num: 2
    type: Aria
    voices: S
    instruments: Corno da caccia, Violino I/II, Viola, Continuo
    de: |-
      Unsre Stärke heißt zu schwach,
      Unserm Feind zu widerstehen.
      Stünd uns nicht der Höchste bei,
      Würd uns ihre Tyrannei
      Bald bis an das Leben gehen.
  - num: 3
    type: Recitative
    voices: T
    instruments: Continuo
    de: |-
      Ja, hätt es Gott nur zugegeben,
      Wir wären längst nicht mehr am Leben,
      Sie rissen uns aus Rachgier hin,
      So zornig ist auf uns ihr Sinn.
      Es hätt uns ihre Wut
      Wie eine wilde Flut
      Und als beschäumte Wasser überschwemmet,
      Und niemand hätte die Gewalt gehemmet.
  - num: 4
    type: Aria
    voices: B
    instruments: Oboe I/II, Continuo
    de: |-
      Gott, bei deinem starken Schützen
      Sind wir vor den Feinden frei.
      Wenn sie sich als wilde Wellen
      Uns aus Grimm entgegenstellen,
      Stehn uns deine Hände bei.
  - num: 5
    type: Chorale
    voices: SATB
    instruments: Corno da caccia e Oboe I/II e Violino I col Soprano, Violino II coll' Alto, Viola col Tenore, Continuo
    de: |-
      Gott Lob und Dank, der nicht zugab,
      Dass ihr Schlund uns möcht fangen.
      Wie ein Vogel des Stricks kömmt ab,
      Ist unsre Seel entgangen:
      Strick ist entzwei, und wir sind frei;
      Des Herren Name steht uns bei,
      Des Gottes Himmels und Erden.
scoring: 'Soli: S T B, Coro: S A T B, Corno da caccia, Oboe I/II, Violino I/II, Viola, Continuo'
