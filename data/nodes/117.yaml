  summary_html: "<p><i><b><span><i lang=\"de\">Sei Lob und Ehr dem höchsten Gut</i></span></b></i>, <b>BWV\_117</b>, is a church cantata by Johann Sebastian Bach. He composed the chorale cantata in Leipzig between 1728 and 1731 for no specific occasion, based on the hymn by Johann Jacob Schütz.</p>"
