wiki:
  summary: "Sei Lob und Ehr dem höchsten Gut, BWV\_117, is a church cantata by Johann Sebastian Bach. He composed the chorale cantata in Leipzig between 1728 and 1731 for no specific occasion, based on the hymn by Johann Jacob Schütz."
