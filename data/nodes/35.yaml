wiki:
  summary: "Geist und Seele wird verwirret, BWV\_35, is a church cantata by Johann Sebastian Bach. He composed the solo cantata for alto voice in Leipzig for the twelfth Sunday after Trinity and first performed it on 8 September 1726."
  image: >-
    https://upload.wikimedia.org/wikipedia/commons/thumb/b/bb/Galante_Poetinnen_0001.png/330px-Galante_Poetinnen_0001.png
  url: https://en.wikipedia.org/wiki/Geist_und_Seele_wird_verwirret%2C_BWV_35
  summary_html: "<p><b><span><i lang=\"de\">Geist und Seele wird verwirret</i></span></b>, <b><abbr>BWV</abbr><span class=\"nowrap\">\_</span>35</b>, is a church cantata by Johann Sebastian Bach. He composed the solo cantata for alto voice in Leipzig for the twelfth Sunday after Trinity and first performed it on 8 September 1726.</p>"
