wiki:
  summary: "Ich lasse dich nicht, du segnest mich denn, BWV\_157, is a church cantata by Johann Sebastian Bach. He composed it in Leipzig in 1726/27 to a libretto by Picander. The first known performance was on 6 February 1727 during a memorial service for Johann Christoph von Ponickau in Pomßen near Leipzig. The work was later assigned to the feast of the Purification celebrated on 2 February."
  image: >-
    https://upload.wikimedia.org/wikipedia/commons/thumb/2/2b/Johann_Christoph_von_Ponickau.jpg/330px-Johann_Christoph_von_Ponickau.jpg
  url: https://en.wikipedia.org/wiki/Ich_lasse_dich_nicht%2C_du_segnest_mich_denn%2C_BWV_157
  summary_html: "<p><b><span><i lang=\"de\">Ich lasse dich nicht, du segnest mich denn</i></span></b>, <b>BWV<span class=\"nowrap\">\_</span>157</b>, is a church cantata by Johann Sebastian Bach. He composed it in Leipzig in 1726/27 to a libretto by Picander. The first known performance was on 6 February 1727 during a memorial service for Johann Christoph von Ponickau in Pomßen near Leipzig. The work was later assigned to the feast of the Purification celebrated on 2 February.</p>"
