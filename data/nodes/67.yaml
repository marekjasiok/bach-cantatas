wiki:
  summary: "Halt im Gedächtnis Jesum Christ, BWV\_67, is a church cantata by Johann Sebastian Bach. He composed it in Leipzig for Quasimodogeniti, the first Sunday after Easter, and first performed it on 16 April 1724."
  image: https://upload.wikimedia.org/wikipedia/commons/thumb/0/0d/Thomaskirche-1885.png/330px-Thomaskirche-1885.png
  url: https://en.wikipedia.org/wiki/Halt_im_Ged%C3%A4chtnis_Jesum_Christ%2C_BWV_67
  summary_html: "<p><b><span><i lang=\"de\">Halt im Gedächtnis Jesum Christ</i></span></b>, <b><abbr>BWV</abbr><span class=\"nowrap\">\_</span>67</b>, is a church cantata by Johann Sebastian Bach. He composed it in Leipzig for Quasimodogeniti, the first Sunday after Easter, and first performed it on 16 April 1724.</p>"
