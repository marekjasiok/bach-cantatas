bwv: '32'
title: Liebster Jesu, mein Verlangen
cycle: C3
occasion: Epiphany I
date: '1726-01-13'
url: https://en.wikipedia.org/wiki/BWV_32
edges: {}
movements:
  - num: 1
    type: Aria
    voices: S
    instruments: Oboe, Violino I/II, Viola, Continuo
    de: |-
      Liebster Jesu, mein Verlangen,
      Sage mir, wo find ich dich?
      Soll ich dich so bald verlieren
      Und nicht ferner bei mir spüren?
      Ach! mein Hort, erfreue mich,
      Lass dich höchst vergnügt umfangen.
  - num: 2
    type: Recitative
    voices: B
    instruments: Continuo
    de: |-
      Was ists, dass du mich gesuchet?
      Weißt du nicht, dass ich sein muss in dem,
      das meines Vaters ist?
  - num: 3
    type: Aria
    voices: B
    instruments: Violino solo, Continuo
    de: |-
      Hier, in meines Vaters Stätte,
      Findt mich ein betrübter Geist.
      Da kannst du mich sicher finden
      Und dein Herz mit mir verbinden,
      Weil dies meine Wohnung heißt.
  - num: 4
    type: Recitative
    voices: ''
    instruments: Violino I/II, Viola, Continuo
    de: |-
      Seele (S), Jesus (B)
      Sopran
      Ach! heiliger und großer Gott,
      So will ich mir
      Denn hier bei dir
      Beständig Trost und Hülfe suchen.
      Bass
      Wirst du den Erdentand verfluchen
      Und nur in diese Wohnung gehn,
      So kannst du hier und dort bestehn.
      Sopran
      Wie lieblich ist doch deine Wohnung,
      Herr, starker Zebaoth;
      Mein Geist verlangt
      Nach dem, was nur in deinem Hofe prangt.
      Mein Leib und Seele freuet sich
      In dem lebendgen Gott:
      Ach! Jesu, meine Brust liebt dich nur ewiglich.
      Bass
      So kannst du glücklich sein,
      Wenn Herz und Geist
      Aus Liebe gegen mich entzündet heißt.
      Sopran
      Ach! dieses Wort, das itzo schon
      Mein Herz aus Babels Grenzen reißt,
      Fass' ich mir andachtsvoll in meiner Seele ein.
  - num: 5
    type: Aria
    voices: ''
    instruments: Oboe, Violino I/II, Viola, Continuo
    de: |-
      beide
      Nun verschwinden alle Plagen,
      Nun verschwindet Ach und Schmerz.
      Sopran
      Nun will ich nicht von dir lassen,
      Bass
      Und ich dich auch stets umfassen.
      Sopran
      Nun vergnüget sich mein Herz
      Bass
      Und kann voller Freude sagen:
      beide
      Nun verschwinden alle Plagen,
      Nun verschwindet Ach und Schmerz!
  - num: 6
    type: Chorale
    voices: SATB
    instruments: Oboe, Violino I/II, Viola, Continuo
    de: |-
      Mein Gott, öffne mir die Pforten
      Solcher Gnad und Gütigkeit,
      Lass mich allzeit allerorten
      Schmecken deine Süßigkeit!
      Liebe mich und treib mich an,
      Dass ich dich, so gut ich kann,
      Wiederum umfang und liebe
      Und ja nun nicht mehr betrübe.
scoring: 'Soli: S B, Coro: S A T B, Oboe, Violino solo, Violino I/II, Viola, Continuo'
