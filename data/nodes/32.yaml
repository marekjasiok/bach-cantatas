wiki:
  summary: >-
    Liebster Jesu, mein Verlangen, BWV 32, is a church cantata by Johann Sebastian Bach. He composed the dialogue
    cantata in Leipzig for the first Sunday after Epiphany and first performed it on 13 January 1726 as part of his
    third cantata cycle.
  image: >-
    https://upload.wikimedia.org/wikipedia/commons/thumb/b/bb/Galante_Poetinnen_0001.png/330px-Galante_Poetinnen_0001.png
  url: https://en.wikipedia.org/wiki/Liebster_Jesu%2C_mein_Verlangen%2C_BWV_32
  summary_html: >-
    <p><b><span><i lang="de">Liebster Jesu, mein Verlangen</i></span></b>, <b><span class="nowrap">BWV 32</span></b>, is
    a church cantata by Johann Sebastian Bach. He composed the dialogue cantata in Leipzig for the first Sunday after
    Epiphany and first performed it on 13 January 1726 as part of his third cantata cycle.</p>
