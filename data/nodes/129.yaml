bwv: '129'
title: Gelobet sei der Herr, mein Gott
cycle: C3
occasion: Trinity
date: '1726-06-16'
url: https://en.wikipedia.org/wiki/BWV_129
edges: {}
movements:
  - num: 1
    type: Chorus
    voices: T
    instruments: Tromba I-III, Tamburi, Flauto traverso, Oboe I/II, Violino I/II, Viola, Continuo
    de: |-
      Gelobet sei der Herr,
      Mein Gott, mein Licht, mein Leben,
      Mein Schöpfer, der mir hat
      Mein Leib und Seel gegeben,
      Mein Vater, der mich schützt
      Von Mutterleibe an,
      Der alle Augenblick
      Viel Guts an mir getan.
  - num: 2
    type: Aria
    voices: B
    instruments: Continuo
    de: |-
      Gelobet sei der Herr,
      Mein Gott, mein Heil, mein Leben,
      Des Vaters liebster Sohn,
      Der sich für mich gegeben,
      Der mich erlöset hat
      Mit seinem teuren Blut,
      Der mir im Glauben schenkt
      Sich selbst, das höchste Gut.
  - num: 3
    type: Aria
    voices: S
    instruments: Flauto traverso, Violino solo, Continuo
    de: |-
      Gelobet sei der Herr,
      Mein Gott, mein Trost, mein Leben,
      Des Vaters werter Geist,
      Den mir der Sohn gegeben,
      Der mir mein Herz erquickt,
      Der mir gibt neue Kraft,
      Der mir in aller Not
      Rat, Trost und Hülfe schafft.
  - num: 4
    type: Aria
    voices: A
    instruments: Oboe d'amore, Continuo
    de: |-
      Gelobet sei der Herr,
      Mein Gott, der ewig lebet,
      Den alles lobet, was
      In allen Lüften schwebet;
      Gelobet sei der Herr,
      Des Name heilig heißt,
      Gott Vater, Gott der Sohn
      Und Gott der Heilge Geist.
  - num: 5
    type: Chorale
    voices: T
    instruments: Tromba I-III, Tamburi, Flauto traverso, Oboe I/II, Violino I/II, Viola, Continuo
    de: |-
      Dem wir das Heilig itzt
      Mit Freuden lassen klingen
      Und mit der Engel Schar
      Das Heilig, Heilig singen,
      Den herzlich lobt und preist
      Die ganze Christenheit:
      Gelobet sei mein Gott
      In alle Ewigkeit!
