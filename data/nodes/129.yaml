wiki:
  summary: |-
    Gelobet sei der Herr, mein Gott, BWV 129, is a church cantata by Johann Sebastian Bach. It is a chorale cantata.
    The cantata is festively scored and ends in a chorale fantasia, like the Christmas Oratorio.
  image: https://upload.wikimedia.org/wikipedia/commons/thumb/6/6c/Thomaskirche_Interior.jpg/330px-Thomaskirche_Interior.jpg
  url: https://en.wikipedia.org/wiki/Gelobet_sei_der_Herr%2C_mein_Gott%2C_BWV_129
  summary_html: >-
    <p><b><span><i lang="de">Gelobet sei der Herr, mein Gott</i></span></b>, <span class="nowrap">BWV 129,</span> is a
    church cantata by Johann Sebastian Bach. It is a chorale cantata.

    The cantata is festively scored and ends in a chorale fantasia, like the <i>Christmas Oratorio</i>.</p>
key: E major
