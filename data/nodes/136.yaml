wiki:
  summary: "Erforsche mich, Gott, und erfahre mein Herz, BWV\_136 is a church cantata by Johann Sebastian Bach. Bach composed the cantata in 1723 in Leipzig to be used for the eighth Sunday after Trinity. He led the first performance on 18 July 1723."
  image: https://upload.wikimedia.org/wikipedia/commons/thumb/0/0d/Thomaskirche-1885.png/330px-Thomaskirche-1885.png
  url: https://en.wikipedia.org/wiki/Erforsche_mich%2C_Gott%2C_und_erfahre_mein_Herz%2C_BWV_136
  summary_html: "<p><b><span><i lang=\"de\">Erforsche mich, Gott, und erfahre mein Herz</i></span></b>, <b><abbr>BWV</abbr><span class=\"nowrap\">\_</span>136</b> is a church cantata by Johann Sebastian Bach. Bach composed the cantata in 1723 in Leipzig to be used for the eighth Sunday after Trinity. He led the first performance on 18 July 1723.</p>"
