wiki:
  summary: "Johann Sebastian Bach composed the church cantata Nun komm, der Heiden Heiland, BWV\_62, in Leipzig for the first Sunday in Advent and first performed it on 3 December 1724. It is based on Martin Luther's Advent hymn \"Nun komm, der Heiden Heiland\", a paraphrase of the Latin hymn \"Veni redemptor gentium\". The cantata is part of Bach's chorale cantata cycle, the second cycle during his tenure as Thomaskantor that began in 1723. In the format of this cycle, the text of the first and last stanzas of the hymn is retained unchanged while the text of the inner stanzas was paraphrased by an unknown librettist into a sequence of alternating arias and recitatives. The cantata is opened by a chorale fantasia and closed by a four-part chorale setting."
  image: >-
    https://upload.wikimedia.org/wikipedia/commons/thumb/b/b7/Martin_Luther_by_Cranach-restoration.jpg/330px-Martin_Luther_by_Cranach-restoration.jpg
  url: https://en.wikipedia.org/wiki/Nun_komm%2C_der_Heiden_Heiland%2C_BWV_62
  summary_html: "<p>Johann Sebastian Bach composed the church cantata <b><span><i lang=\"de\">Nun komm, der Heiden Heiland</i></span></b>, <b><abbr>BWV</abbr><span class=\"nowrap\">\_</span>62</b>, in Leipzig for the first Sunday in Advent and first performed it on 3 December 1724. It is based on Martin Luther's Advent hymn \"Nun komm, der Heiden Heiland\", a paraphrase of the Latin hymn \"Veni redemptor gentium\". The cantata is part of Bach's chorale cantata cycle, the second cycle during his tenure as Thomaskantor that began in 1723. In the format of this cycle, the text of the first and last stanzas of the hymn is retained unchanged while the text of the inner stanzas was paraphrased by an unknown librettist into a sequence of alternating arias and recitatives. The cantata is opened by a chorale fantasia and closed by a four-part chorale setting.</p>"
