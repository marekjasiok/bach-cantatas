movements:
  - num: 1
    type: Chorus
    voices: SATB
    instruments: Oboe I/II, Violino I/II, Viola, Corno col Soprano, Continuo
    de: |-
      Nun komm, der Heiden Heiland,
      Der Jungfrauen Kind erkannt,
      Des sich wundert alle Welt,
      Gott solch Geburt ihm bestellt.
  - num: 2
    type: Aria
    voices: T
    instruments: Oboe I/II, Violino I/II, Viola, Continuo
    de: |-
      Bewundert, o Menschen, dies große Geheimnis:
      Der höchste Beherrscher erscheinet der Welt.
      Hier werden die Schätze des Himmels entdecket,
      Hier wird uns ein göttliches Manna bestellt,
      O Wunder! die Keuschheit wird gar nicht beflecket.
  - num: 3
    type: Recitative
    voices: B
    instruments: Continuo
    de: |-
      So geht aus Gottes Herrlichkeit und Thron
      Sein eingeborner Sohn.
      Der Held aus Juda bricht herein,
      Den Weg mit Freudigkeit zu laufen
      Und uns Gefallne zu erkaufen.
      O heller Glanz, o wunderbarer Segensschein!
  - num: 4
    type: Aria
    voices: B
    instruments: Violino I/II, Viola, Continuo
    de: |-
      Streite, siege, starker Held!
      Sei vor uns im Fleische kräftig!
      Sei geschäftig,
      Das Vermögen in uns Schwachen
      Stark zu machen!
  - num: 5
    type: Recitative
    voices: ''
    instruments: Violino I/II, Viola, Continuo
    de: |-
      Wir ehren diese Herrlichkeit
      Und nahen nun zu deiner Krippen
      Und preisen mit erfreuten Lippen,
      Was du uns zubereit';
      Die Dunkelheit verstört' uns nicht
      Und sahen dein unendlich Licht.
  - num: 6
    type: Chorale
    voices: SATB
    instruments: Corno e Oboe I/II e Violino I col Soprano, Violino II coll' Alto, Viola col Tenore, Continuo
    de: |-
      Lob sei Gott, dem Vater, g'ton,
      Lob sei Gott, sein'm eingen Sohn,
      Lob sei Gott, dem Heilgen Geist,
      Immer und in Ewigkeit!
