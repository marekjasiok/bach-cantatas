wiki:
  summary: "Wo Gott der Herr nicht bei uns hält, BWV\_178, is a church cantata by Johann Sebastian Bach. He composed it in Leipzig for the eighth Sunday after Trinity and first performed it on 30 July 1724."
  image: https://upload.wikimedia.org/wikipedia/commons/thumb/d/d8/Justus-Jonas-14.jpg/330px-Justus-Jonas-14.jpg
  url: https://en.wikipedia.org/wiki/Wo_Gott_der_Herr_nicht_bei_uns_h%C3%A4lt%2C_BWV_178
  summary_html: "<p><b><span><i lang=\"de\">Wo Gott der Herr nicht bei uns hält</i></span></b>, <b><abbr>BWV</abbr><span class=\"nowrap\">\_</span>178</b>, is a church cantata by Johann Sebastian Bach. He composed it in Leipzig for the eighth Sunday after Trinity and first performed it on 30 July 1724.</p>"
