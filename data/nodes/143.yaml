wiki:
  summary: >-
    Lobe den Herrn, meine Seele, BWV 143, is an early cantata by Johann Sebastian Bach. He appears to have composed the
    cantata for New Year's Day, probably when he was in his 20s, but whether it was first performed in Mühlhausen or
    Weimar is not known: the date of composition is unclear. Bach's authorship has been doubted because the cantata has
    several unusual features; one of these is the scoring, it is the only Bach cantata to combine three corni da caccia
    with timpani.
  image: null
  url: https://en.wikipedia.org/wiki/Lobe_den_Herrn%2C_meine_Seele%2C_BWV_143
  summary_html: >-
    <p><i><b><span><i lang="de">Lobe den Herrn, meine Seele</i></span></b></i>, <b><span class="nowrap">BWV
    143</span></b>, is an early cantata by Johann Sebastian Bach. He appears to have composed the cantata for New Year's
    Day, probably when he was in his 20s, but whether it was first performed in Mühlhausen or Weimar is not known: the
    date of composition is unclear. Bach's authorship has been doubted because the cantata has several unusual features;
    one of these is the scoring, it is the only Bach cantata to combine three corni da caccia with timpani.</p>
key: B♭ major
