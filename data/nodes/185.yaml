  summary_html: "<p>Johann Sebastian Bach composed the church cantata <b><span><i lang=\"de\">Barmherziges Herze der ewigen Liebe</i></span></b>, <b><abbr>BWV</abbr><span class=\"nowrap\">\_</span>185</b> in Weimar for the fourth Sunday after Trinity and first performed it on 14 July 1715.</p>"
