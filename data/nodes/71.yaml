wiki:
  summary: >-
    Gott ist mein König, BWV 71, is a cantata by Johann Sebastian Bach written in Mühlhausen when the composer was 22
    years old. Unusually for an early cantata by Bach, the date of first performance is known: at the inauguration of a
    new town council on 4 February 1708.
  image: >-
    https://upload.wikimedia.org/wikipedia/commons/thumb/3/35/Gott_ist_mein_K%C3%B6nig_Originaldruck_1708_Titelseite.jpg/330px-Gott_ist_mein_K%C3%B6nig_Originaldruck_1708_Titelseite.jpg
  url: https://en.wikipedia.org/wiki/Gott_ist_mein_K%C3%B6nig%2C_BWV_71
  summary_html: >-
    <p><i><b><span><i lang="de">Gott ist mein König</i></span></b></i>, <b><span class="nowrap">BWV 71</span></b>, is a
    cantata by Johann Sebastian Bach written in Mühlhausen when the composer was 22 years old. Unusually for an early
    cantata by Bach, the date of first performance is known: at the inauguration of a new town council on 4 February
    1708.</p>
