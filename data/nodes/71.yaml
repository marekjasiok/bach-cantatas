bwv: '71'
title: Gott ist mein König
cycle: EARLY
occasion: Ratswahl
date: Feb 4, 1708 (Printed)
url: https://en.wikipedia.org/wiki/BWV_71
edges: {}
movements:
  - num: 1
    type: Chorus
    voices: SATB
    instruments: Tromba I-III, Tamburi, Flauto I/II, Violoncello, Oboe I/II, Fagotto, Violino I/II, Viola, Violone, Organo
    de: |-
      Gott ist mein König von altersher,
      der alle Hilfe tut, so auf Erden geschicht.
  - num: 2
    type: Aria
    voices: ''
    instruments: Organo
    de: |-
      Ich bin nun achtzig Jahr, warum soll dein Knecht sich mehr beschweren?
      Soll ich auf dieser Welt
      Mein Leben höher bringen,
      Durch manchen sauren Tritt
      Hindurch ins Alter dringen,
      Ich will umkehren, dass ich sterbe in meiner Stadt,
      So gib Geduld, für Sünd
      Und Schanden mich bewahr,
      Auf dass ich tragen mag
      bei meines Vaters und meiner Mutter Grab.
      Mit Ehren graues Haar.
  - num: 3
    type: Chorus
    voices: SATB
    instruments: Organo
    de: |-
      Dein Alter sei wie deine Jugend,
      und Gott ist mit dir in allem, das du tust.
  - num: 4
    type: Aria
    voices: B
    instruments: Flauto I/II, Violoncello, Oboe I/II, Fagotto, Organo
    de: |-
      Tag und Nacht ist dein.
      Du machest, dass beide, Sonn und Gestirn, ihren gewissen Lauf
      haben. Du setzest einem jeglichen Lande seine Grenze.
  - num: 5
    type: Aria
    voices: ''
    instruments: Tromba I-III, Tamburi, Organo
    de: |-
      Durch mächtige Kraft
      Erhältst du unsre Grenzen,
      Hier muss der Friede glänzen,
      Wenn Mord und Kriegessturm
      Sich allerort erhebt.
      Wenn Kron und Zepter bebt,
      Hast du das Heil geschafft
      Durch mächtige Kraft!
  - num: 6
    type: Chorus
    voices: SATB
    instruments: Flauto I/II, Violoncello, Oboe I/II, Fagotto, Violino I/II, Viola, Violone, Organo
    de: Du wollest dem Feinde nicht geben die Seele deiner Turteltauben.
  - num: 7
    type: Chorus
    voices: SATB
    instruments: Tromba I-III, Tamburi, Flauto I/II, Violoncello, Oboe I/II, Fagotto, Violino I/II, Violone, Organo
    de: |-
      Das neue Regiment
      Auf jeglichen Wegen
      Bekröne mit Segen!
      Friede, Ruh und Wohlergehen,
      Müsse stets zur Seite stehen
      Dem neuen Regiment.
      Glück, Heil und großer Sieg
      Muss täglich von neuen
      Dich, Joseph, erfreuen,
      Dass an allen Ort und Landen
      Ganz beständig sei vorhanden
      Glück, Heil und großer Sieg!
