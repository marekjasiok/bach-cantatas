  url: https://en.wikipedia.org/wiki/Mit_Fried_und_Freud_ich_fahr_dahin%2C_BWV_125
  summary_html: >-
    <p>Johann Sebastian Bach composed the cantata <b><span><i lang="de">Mit Fried und Freud ich fahr
    dahin</i></span></b>, <b><span class="nowrap">BWV 125</span></b>, for use in a Lutheran service. He composed this
    chorale cantata in Leipzig in 1725 for the feast for the Purification of Mary, which is celebrated on 2 February and
    is also known as Candlemas. The cantata is based on Martin Luther's 1524 hymn "<span><span
    style="font-style:normal">Mit Fried und Freud ich fahr dahin</span></span>" and forms part of Bach's chorale cantata
