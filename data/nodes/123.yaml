wiki:
  summary: "Liebster Immanuel, Herzog der Frommen, BWV\_123, is a church cantata by Johann Sebastian Bach. He composed it in Leipzig for Epiphany and first performed it on 6 January 1725. It is based on the 1679 hymn of the same name by Ahasverus Fritsch which is focused on the contrast of the vanities of the world and the trust in support by Jesus."
  image: https://upload.wikimedia.org/wikipedia/commons/thumb/4/45/Ahasverus_Fritsch.jpg/330px-Ahasverus_Fritsch.jpg
  url: https://en.wikipedia.org/wiki/Liebster_Immanuel%2C_Herzog_der_Frommen%2C_BWV_123
  summary_html: "<p><b><span><i lang=\"de\">Liebster Immanuel, Herzog der Frommen</i></span></b>, <b><abbr>BWV</abbr><span class=\"nowrap\">\_</span>123</b>, is a church cantata by Johann Sebastian Bach. He composed it in Leipzig for Epiphany and first performed it on 6 January 1725. It is based on the 1679 hymn of the same name by Ahasverus Fritsch which is focused on the contrast of the vanities of the world and the trust in support by Jesus.</p>"
