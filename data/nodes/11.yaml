wiki:
  summary: >-
    Lobet Gott in seinen Reichen, BWV 11, known as the Ascension Oratorio, is an oratorio by Johann Sebastian Bach,
    marked by him as Oratorium In Festo Ascensionis Xsti, composed for the service for Ascension and probably first
    performed on 15 May 1738.
  image: >-
    https://upload.wikimedia.org/wikipedia/commons/thumb/4/4b/Jelenia_G._Church_ascending.JPG/330px-Jelenia_G._Church_ascending.JPG
  url: https://en.wikipedia.org/wiki/Lobet_Gott_in_seinen_Reichen%2C_BWV_11
  summary_html: >-
    <p><b><span><i lang="de">Lobet Gott in seinen Reichen</i></span></b>, <b><span class="nowrap">BWV 11</span></b>,
    known as the <i><b>Ascension Oratorio</b></i>, is an oratorio by Johann Sebastian Bach, marked by him as <span><i
    lang="la">Oratorium In Festo Ascensionis Xsti</i></span>, composed for the service for Ascension and probably first
    performed on 15 May 1738.</p>
