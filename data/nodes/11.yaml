bwv: '11'
title: Lobet Gott in seinen Reichen
cycle: LATE
occasion: Ascension
date: 1735 (_Ascension Oratorio_)
url: https://en.wikipedia.org/wiki/Ascension_Oratorio
edges: {}
movements:
  - num: 1
    type: Chorus
    voices: T
    instruments: Tromba I-III, Tamburi, Flauto traverso I/II, Oboe I/II, Violino I/II, Viola, Continuo
    de: |-
      Lobet Gott in seinen Reichen,
      Preiset ihn in seinen Ehren,
      Rühmet ihn in seiner Pracht;
      Sucht sein Lob recht zu vergleichen,
      Wenn ihr mit gesamten Chören
      Ihm ein Lied zu Ehren macht!
  - num: 2
    type: Recitative
    voices: T
    instruments: Continuo
    de: |-
      Der Herr Jesus hub seine Hände auf
      und segnete seine Jünger,
      und es geschah, da er sie segnete, schied er von ihnen.
  - num: 3
    type: Recitative
    voices: B
    instruments: Flauto traverso I/II, Continuo
    de: |-
      Ach, Jesu, ist dein Abschied schon so nah?
      Ach, ist denn schon die Stunde da,
      Da wir dich von uns lassen sollen?
      Ach, siehe, wie die heißen Tränen
      Von unsern blassen Wangen rollen,
      Wie wir uns nach dir sehnen,
      Wie uns fast aller Trost gebricht.
      Ach, weiche doch noch nicht!
  - num: 4
    type: Aria
    voices: A
    instruments: Violini all' unisono, Continuo
    de: |-
      Ach, bleibe doch, mein liebstes Leben,
      Ach, fliehe nicht so bald von mir!
      Dein Abschied und dein frühes Scheiden
      Bringt mir das allergrößte Leiden,
      Ach ja, so bleibe doch noch hier;
      Sonst werd ich ganz von Schmerz umgeben.
  - num: 5
    type: Recitative
    voices: T
    instruments: Continuo
    de: |-
      Und ward aufgehaben zusehends und fuhr auf gen Himmel,
      eine Wolke nahm ihn weg vor ihren Augen,
      und er sitzet zur rechten Hand Gottes.
  - num: 6
    type: Chorale
    voices: SATB
    instruments: >-
      Flauto traverso I/II in octava e Oboe I e Violino I col Soprano, Oboe II e Violino II coll' Alto, Viola col
      Tenore, Continuo
    de: |-
      Nun lieget alles unter dir,
      Dich selbst nur ausgenommen;
      Die Engel müssen für und für
      Dir aufzuwarten kommen.
      Die Fürsten stehn auch auf der Bahn
      Und sind dir willig untertan;
      Luft, Wasser, Feuer, Erden
      Muss dir zu Dienste werden.
  - num: 8
    type: Aria
    voices: S
    instruments: Flauto traverso I/II, Oboe I e Violini e Viola all' unisono
    de: |-
      Jesu, deine Gnadenblicke
      Kann ich doch beständig sehn.
      Deine Liebe bleibt zurücke,
      Dass ich mich hier in der Zeit
      An der künftgen Herrlichkeit
      Schon voraus im Geist erquicke,
      Wenn wir einst dort vor dir stehn.
  - num: 9
    type: Chorale
    voices: T
    instruments: Tromba I-III, Tamburi, Flauto traverso I/II, Oboe I/II, Violino I/II, Viola, Continuo
    de: |-
      Wenn soll es doch geschehen,
      Wenn kömmt die liebe Zeit,
      Dass ich ihn werde sehen,
      In seiner Herrlichkeit?
      Du Tag, wenn wirst du sein,
      Dass wir den Heiland grüßen,
      Dass wir den Heiland küssen?
      Komm, stelle dich doch ein!
