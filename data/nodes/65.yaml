wiki:
  summary: "Sie werden aus Saba alle kommen, BWV\_65, is a church cantata by Johann Sebastian Bach. He composed it in 1724 in Leipzig for Epiphany and first performed it on 6 January 1724 as part of his first cantata cycle."
