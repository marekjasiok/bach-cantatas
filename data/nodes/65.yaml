  url: https://en.wikipedia.org/wiki/Sie_werden_aus_Saba_alle_kommen%2C_BWV_65
  summary_html: "<p><b><span><i lang=\"de\">Sie werden aus Saba alle kommen</i></span></b>, <b><abbr>BWV</abbr><span class=\"nowrap\">\_</span>65</b>, is a church cantata by Johann Sebastian Bach. He composed it in 1724 in Leipzig for Epiphany and first performed it on 6 January 1724 as part of his first cantata cycle.</p>"
