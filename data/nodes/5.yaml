wiki:
  summary: "Johann Sebastian Bach composed the church cantata (Bach) Wo soll ich fliehen hin, BWV\_5, in Leipzig for the 19th Sunday after Trinity and first performed it on 15 October 1724. It is based on the penitential hymn \"Wo soll ich fliehen hin\" by Johann Heermann."
  image: >-
    https://upload.wikimedia.org/wikipedia/commons/thumb/3/3a/J._S._Bach_-_%27Wo_soll_ich_fliehen_hin%27_%28BWV5%29_-_manuscript_-_02_%28right%29.jpg/330px-J._S._Bach_-_%27Wo_soll_ich_fliehen_hin%27_%28BWV5%29_-_manuscript_-_02_%28right%29.jpg
  url: https://en.wikipedia.org/wiki/Wo_soll_ich_fliehen_hin%2C_BWV_5
  summary_html: "<p>Johann Sebastian Bach composed the church cantata (Bach) <b><span><i lang=\"de\">Wo soll ich fliehen hin</i></span></b>, <b><abbr>BWV</abbr><span class=\"nowrap\">\_</span>5</b>, in Leipzig for the 19th Sunday after Trinity and first performed it on 15 October 1724. It is based on the penitential hymn \"Wo soll ich fliehen hin\" by Johann Heermann.</p>"
