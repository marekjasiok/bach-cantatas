wiki:
  summary: "Erhalt uns, Herr, bei deinem Wort, BWV\_126, is a cantata by Johann Sebastian Bach for use in a Lutheran service. He composed the chorale cantata in 1725 in Leipzig for the Sunday Sexagesimae, the second Sunday before Lent, and first performed it on 4 February 1725. It is based on the hymn \"Erhalt uns, Herr, bei deinem Wort\" by Martin Luther, published in 1542. The hymn text at Bach's time also included two stanzas by Justus Jonas and Luther's \"Verleih uns Frieden gnädiglich\"."
  image: >-
    https://upload.wikimedia.org/wikipedia/commons/thumb/c/cc/Lucas_Cranach_d._J._014.jpg/330px-Lucas_Cranach_d._J._014.jpg
  url: https://en.wikipedia.org/wiki/Erhalt_uns%2C_Herr%2C_bei_deinem_Wort%2C_BWV_126
  summary_html: "<p><b><span><i lang=\"de\">Erhalt uns, Herr, bei deinem Wort</i></span></b>, <b><abbr>BWV</abbr><span class=\"nowrap\">\_</span>126</b>, is a cantata by Johann Sebastian Bach for use in a Lutheran service. He composed the chorale cantata in 1725 in Leipzig for the Sunday Sexagesimae, the second Sunday before Lent, and first performed it on 4 February 1725. It is based on the hymn \"Erhalt uns, Herr, bei deinem Wort\" by Martin Luther, published in 1542. The hymn text at Bach's time also included two stanzas by Justus Jonas and Luther's \"Verleih uns Frieden gnädiglich\".</p>"
