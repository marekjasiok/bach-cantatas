wiki:
  summary: >-
    Herr Gott, dich loben wir, BWV 16, is a church cantata for New Year's Day by Johann Sebastian Bach. It was first
    performed on 1 January 1726 in Leipzig, as part of the composer's third cantata cycle. Its libretto is by Georg
    Christian Lehms, as for three other of Bach's cantatas for the Christmas season that started with Unser Mund sei
    voll Lachens, BWV 110 on Christmas Day. He opened his text with the beginning of "Herr Gott, dich loben wir",
    Luther's German Te Deum, and continued with expressing thanks for the completed year and prayers for future
    blessing. The cantata is closed with a stanza from Paul Eber's "Helft mir Gotts Güte preisen" for the closing
    chorale. Bach structured the work in six movements and scored it for three vocal soloists, a four-part choir, corno
    da caccia, oboes, strings and basso continuo. The work features an unusual aria performed by a soloist with the
    choir.
  image: >-
    https://upload.wikimedia.org/wikipedia/commons/thumb/b/bb/Galante_Poetinnen_0001.png/330px-Galante_Poetinnen_0001.png
  url: https://en.wikipedia.org/wiki/Herr_Gott%2C_dich_loben_wir%2C_BWV_16
  summary_html: >-
    <p><b><span><i lang="de">Herr Gott, dich loben wir</i></span></b>, <span class="nowrap">BWV 16</span>, is a church
    cantata for New Year's Day by Johann Sebastian Bach. It was first performed on 1 January 1726 in Leipzig, as part of
    the composer's third cantata cycle. Its libretto is by Georg Christian Lehms, as for three other of Bach's cantatas
    for the Christmas season that started with <span><span><span><i>Unser Mund sei voll Lachens</i>, BWV
    110</span></span></span> on Christmas Day. He opened his text with the beginning of "Herr Gott, dich loben wir",
    Luther's German Te Deum, and continued with expressing thanks for the completed year and prayers for future
    blessing. The cantata is closed with a stanza from Paul Eber's "Helft mir Gotts Güte preisen" for the closing
    chorale. Bach structured the work in six movements and scored it for three vocal soloists, a four-part choir, corno
    da caccia, oboes, strings and basso continuo. The work features an unusual aria performed by a soloist with the
    choir.</p>
