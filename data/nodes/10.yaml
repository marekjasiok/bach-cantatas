wiki:
  summary: "In 1724 Johann Sebastian Bach composed the church cantata Meine Seel erhebt den Herren, BWV\_10, as part of his second cantata cycle. Taken from Martin Luther's German translation of the Magnificat canticle, the title translates as \"My soul magnifies the Lord\". Also known as Bach's German Magnificat, the work follows his chorale cantata format."
  image: >-
    https://upload.wikimedia.org/wikipedia/commons/thumb/2/27/Heimsuchung%2C_Unionskirche.jpg/330px-Heimsuchung%2C_Unionskirche.jpg
  url: https://en.wikipedia.org/wiki/Meine_Seel_erhebt_den_Herren%2C_BWV_10
  summary_html: "<p>In 1724 Johann Sebastian Bach composed the church cantata <i><b>Meine Seel erhebt den Herren</b></i>, <b><abbr>BWV</abbr><span class=\"nowrap\">\_</span>10</b>, as part of his second cantata cycle. Taken from Martin Luther's German translation of the Magnificat canticle, the title translates as \"My soul magnifies the Lord\". Also known as Bach's <i>German Magnificat</i>, the work follows his chorale cantata format.</p>"
