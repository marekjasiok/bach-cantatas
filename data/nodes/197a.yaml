wiki:
  summary: "Ehre sei Gott in der Höhe, BWV\_197a (197.1), is a Christmas cantata by Johann Sebastian Bach. He composed it in Leipzig for the First Day of Christmas in 1728 or 1729."
  image: https://upload.wikimedia.org/wikipedia/commons/thumb/1/1e/Caspar_Ziegler.jpg/330px-Caspar_Ziegler.jpg
  url: https://en.wikipedia.org/wiki/Ehre_sei_Gott_in_der_H%C3%B6he%2C_BWV_197a
  summary_html: "<p><b><span><i lang=\"de\">Ehre sei Gott in der Höhe</i></span></b>, <b><span><abbr>BWV</abbr></span><span class=\"nowrap\">\_</span>197a (197.1)</b>, is a Christmas cantata by Johann Sebastian Bach. He composed it in Leipzig for the First Day of Christmas in 1728 or 1729.</p>"
