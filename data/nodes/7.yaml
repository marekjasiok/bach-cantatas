wiki:
  summary: "Christ unser Herr zum Jordan kam, BWV\_7, is one of several church cantatas which Johann Sebastian Bach composed\nfor the Feast of St. John the Baptist. He wrote it in Leipzig and led its first performance on 24 June 1724."
  image: >-
    https://upload.wikimedia.org/wikipedia/commons/thumb/f/fc/Jos%C3%A9_de_Ribera_063.jpg/330px-Jos%C3%A9_de_Ribera_063.jpg
  url: https://en.wikipedia.org/wiki/Christ_unser_Herr_zum_Jordan_kam%2C_BWV_7
  summary_html: "<p><b><span><i lang=\"de\">Christ unser Herr zum Jordan kam</i></span></b>, <b><abbr>BWV</abbr><span class=\"nowrap\">\_</span>7</b>, is one of several church cantatas which Johann Sebastian Bach composed\nfor the Feast of St. John the Baptist. He wrote it in Leipzig and led its first performance on 24 June 1724.</p>"
