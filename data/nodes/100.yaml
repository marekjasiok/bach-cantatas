wiki:
  summary: >-
    Was Gott tut, das ist wohlgetan, BWV 100, is a church cantata by Johann Sebastian Bach. He composed it in Leipzig
    between 1732 and 1735. The chorale cantata is based on the hymn "Was Gott tut, das ist wohlgetan" Samuel Rodigast
    (1674).
  image: >-
    https://upload.wikimedia.org/wikipedia/commons/thumb/a/a0/BWV100-autograph-manuscript.jpeg/330px-BWV100-autograph-manuscript.jpeg
  url: https://en.wikipedia.org/wiki/Was_Gott_tut%2C_das_ist_wohlgetan%2C_BWV_100
  summary_html: >-
    <p><b><span><i lang="de">Was Gott tut, das ist wohlgetan</i></span></b>, <b><span class="nowrap">BWV 100</span></b>,
    is a church cantata by Johann Sebastian Bach. He composed it in Leipzig between 1732 and 1735. The chorale cantata
    is based on the hymn "<span><span style="font-style:normal">Was Gott tut, das ist wohlgetan</span></span>" Samuel
    Rodigast (1674).</p>
