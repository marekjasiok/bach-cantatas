wiki:
  summary: >-
    Nach dir, Herr, verlanget mich, BWV 150, is an early church cantata by Johann Sebastian Bach composed for an unknown
    occasion. It is unique among Bach's cantatas in its sparse orchestration and in the independence and prominence of
    the chorus, which is featured in four out of seven movements. The text alternates verses from Psalm 25 and poetry by
    an unknown librettist. Bach scored the work for four vocal parts and a small Baroque instrumental ensemble of two
    violins, bassoon and basso continuo.
  image: https://upload.wikimedia.org/wikipedia/commons/thumb/9/93/Young_Bach2.jpg/330px-Young_Bach2.jpg
  url: https://en.wikipedia.org/wiki/Nach_dir%2C_Herr%2C_verlanget_mich%2C_BWV_150
  summary_html: >-
    <p><i><b><span><i lang="de">Nach dir, Herr, verlanget mich</i></span></b></i>, <b><span class="nowrap">BWV
    150</span></b>, is an early church cantata by Johann Sebastian Bach composed for an unknown occasion. It is unique
    among Bach's cantatas in its sparse orchestration and in the independence and prominence of the chorus, which is
    featured in four out of seven movements. The text alternates verses from Psalm 25 and poetry by an unknown
    librettist. Bach scored the work for four vocal parts and a small Baroque instrumental ensemble of two violins,
    bassoon and basso continuo.</p>
