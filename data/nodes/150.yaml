bwv: '150'
title: Nach dir, Herr, verlanget mich
cycle: EARLY
occasion: Unknown
date: c. 1704–1707 (Arnstadt) [^1]
url: https://en.wikipedia.org/wiki/BWV_150
edges: {}
movements:
  - num: 1
    type: Sinfonia
    voices: ''
    instruments: Fagotto, Violino I/II, Continuo
    de: ''
  - num: 2
    type: Chorus
    voices: SATB
    instruments: Fagotto, Violino I/II, Continuo
    de: |-
      Nach dir, Herr, verlanget mich.
      Mein Gott, ich hoffe auf dich. Lass mich nicht zuschanden werden,
      dass sich meine Feinde nicht freuen über mich.
  - num: 3
    type: Aria
    voices: S
    instruments: Violino I/II, Continuo
    de: |-
      Doch bin und bleibe ich vergnügt,
      Obgleich hier zeitlich toben
      Kreuz, Sturm und andre Proben,
      Tod, Höll und was sich fügt.
      Ob Unfall schlägt den treuen Knecht,
      Recht ist und bleibet ewig Recht.
  - num: 4
    type: Chorus
    voices: SATB
    instruments: Fagotto, Violino I/II, Continuo
    de: |-
      Leite mich in deiner Wahrheit und lehre mich;
      denn du bist der Gott, der mir hilft, täglich harre ich dein.
  - num: 5
    type: Aria
    voices: ''
    instruments: Fagotto, Continuo
    de: |-
      Zedern müssen von den Winden
      Oft viel Ungemach empfinden,
      Oftmals werden sie verkehrt.
      Rat und Tat auf Gott gestellet,
      Achtet nicht, was widerbellet,
      Denn sein Wort ganz anders lehrt.
  - num: 6
    type: Chorus
    voices: SATB
    instruments: Fagotto, Violino I/II, Continuo
    de: |-
      Meine Augen sehen stets zu dem Herrn;
      denn er wird meinen Fuß aus dem Netze ziehen.
  - num: 7
    type: Chorus
    voices: SATB
    instruments: Fagotto, Violino I/II, Continuo
    de: |-
      Meine Tage in dem Leide
      Endet Gott dennoch zur Freude;
      Christen auf den Dornenwegen
      Führen Himmels Kraft und Segen.
      Bleibet Gott mein treuer Schutz,
      Achte ich nicht Menschentrutz,
      Christus, der uns steht zur Seiten,
      Hilft mir täglich sieghaft streiten.
