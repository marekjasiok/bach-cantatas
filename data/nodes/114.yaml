wiki:
  summary: "Johann Sebastian Bach composed the church cantata Ach, lieben Christen, seid getrost, BWV\_114, in Leipzig for the 17th Sunday after Trinity and first performed it on 1 October 1724. It is based on a 1561 hymn of penitence by Johannes Gigas. Its tune is featured in three of the work's seven movements."
  image: https://upload.wikimedia.org/wikipedia/commons/thumb/d/d4/Johannes-Gigas.jpg/330px-Johannes-Gigas.jpg
  url: https://en.wikipedia.org/wiki/Ach%2C_lieben_Christen%2C_seid_getrost%2C_BWV_114
  summary_html: "<p>Johann Sebastian Bach composed the church cantata <b><span><i lang=\"de\">Ach, lieben Christen, seid getrost</i></span></b>, <b><abbr>BWV</abbr><span class=\"nowrap\">\_</span>114</b>, in Leipzig for the 17th Sunday after Trinity and first performed it on 1 October 1724. It is based on a 1561 hymn of penitence by Johannes Gigas. Its tune is featured in three of the work's seven movements.</p>"
