wiki:
  summary: "Ich bin ein guter Hirt, BWV\_85, is a church cantata by Johann Sebastian Bach. He composed it in Leipzig for the second Sunday after Easter and first performed it on 15 April 1725. He wrote the cantata in the second calendar year of his tenure as Thomaskantor that began in May 1723, but he assigned it to his third cantata cycle."
  image: >-
    https://upload.wikimedia.org/wikipedia/commons/thumb/7/7e/A_page_from_Ich_bin_ein_guter_Hirt_BWV_85_by_J.S._Bach_%281%29.jpg/330px-A_page_from_Ich_bin_ein_guter_Hirt_BWV_85_by_J.S._Bach_%281%29.jpg
  url: https://en.wikipedia.org/wiki/Ich_bin_ein_guter_Hirt%2C_BWV_85
  summary_html: "<p><b><span><i lang=\"de\">Ich bin ein guter Hirt</i></span></b>, <b><abbr>BWV</abbr><span class=\"nowrap\">\_</span>85</b>, is a church cantata by Johann Sebastian Bach. He composed it in Leipzig for the second Sunday after Easter and first performed it on 15 April 1725. He wrote the cantata in the second calendar year of his tenure as Thomaskantor that began in May 1723, but he assigned it to his third cantata cycle.</p>"
