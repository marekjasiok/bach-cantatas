    https://upload.wikimedia.org/wikipedia/commons/thumb/6/66/Page_5_from_Unser_Mund_sei_voll_Lachens%2C_BWV_110_by_J.S._Bach_I1%29.jpg/330px-Page_5_from_Unser_Mund_sei_voll_Lachens%2C_BWV_110_by_J.S._Bach_I1%29.jpg
  url: https://en.wikipedia.org/wiki/Unser_Mund_sei_voll_Lachens%2C_BWV_110
  summary_html: "<p><b><span><i lang=\"de\">Unser Mund sei voll Lachens</i></span></b>, <b><abbr>BWV</abbr><span class=\"nowrap\">\_</span>110</b>, is a church cantata by Johann Sebastian Bach. He composed the Christmas cantata in Leipzig for Christmas Day and first performed it on 25 December 1725.</p>"
key: F major
