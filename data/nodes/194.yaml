wiki:
  summary: >-
    Höchsterwünschtes Freudenfest, BWV 194, is a church cantata by Johann Sebastian Bach. He composed it in Leipzig for
    dedication of the church and organ at Störmthal on 2 November 1723.
  image: >-
    https://upload.wikimedia.org/wikipedia/commons/thumb/d/d1/Hildebrandt-Orgel_St%C3%B6rmthal.jpg/330px-Hildebrandt-Orgel_St%C3%B6rmthal.jpg
  url: https://en.wikipedia.org/wiki/H%C3%B6chsterw%C3%BCnschtes_Freudenfest%2C_BWV_194
  summary_html: >-
    <p><b><span><i lang="de">Höchsterwünschtes Freudenfest</i></span></b>, <b><span class="nowrap">BWV 194</span></b>,
    is a church cantata by Johann Sebastian Bach. He composed it in Leipzig for dedication of the church and organ at
    Störmthal on 2 November 1723.</p>
