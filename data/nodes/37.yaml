wiki:
  summary: >-
    Wer da gläubet und getauft wird, BWV 37, is a cantata by Johann Sebastian Bach, a church cantata for the feast of
    the Ascension of Jesus. Bach composed it in Leipzig and first performed it on 18 May 1724.
  image: >-
    https://upload.wikimedia.org/wikipedia/commons/thumb/4/4b/Jelenia_G._Church_ascending.JPG/330px-Jelenia_G._Church_ascending.JPG
  url: https://en.wikipedia.org/wiki/Wer_da_gl%C3%A4ubet_und_getauft_wird%2C_BWV_37
  summary_html: >-
    <p><b><span><i lang="de">Wer da gläubet und getauft wird</i></span></b>, <b><span class="nowrap">BWV 37</span></b>,
    is a cantata by Johann Sebastian Bach, a church cantata for the feast of the Ascension of Jesus. Bach composed it in
    Leipzig and first performed it on 18 May 1724.</p>
