bwv: '37'
title: Wer da gläubet und getauft wird
cycle: C1
occasion: Ascension
date: '1724-05-18'
url: https://en.wikipedia.org/wiki/BWV_37
edges: {}
movements:
  - num: 1
    type: Chorus
    voices: SATB
    instruments: Oboe d'amore I/II, Violino I/II, Viola, Continuo
    de: Wer da gläubet und getauft wird, der wird selig werden.
  - num: 2
    type: Aria
    voices: T
    instruments: Violino, Continuo
    de: |-
      Der Glaube ist das Pfand der Liebe,
      Die Jesus für die Seinen hegt.
      Drum hat er bloß aus Liebestriebe,
      Da er ins Lebensbuch mich schriebe,
      Mir dieses Kleinod beigelegt.
  - num: 3
    type: Chorale
    voices: SATB
    instruments: Continuo
    de: |-
      Herr Gott Vater, mein starker Held!
      Du hast mich ewig vor der Welt
      In deinem Sohn geliebet.
      Dein Sohn hat mich ihm selbst vertraut,
      Er ist mein Schatz, ich bin sein Braut,
      Sehr hoch in ihm erfreuet.
      Eia!
      Eia!
      Himmlisch Leben wird er geben mir dort oben;
      Ewig soll mein Herz ihn loben.
  - num: 4
    type: Recitative
    voices: B
    instruments: Violino I/II, Viola, Continuo
    de: |-
      Ihr Sterblichen, verlanget ihr,
      Mit mir
      Das Antlitz Gottes anzuschauen?
      So dürft ihr nicht auf gute Werke bauen;
      Denn ob sich wohl ein Christ
      Muss in den guten Werken üben,
      Weil es der ernste Wille Gottes ist,
      So macht der Glaube doch allein,
      Dass wir vor Gott gerecht und selig sein.
  - num: 5
    type: Aria
    voices: B
    instruments: Oboe d'amore I, Violino I/II, Viola, Continuo
    de: |-
      Der Glaube schafft der Seele Flügel,
      Dass sie sich in den Himmel schwingt,
      Die Taufe ist das Gnadensiegel,
      Das uns den Segen Gottes bringt;
      Und daher heißt ein selger Christ,
      Wer gläubet und getaufet ist.
  - num: 6
    type: Chorale
    voices: SATB
    instruments: Oboe d'amore I e Violino I col Soprano, Oboe d'amore II e Violino II coll' Alto, Viola col Tenore, Continuo
    de: |-
      Den Glauben mir verleihe
      An dein' Sohn Jesum Christ,
      Mein Sünd mir auch verzeihe
      Allhier zu dieser Frist.
      Du wirst mir nicht versagen,
      Was du verheißen hast,
      Dass er mein Sünd tu tragen
      Und lös mich von der Last.
scoring: 'Soli: S A T B, Coro: S A T B, Oboe d''amore I/II, Violino I/II, Viola, Continuo'
