bwv: '177'
title: Ich ruf zu dir, Herr Jesu Christ
cycle: LATE
occasion: Trinity IV
date: '1732'
url: https://en.wikipedia.org/wiki/BWV_177
movements:
  - num: 1
    type: Chorus
    voices: S, A, T, B
    instruments: Oboe I/II, Violino concertante, Violino I/II, Viola, Continuo
    de: |-
      Ich ruf zu dir, Herr Jesu Christ,
      Ich bitt, erhör mein Klagen,
      Verleih mir Gnad zu dieser Frist,
      Laß mich doch nicht verzagen;
      Den rechten Glauben, Herr, ich mein,
      Den wollest du mir geben,
      Dir zu leben,
      Meinm Nächsten nütz zu sein,
      Dein Wort zu halten eben.
  - num: 2
    type: Aria
    voices: A
    instruments: Continuo
    de: |-
      Ich bitt noch mehr, o Herre Gott,
      Du kannst es mir wohl geben:
      Dass ich werd nimmermehr zu Spott,
      Die Hoffnung gib darneben,
      Voraus, wenn ich muss hier davon,
      Dass ich dir mög vertrauen
      Und nicht bauen
      Auf alles mein Tun,
      Sonst wird mich's ewig reuen.
  - num: 3
    type: Aria
    voices: S
    instruments: Oboe da caccia, Continuo
    de: |-
      Verleih, dass ich aus Herzensgrund
      Mein' Feinden mög vergeben,
      Verzeih mir auch zu dieser Stund,
      Gib mir ein neues Leben;
      Dein Wort mein Speis lass allweg sein,
      Damit mein Seel zu nähren,
      Mich zu wehren,
      Wenn Unglück geht daher,
      Das mich bald möcht abkehren.
  - num: 4
    type: Aria
    voices: T
    instruments: Violino concertante, Fagotto obligato, Continuo
    de: |-
      Laß mich kein Lust noch Furcht von dir
      In dieser Welt abwenden.
      Beständigsein ans End gib mir,
      Du hast's allein in Händen;
      Und wem du's gibst, der hat's umsonst:
      Es kann niemand ererben
      Noch erwerben
      Durch Werke deine Gnad,
      Die uns errett' vom Sterben.
  - num: 5
    type: Chorale
    voices: S, A, T, B
    instruments: Oboe I/II e Violino I col Soprano, Violino II coll'Alto, Viola col Tenore, Fagotto, Continuo
    de: |-
      Ich lieg im Streit und widerstreb,
      Hilf, o Herr Christ, dem Schwachen!
      An deiner Gnad allein ich kleb,
      Du kannst mich stärker machen.
      Kömmt nun Anfechtung, Herr, so wehr,
      Dass sie mich nicht umstoßen.
      Du kannst maßen,
      Dass mir's nicht bring Gefahr;
      Ich weiß, du wirst's nicht lassen.
