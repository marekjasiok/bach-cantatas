wiki:
  summary: "Johann Sebastian Bach composed the church cantata Ich ruf zu dir, Herr Jesu Christ, BWV\_177. He wrote the chorale cantata in Leipzig for the fourth Sunday after Trinity and first performed it on 6 July 1732. The cantata text is formed by the unchanged five stanzas of Johann Agricola's hymn."
  image: >-
    https://upload.wikimedia.org/wikipedia/commons/thumb/7/76/Johannes-Agricola-Eisleben-.jpg/330px-Johannes-Agricola-Eisleben-.jpg
  url: https://en.wikipedia.org/wiki/Ich_ruf_zu_dir%2C_Herr_Jesu_Christ%2C_BWV_177
  summary_html: "<p>Johann Sebastian Bach composed the church cantata <b><span><i lang=\"de\">Ich ruf zu dir, Herr Jesu Christ</i></span></b>, <b><abbr>BWV</abbr><span class=\"nowrap\">\_</span>177</b>. He wrote the chorale cantata in Leipzig for the fourth Sunday after Trinity and first performed it on 6 July 1732. The cantata text is formed by the unchanged five stanzas of Johann Agricola's hymn.</p>"
