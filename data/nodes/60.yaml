wiki:
  summary: "O Ewigkeit, du Donnerwort, BWV\_60, is a church cantata for the 24th Sunday after Trinity composed by Johann Sebastian Bach. It was first performed in Leipzig on 7\_November 1723, and is part of Bach's first cantata cycle. It is one of Bach's dialogue cantatas: its topic, fear of death and hope of salvation, plays out mainly through a conversation between two allegorical figures, Fear and Hope."
  image: >-
    https://upload.wikimedia.org/wikipedia/commons/thumb/0/07/Bach_es_ist_genug_%28DYK%29.png/330px-Bach_es_ist_genug_%28DYK%29.png
  url: https://en.wikipedia.org/wiki/O_Ewigkeit%2C_du_Donnerwort%2C_BWV_60
  summary_html: "<p><b><span><i lang=\"de\">O Ewigkeit, du Donnerwort</i></span></b>, <b><abbr>BWV</abbr><span class=\"nowrap\">\_</span>60</b>, is a church cantata for the 24th Sunday after Trinity composed by Johann Sebastian Bach. It was first performed in Leipzig on 7\_November 1723, and is part of Bach's first cantata cycle. It is one of Bach's dialogue cantatas: its topic, fear of death and hope of salvation, plays out mainly through a conversation between two allegorical figures, Fear and Hope.</p>"
