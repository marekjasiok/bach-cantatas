wiki:
  summary: "Johann Sebastian Bach composed the church cantata Allein zu dir, Herr Jesu Christ, BWV\_33, in Leipzig in 1724 for the thirteenth Sunday after Trinity and first performed it on 3 September 1724. The chorale cantata is based on the 1540 hymn \"Allein zu dir, Herr Jesu Christ\" by Konrad Hubert."
  image: >-
    https://upload.wikimedia.org/wikipedia/commons/thumb/e/e9/Allein_zu_dir%2C_Herr_Jesu_Christ_%28autograph_manuscrip.jpg/330px-Allein_zu_dir%2C_Herr_Jesu_Christ_%28autograph_manuscrip.jpg
  url: https://en.wikipedia.org/wiki/Allein_zu_dir%2C_Herr_Jesu_Christ%2C_BWV_33
  summary_html: "<p>Johann Sebastian Bach composed the church cantata <b><span><i lang=\"de\">Allein zu dir, Herr Jesu Christ</i></span></b>, <span class=\"nowrap\"><b><abbr>BWV</abbr><span class=\"nowrap\">\_</span>33</b></span>, in Leipzig in 1724 for the thirteenth Sunday after Trinity and first performed it on 3 September 1724. The chorale cantata is based on the 1540 hymn \"Allein zu dir, Herr Jesu Christ\" by Konrad Hubert.</p>"
