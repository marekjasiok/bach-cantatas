wiki:
  summary: "Sehet, welch eine Liebe hat uns der Vater erzeiget, BWV\_64, is a church cantata by Johann Sebastian Bach. He composed the Christmas cantata in Leipzig in 1723 for the third day of Christmas, which is also the Feast of John the Evangelist, and first performed it on 27 December 1723."
  image: https://upload.wikimedia.org/wikipedia/commons/thumb/6/6c/El_Greco_034.jpg/330px-El_Greco_034.jpg
  url: https://en.wikipedia.org/wiki/Sehet%2C_welch_eine_Liebe_hat_uns_der_Vater_erzeiget%2C_BWV_64
  summary_html: "<p><b><span><i lang=\"de\">Sehet, welch eine Liebe hat uns der Vater erzeiget</i></span></b>, <b><abbr>BWV</abbr><span class=\"nowrap\">\_</span>64</b>, is a church cantata by Johann Sebastian Bach. He composed the Christmas cantata in Leipzig in 1723 for the third day of Christmas, which is also the Feast of John the Evangelist, and first performed it on 27 December 1723.</p>"
