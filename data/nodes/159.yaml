bwv: '159'
title: Sehet, wir gehn hinauf gen Jerusalem
cycle: PICANDER
occasion: Estomihi
date: '1729-02-27'
url: https://en.wikipedia.org/wiki/BWV_159
edges: {}
movements:
  - num: 1
    type: Aria
    voices: B
    instruments: Violino I/II, Viola, Continuo
    de: |-
      Bass
      Sehet!
      Alt
      Komm, schaue doch, mein Sinn,
      Wo geht dein Jesus hin?
      Bass
      Wir gehn hinauf
      Alt
      O harter Gang! hinauf?
      O ungeheurer Berg, den meine Sünden zeigen!
      Wie sauer wirst du müssen steigen!
      Bass
      Gen Jerusalem.
      Alt
      Ach, gehe nicht!
      Dein Kreuz ist dir schon zugericht',
      Wo du dich sollst zu Tode bluten;
      Hier sucht man Geißeln vor, dort bindt man Ruten;
      Die Bande warten dein;
      Ach, gehe selber nicht hinein!
      Doch bliebest du zurücke stehen,
      So müßt ich selbst nicht nach Jerusalem,
      Ach, leider in die Hölle gehen.
  - num: 2
    type: Aria
    voices: A
    instruments: Oboe col Soprano, Fagotto, Continuo
    de: |-
      Ich folge dir nach
      Ich will hier bei dir stehen,
      Verachte mich doch nicht!
      Durch Speichel und Schmach;
      Von dir will ich nicht gehen,
      Am Kreuz will ich dich noch umfangen,
      Bis dir dein Herze bricht.
      Dich lass ich nicht aus meiner Brust,
      Wenn dein Haupt wird erblassen
      Im letzten Todesstoß,
      Und wenn du endlich scheiden musst,
      Alsdenn will ich dich fassen,
      Sollst du dein Grab in mir erlangen.
      In meinen Arm und Schoß.
  - num: 3
    type: Recitative
    voices: T
    instruments: Continuo
    de: |-
      Nun will ich mich,
      Mein Jesu, über dich
      In meinem Winkel grämen;
      Die Welt mag immerhin
      Den Gift der Wollust zu sich nehmen,
      Ich labe mich an meinen Tränen
      Und will mich eher nicht
      Nach einer Freude sehnen,
      Bis dich mein Angesicht
      Wird in der Herrlichkeit erblicken,
      Bis ich durch dich erlöset bin;
      Da will ich mich mit dir erquicken.
  - num: 4
    type: Aria
    voices: B
    instruments: Oboe, Violino I/II, Viola, Continuo
    de: |-
      Es ist vollbracht,
      Das Leid ist alle,
      Wir sind von unserm Sündenfalle
      In Gott gerecht gemacht.
      Nun will ich eilen
      Und meinem Jesu Dank erteilen,
      Welt, gute Nacht!
      Es ist vollbracht!
  - num: 5
    type: Chorale
    voices: SATB
    instruments: Oboe e Violino I col Soprano, Violino II coll' Alto, Viola col Tenore, Continuo
    de: |-
      Jesu, deine Passion
      Ist mir lauter Freude,
      Deine Wunden, Kron und Hohn
      Meines Herzens Weide;
      Meine Seel auf Rosen geht,
      Wenn ich dran gedenke,
      In dem Himmel eine Stätt
      Mir deswegen schenke.
