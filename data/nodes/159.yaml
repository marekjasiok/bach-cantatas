wiki:
  summary: "Sehet, wir gehn hinauf gen Jerusalem, BWV\_159, is a church cantata by Johann Sebastian Bach. He composed it in Leipzig for the Sunday Estomihi, the last Sunday before Lent, and probably first performed it on 27 February 1729. The gospel reading for the Sunday, from the Gospel of Luke, includes Jesus announcing his suffering and death in Jerusalem. The cantata's theme and Bach's music foreshadow his Passion."
  image: >-
    https://upload.wikimedia.org/wikipedia/commons/thumb/0/0a/Leipzig_Nikolaikirche_um_1850.jpg/330px-Leipzig_Nikolaikirche_um_1850.jpg
  url: https://en.wikipedia.org/wiki/Sehet%2C_wir_gehn_hinauf_gen_Jerusalem%2C_BWV_159
  summary_html: "<p><b><span><i lang=\"de\">Sehet, wir gehn hinauf gen Jerusalem</i></span></b>, <b><abbr>BWV</abbr><span class=\"nowrap\">\_</span>159</b>, is a church cantata by Johann Sebastian Bach. He composed it in Leipzig for the Sunday <span><span style=\"font-style:normal\">Estomihi</span></span>, the last Sunday before Lent, and probably first performed it on 27 February 1729. The gospel reading for the Sunday, from the Gospel of Luke, includes Jesus announcing his suffering and death in Jerusalem. The cantata's theme and Bach's music foreshadow his Passion.</p>"
