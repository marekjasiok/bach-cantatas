wiki:
  summary: "Johann Sebastian Bach composed the church cantata Herr Christ, der einge Gottessohn, BWV\_96, in Leipzig for the 18th Sunday after Trinity and first performed it on 8 October 1724. The chorale cantata, part of Bach's second annual cycle, is based on the hymn in five stanzas \"Herr Christ, der einig Gotts Sohn\" by Elisabeth Cruciger, published in Eyn geystlich Gesangk Buchleyn in 1524."
  image: https://upload.wikimedia.org/wikipedia/commons/thumb/0/0d/Thomaskirche-1885.png/330px-Thomaskirche-1885.png
  url: https://en.wikipedia.org/wiki/Herr_Christ%2C_der_einge_Gottessohn%2C_BWV_96
  summary_html: "<p>Johann Sebastian Bach composed the church cantata <b><span><i lang=\"de\">Herr Christ, der einge Gottessohn</i></span></b>, <b><abbr>BWV</abbr><span class=\"nowrap\">\_</span>96</b>, in Leipzig for the 18th Sunday after Trinity and first performed it on 8 October 1724. The chorale cantata, part of Bach's second annual cycle, is based on the hymn in five stanzas \"<span><i lang=\"de\">Herr Christ, der einig Gotts Sohn</i></span>\" by Elisabeth Cruciger, published in <span><i lang=\"de\">Eyn geystlich Gesangk Buchleyn</i></span> in 1524.</p>"
