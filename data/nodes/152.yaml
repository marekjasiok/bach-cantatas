  url: https://en.wikipedia.org/wiki/Tritt_auf_die_Glaubensbahn%2C_BWV_152
  summary_html: "<p><b><span><i lang=\"de\">Tritt auf die Glaubensbahn</i></span></b>, <b><abbr>BWV</abbr><span class=\"nowrap\">\_</span>152</b>, is a church cantata by Johann Sebastian Bach. He composed this dialogue cantata in Weimar for the Sunday after Christmas and first performed it on 30 December 1714.</p>"
