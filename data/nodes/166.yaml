wiki:
  summary: "Wo gehest du hin?, BWV\_166, is a church cantata by Johann Sebastian Bach for Cantate Sunday, the fourth Sunday after Easter. Bach composed the work as part of his first cantata cycle for Leipzig and first performed it on 7 May 1724. The topic of the cantata is based on the Farewell Discourse from the Gospel of John, when Jesus announces a Comforter. Based on his question quoted from the narration, \"Where do you go?\", the cantata explores the direction in which life should go."
  image: https://upload.wikimedia.org/wikipedia/commons/thumb/0/0d/Thomaskirche-1885.png/330px-Thomaskirche-1885.png
  url: https://en.wikipedia.org/wiki/Wo_gehest_du_hin%3F_BWV_166
  summary_html: "<p><b><span><i lang=\"de\">Wo gehest du hin?</i></span></b>, <b><abbr>BWV</abbr><span class=\"nowrap\">\_</span>166</b>, is a church cantata by Johann Sebastian Bach for Cantate Sunday, the fourth Sunday after Easter. Bach composed the work as part of his first cantata cycle for Leipzig and first performed it on 7 May 1724. The topic of the cantata is based on the Farewell Discourse from the Gospel of John, when Jesus announces a Comforter. Based on his question quoted from the narration, \"Where do you go?\", the cantata explores the direction in which life should go.</p>"
