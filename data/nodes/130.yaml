wiki:
  summary: "Herr Gott, dich loben alle wir, BWV\_130, is a chorale cantata by Johann Sebastian Bach for the Feast of archangel Michael. It is based on Paul Eber's 1554 Lutheran hymn about the angels in twelve stanzas \"Herr Gott, dich loben alle wir\", to a melody known in English as Old 100th. The cantata was performed on that feast day in 1724."
  image: https://upload.wikimedia.org/wikipedia/commons/thumb/d/d4/Paul_Eber.jpg/330px-Paul_Eber.jpg
  url: https://en.wikipedia.org/wiki/Herr_Gott%2C_dich_loben_alle_wir%2C_BWV_130
  summary_html: "<p><i><b><span><i lang=\"de\">Herr Gott, dich loben alle wir</i></span></b></i>, BWV<span class=\"nowrap\">\_</span>130, is a chorale cantata by Johann Sebastian Bach for the Feast of archangel Michael. It is based on Paul Eber's 1554 Lutheran hymn about the angels in twelve stanzas \"Herr Gott, dich loben alle wir\", to a melody known in English as Old 100th. The cantata was performed on that feast day in 1724.</p>"
