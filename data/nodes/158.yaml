bwv: '158'
title: Der Friede sei mit dir
cycle: EARLY
occasion: Easter Tuesday
date: c. 1708–1717 (date disputed)
url: https://en.wikipedia.org/wiki/BWV_158
edges: {}
movements:
  - num: 1
    type: Recitative
    voices: B
    instruments: Continuo
    de: |-
      Der Friede sei mit dir,
      Du ängstliches Gewissen!
      Dein Mittler stehet hier,
      Der hat dein Schuldenbuch
      Und des Gesetzes Fluch
      Verglichen und zerrissen.
      Der Friede sei mit dir,
      Der Fürste dieser Welt,
      Der deiner Seele nachgestellt,
      Ist durch des Lammes Blut bezwungen und gefällt.
      Mein Herz, was bist du so betrübt,
      Da dich doch Gott durch Christum liebt!
      Er selber spricht zu mir:
      Der Friede sei mit dir!
  - num: 2
    type: Aria
    voices: B
    instruments: Violino solo, Oboe col Soprano, Continuo
    de: |-
      Welt, ade, ich bin dein müde,
      Welt, ade, ich bin dein müde,
      Salems Hütten stehn mir an,
      Ich will nach dem Himmel zu,
      Wo ich Gott in Ruh und Friede
      Da wird sein der rechte Friede
      Ewig selig schauen kann.
      Und die ewig stolze Ruh.
      Da bleib ich, da hab ich Vergnügen zu wohnen,
      Welt, bei dir ist Krieg und Streit,
      Nichts denn lauter Eitelkeit;
      Da prang ich gezieret mit himmlischen Kronen.
      In dem Himmel allezeit
      Friede, Freud und Seligkeit.
  - num: 3
    type: Recitative
    voices: ''
    instruments: Continuo
    de: |-
      Nun, Herr, regiere meinen Sinn,
      Damit ich auf der Welt,
      So lang es dir, mich hier zu lassen, noch gefällt,
      Ein Kind des Friedens bin,
      Und lass mich zu dir aus meinen Leiden
      Wie Simeon in Frieden scheiden!
      Da bleib ich, da hab ich Vergnügen zu wohnen,
      Da prang ich gezieret mit himmlischen Kronen.
  - num: 4
    type: Chorale
    voices: SATB
    instruments: Instrumentierung nicht überliefert
    de: |-
      Hier ist das rechte Osterlamm,
      Davon Gott hat geboten;
      Das ist hoch an des Kreuzes Stamm
      In heißer Lieb gebraten.
      Des Blut zeichnet unsre Tür,
      Das hält der Glaub dem Tode für;
      Der Würger kann uns nicht rühren.
      Alleluja!
