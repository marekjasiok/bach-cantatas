wiki:
  summary: "Der Friede sei mit dir, BWV\_158, is one of the shortest of the cantatas by Johann Sebastian Bach and features a bass soloist. It survives as a cantata for the third day of Easter but might be a fragment of a work originally written for Purification. Given this background, and the fact that it was copied by Christian Friedrich Penzel, one of Bach's last students, there is a confusing variety of proposed composition dates. It may date back to Bach's Weimar period, although a date as late as 1735 has been suggested."
  image: null
  url: https://en.wikipedia.org/wiki/Der_Friede_sei_mit_dir%2C_BWV_158
  summary_html: "<p><b><span><i lang=\"de\">Der Friede sei mit dir</i></span></b>, <b><abbr>BWV</abbr><span class=\"nowrap\">\_</span>158</b>, is one of the shortest of the cantatas by Johann Sebastian Bach and features a bass soloist. It survives as a cantata for the third day of Easter but might be a fragment of a work originally written for Purification. Given this background, and the fact that it was copied by Christian Friedrich Penzel, one of Bach's last students, there is a confusing variety of proposed composition dates. It may date back to Bach's Weimar period, although a date as late as 1735 has been suggested.</p>"
