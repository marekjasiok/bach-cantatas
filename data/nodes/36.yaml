wiki:
  summary: "Johann Sebastian Bach composed the church cantata Schwingt freudig euch empor, BWV\_36, in Leipzig in 1731 for the first Sunday in Advent. He drew on material from previous congratulatory cantatas, beginning with Schwingt freudig euch empor, BWV 36.1 (1725). The Gospel for the Sunday was the Entry into Jerusalem, thus the mood of the secular work matched \"the people's jubilant shouts of Hosanna\". In a unique structure in Bach's cantatas, he interpolated four movements derived from the former works with four stanzas from two important Advent hymns, to add liturgical focus, three from Luther's \"Nun komm, der Heiden Heiland\" and one from Nicolai's \"Wie schön leuchtet der Morgenstern\". He first performed the cantata in its final form of two parts, eight movements, on 2 December 1731."
  image: https://upload.wikimedia.org/wikipedia/commons/thumb/0/0d/Thomaskirche-1885.png/330px-Thomaskirche-1885.png
  url: https://en.wikipedia.org/wiki/Schwingt_freudig_euch_empor%2C_BWV_36
  summary_html: "<p>Johann Sebastian Bach composed the church cantata <b><span><i lang=\"de\">Schwingt freudig euch empor</i></span></b>, <b><abbr>BWV</abbr><span class=\"nowrap\">\_</span>36</b>, in Leipzig in 1731 for the first Sunday in Advent. He drew on material from previous congratulatory cantatas, beginning with <span><i>Schwingt freudig euch empor</i>, BWV 36.1</span> (1725). The Gospel for the Sunday was the Entry into Jerusalem, thus the mood of the secular work matched \"the people's jubilant shouts of Hosanna\". In a unique structure in Bach's cantatas, he interpolated four movements derived from the former works with four stanzas from two important Advent hymns, to add liturgical focus, three from Luther's \"<span><span style=\"font-style:normal\">Nun komm, der Heiden Heiland</span></span>\" and one from Nicolai's \"<span><span style=\"font-style:normal\">Wie schön leuchtet der Morgenstern</span></span>\". He first performed the cantata in its final form of two parts, eight movements, on 2 December 1731.</p>"
