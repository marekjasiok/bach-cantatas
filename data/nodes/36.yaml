bwv: '36'
title: Schwingt freudig euch empor
cycle: LATE
occasion: Advent I
date: '1731-11-27'
url: https://en.wikipedia.org/wiki/BWV_36
edges: {}
movements:
  - num: 1
    type: Chorus
    voices: SATB
    instruments: Oboe d'amore I/II all' unisono, Violino I/II, Viola, Continuo
    de: |-
      Schwingt freudig euch empor zu den erhabnen Sternen,
      Ihr Zungen, die ihr itzt in Zion fröhlich seid!
      Doch haltet ein! Der Schall darf sich nicht weit entfernen,
      Es naht sich selbst zu euch der Herr der Herrlichkeit.
  - num: 2
    type: Chorale
    voices: SATB
    instruments: Oboe d'amore I col Soprano, Oboe d'amore II coll' Alto, Continuo
    de: |-
      Nun komm, der Heiden Heiland,
      Der Jungfrauen Kind erkannt,
      Des sich wundert alle Welt,
      Gott solch Geburt ihm bestellt.
  - num: 3
    type: Aria
    voices: T
    instruments: Oboe d'amore solo, Continuo
    de: |-
      Die Liebe zieht mit sanften Schritten
      Sein Treugeliebtes allgemach.
      Gleichwie es eine Braut entzücket,
      Wenn sie den Bräutigam erblicket,
      So folgt ein Herz auch Jesu nach.
  - num: 4
    type: Chorale
    voices: SATB
    instruments: Oboe d'amore I e Violino I col Soprano, Oboe d'amore II e Violino II coll' Alto, Viola col Tenore, Continuo
    de: |-
      Zwingt die Saiten in Cythara
      Und lasst die süße Musica
      Ganz freudenreich erschallen,
      Dass ich möge mit Jesulein,
      Dem wunderschönen Bräutgam mein,
      In steter Liebe wallen!
      Singet,
      Springet,
      Jubilieret, triumphieret, dankt dem Herren!
      Groß ist der König der Ehren.
  - num: 5
    type: Aria
    voices: B
    instruments: Violino I/II, Viola, Continuo
    de: |-
      Willkommen, werter Schatz!
      Die Lieb und Glaube machet Platz
      Vor dich in meinem Herzen rein,
      Zieh bei mir ein!
  - num: 6
    type: Chorale
    voices: T
    instruments: Oboe d'amore I/II, Continuo
    de: |-
      Der du bist dem Vater gleich,
      Führ hinaus den Sieg im Fleisch,
      Dass dein ewig Gott'sgewalt
      In uns das krank Fleisch enthalt.
  - num: 7
    type: Aria
    voices: S
    instruments: Violino solo con sordino, Continuo
    de: |-
      Auch mit gedämpften, schwachen Stimmen
      Wird Gottes Majestät verehrt.
      Denn schallet nur der Geist darbei,
      So ist ihm solches ein Geschrei,
      Das er im Himmel selber hört.
  - num: 8
    type: Chorale
    voices: SATB
    instruments: Oboe d'amore I e Violino I col Soprano, Oboe d'amore II e Violino II coll' Alto, Viola col Tenore, Continuo
    de: |-
      Lob sei Gott, dem Vater, g'ton,
      Lob sei Gott, sein'm eingen Sohn,
      Lob sei Gott, dem Heilgen Geist,
      Immer und in Ewigkeit!
