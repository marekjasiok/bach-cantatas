wiki:
  summary: "Ein Herz, das seinen Jesum lebend weiß, BWV\_134, is a church cantata for Easter by Johann Sebastian Bach. Bach composed the cantata for the third day of Easter in Leipzig and first performed it on 11 April 1724. He based it on his congratulatory cantata Die Zeit, die Tag und Jahre macht, BWV 134a, first performed in Köthen on 1 January 1719."
  image: >-
    https://upload.wikimedia.org/wikipedia/commons/thumb/e/ea/Nikolaikirche_Leipzg_1749_%28Kupferstich%29_Foto_H.-P.Haack.JPG/330px-Nikolaikirche_Leipzg_1749_%28Kupferstich%29_Foto_H.-P.Haack.JPG
  url: https://en.wikipedia.org/wiki/Ein_Herz%2C_das_seinen_Jesum_lebend_wei%C3%9F%2C_BWV_134
  summary_html: "<p><b><span><i lang=\"de\">Ein Herz, das seinen Jesum lebend weiß</i></span></b>, <b><abbr>BWV</abbr><span class=\"nowrap\">\_</span>134</b>, is a church cantata for Easter by Johann Sebastian Bach. Bach composed the cantata for the third day of Easter in Leipzig and first performed it on 11 April 1724. He based it on his congratulatory cantata <span><span><span><i>Die Zeit, die Tag und Jahre macht</i>, BWV 134a</span></span></span>, first performed in Köthen on 1 January 1719.</p>"
