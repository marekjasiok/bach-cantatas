wiki:
  summary: "In allen meinen Taten, BWV\_97, is a church cantata by Johann Sebastian Bach. He composed the chorale cantata in Leipzig in 1734 for an unspecified occasion. The text consists of the unchanged words of the hymn by Paul Fleming (1642)."
  image: null
  url: https://en.wikipedia.org/wiki/In_allen_meinen_Taten%2C_BWV_97
  summary_html: "<p><i><b><span><i lang=\"de\">In allen meinen Taten</i></span></b></i>, <b>BWV\_97</b>, is a church cantata by Johann Sebastian Bach. He composed the chorale cantata in Leipzig in 1734 for an unspecified occasion. The text consists of the unchanged words of the hymn by Paul Fleming (1642).</p>"
