wiki:
  summary: "Liebster Gott, wenn werd ich sterben?, BWV\_8, is a church cantata for the 16th Sunday after Trinity by Johann Sebastian Bach. It is a chorale cantata, part of Bach's second cantata cycle. Bach performed it for the first time on 24 September 1724 in St. Nicholas Church in Leipzig. The cantata is scored for SATB singers, four wind instruments, strings and continuo."
  image: https://upload.wikimedia.org/wikipedia/commons/thumb/7/76/BWV_8_1_traverso.jpeg/330px-BWV_8_1_traverso.jpeg
  url: https://en.wikipedia.org/wiki/Liebster_Gott%2C_wenn_werd_ich_sterben%2C_BWV_8
  summary_html: "<p><i><b><span><i lang=\"de\">Liebster Gott, wenn werd ich sterben?</i></span></b></i>, BWV<span class=\"nowrap\">\_</span>8, is a church cantata for the 16th Sunday after Trinity by Johann Sebastian Bach. It is a chorale cantata, part of Bach's second cantata cycle. Bach performed it for the first time on 24 September 1724 in St. Nicholas Church in Leipzig. The cantata is scored for SATB singers, four wind instruments, strings and continuo.</p>"
