bwv: '8'
title: Liebster Gott, wenn werd ich sterben?
cycle: C2
occasion: Trinity XVI
date: '1724-09-24'
url: https://en.wikipedia.org/wiki/BWV_8
edges: {}
movements:
  - num: 1
    type: Chorus
    voices: SATB
    instruments: Corno col Soprano, Flauto traverso, Oboe d'amore I/II, Violino I/II, Viola, Continuo
    de: |-
      Liebster Gott, wenn werd ich sterben?
      Meine Zeit läuft immer hin,
      Und des alten Adams Erben,
      Unter denen ich auch bin,
      Haben dies zum Vaterteil,
      Dass sie eine kleine Weil
      Arm und elend sein auf Erden
      Und denn selber Erde werden.
  - num: 2
    type: Aria
    voices: T
    instruments: Oboe d'amore, Continuo
    de: |-
      Was willst du dich, mein Geist, entsetzen,
      Wenn meine letzte Stunde schlägt?
      Mein Leib neigt täglich sich zur Erden,
      Und da muss seine Ruhstatt werden,
      Wohin man so viel tausend trägt.
  - num: 3
    type: Recitative
    voices: A
    instruments: Violino I/II, Viola, Continuo
    de: |-
      Zwar fühlt mein schwaches Herz
      Furcht, Sorge, Schmerz:
      Wo wird mein Leib die Ruhe finden?
      Wer wird die Seele doch
      Vom aufgelegten Sündenjoch
      Befreien und entbinden?
      Das Meine wird zerstreut,
      Und wohin werden meine Lieben
      In ihrer Traurigkeit
      Zertrennt, vertrieben?
  - num: 4
    type: Aria
    voices: B
    instruments: Flauto traverso, Violino I/II, Viola, Continuo
    de: |-
      Doch weichet, ihr tollen, vergeblichen Sorgen!
      Mich rufet mein Jesus, wer sollte nicht gehn?
      Nichts, was mir gefällt,
      Besitzet die Welt.
      Erscheine mir, seliger, fröhlicher Morgen,
      Verkläret und herrlich vor Jesu zu stehn.
  - num: 5
    type: Recitative
    voices: S
    instruments: Continuo
    de: |-
      Behalte nur, o Welt, das Meine!
      Du nimmst ja selbst mein Fleisch und mein
      Gebeine,
      So nimm auch meine Armut hin;
      Genug, dass mir aus Gottes Überfluss
      Das höchste Gut noch werden muss,
      Genug, dass ich dort reich und selig bin.
      Was aber ist von mir zu erben,
      Als meines Gottes Vatertreu?
      Die wird ja alle Morgen neu
      Und kann nicht sterben.
  - num: 6
    type: Chorale
    voices: SATB
    instruments: >-
      Violino I e Flauto traverso in octava e Oboe d'amore I e Corno col Soprano, Violino II e Oboe d'amore II coll'
      Alto, Viola col Tenore, Continuo
    de: |-
      Herrscher über Tod und Leben,
      Mach einmal mein Ende gut,
      Lehre mich den Geist aufgeben
      Mit recht wohlgefasstem Mut.
      Hilf, dass ich ein ehrlich Grab
      Neben frommen Christen hab
      Und auch endlich in der Erde
      Nimmermehr zuschanden werde!
