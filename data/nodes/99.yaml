wiki:
  summary: "Johann Sebastian Bach composed the church cantata Was Gott tut, das ist wohlgetan, BWV\_99, in Leipzig for the 15th Sunday after Trinity and first performed it on 17 September 1724. The chorale cantata is based on the hymn \"Was Gott tut, das ist wohlgetan\" by Samuel Rodigast (1674)."
  image: >-
    https://upload.wikimedia.org/wikipedia/commons/thumb/0/0a/Leipzig_Nikolaikirche_um_1850.jpg/330px-Leipzig_Nikolaikirche_um_1850.jpg
  url: https://en.wikipedia.org/wiki/Was_Gott_tut%2C_das_ist_wohlgetan%2C_BWV_99
  summary_html: "<p>Johann Sebastian Bach composed the church cantata <b><span><i lang=\"de\">Was Gott tut, das ist wohlgetan</i></span></b>, <b><abbr>BWV</abbr><span class=\"nowrap\">\_</span>99</b>, in Leipzig for the 15th Sunday after Trinity and first performed it on 17 September 1724. The chorale cantata is based on the hymn \"Was Gott tut, das ist wohlgetan\" by Samuel Rodigast (1674).</p>"
