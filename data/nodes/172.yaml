bwv: '172'
title: Erschallet, ihr Lieder
cycle: EARLY
occasion: Pentecost
date: '1714-05-20'
url: https://en.wikipedia.org/wiki/BWV_172
edges: {}
movements:
  - num: 1
    type: Chorus
    voices: T
    instruments: Tromba I-III, Tamburi, Violino I/II, Viola I/II, Fagotto, Continuo
    de: |-
      Erschallet, ihr Lieder, erklinget, ihr Saiten!
      O seligste Zeiten!
      Gott will sich die Seelen zu Tempeln bereiten.
  - num: 2
    type: Recitative
    voices: B
    instruments: Continuo
    de: |-
      Wer mich liebet, der wird mein Wort halten,
      und mein Vater wird ihn lieben, und wir werden zu ihm kommen und
      Wohnung bei ihm machen.
  - num: 3
    type: Aria
    voices: B
    instruments: Tromba I-III, Tamburi, Fagotto, Continuo
    de: |-
      Heiligste Dreieinigkeit,
      Großer Gott der Ehren,
      Komm doch, in der Gnadenzeit
      Bei uns einzukehren,
      Komm doch in die Herzenshütten,
      Sind sie gleich gering und klein,
      Komm und lass dich doch erbitten,
      Komm und ziehe bei uns ein!
  - num: 4
    type: Aria
    voices: T
    instruments: Violino I/II, Viola I/II, Continuo
    de: |-
      O Seelenparadies,
      Das Gottes Geist durchwehet,
      Der bei der Schöpfung blies,
      Der Geist, der nie vergehet;
      Auf, auf, bereite dich,
      Der Tröster nahet sich.
  - num: 5
    type: Aria
    voices: ''
    instruments: Oboe, Violoncello obligato
    de: |-
      Seele (S), Heiliger Geist (A)
      Sopran
      Komm, lass mich nicht länger warten,
      Komm, du sanfter Himmelswind,
      Wehe durch den Herzensgarten!
      Alt
      Ich erquicke dich, mein Kind.
      Sopran
      Liebste Liebe, die so süße,
      Aller Wollust Überfluss,
      Ich vergeh, wenn ich dich misse.
      Alt
      Nimm von mir den Gnadenkuss.
      Sopran
      Sei im Glauben mir willkommen,
      Höchste Liebe, komm herein!
      Du hast mir das Herz genommen.
      Alt
      Ich bin dein, und du bist mein!
  - num: 6
    type: Chorale
    voices: SATB
    instruments: Violino I/II, Viola I/II, Fagotto, Continuo
    de: |-
      Von Gott kömmt mir ein Freudenschein,
      Wenn du mit deinen Äugelein
      Mich freundlich tust anblicken.
      O Herr Jesu, mein trautes Gut,
      Dein Wort, dein Geist, dein Leib und Blut
      Mich innerlich erquicken.
      Nimm mich
      Freundlich
      In dein Arme, dass ich warme werd von Gnaden:
      Auf dein Wort komm ich geladen.
  - num: 7
    type: Chorus
    voices: SATB
    instruments: ''
    de: |-
      Erschallet, ihr Lieder, erklinget, ihr Saiten!
      O seligste Zeiten!
      Gott will sich die Seelen zu Templen bereiten.
