wiki:
  summary: >-
    Erschallet, ihr Lieder, erklinget, ihr Saiten!, BWV 172, is a church cantata by Johann Sebastian Bach, composed in
    Weimar for Pentecost Sunday in 1714. Bach led the first performance on 20 May 1714 in the Schlosskirche, the court
    chapel in the ducal Schloss. Erschallet, ihr Lieder is an early work in a genre to which he later contributed
    complete cantata cycles for all occasions of the liturgical year.
  image: >-
    https://upload.wikimedia.org/wikipedia/commons/thumb/2/24/Schlosskirche_Weimar_1660.jpg/330px-Schlosskirche_Weimar_1660.jpg
  url: https://en.wikipedia.org/wiki/Erschallet%2C_ihr_Lieder%2C_erklinget%2C_ihr_Saiten!_BWV_172
  summary_html: >-
    <p><b><span><i lang="de">Erschallet, ihr Lieder, erklinget, ihr Saiten!</i></span></b>, <b><span class="nowrap">BWV
    172</span></b>, is a church cantata by Johann Sebastian Bach, composed in Weimar for Pentecost Sunday in 1714. Bach
    led the first performance on 20 May 1714 in the <span><span style="font-style:normal">Schlosskirche</span></span>,
    the court chapel in the ducal Schloss. <i>Erschallet, ihr Lieder</i> is an early work in a genre to which he later
    contributed complete cantata cycles for all occasions of the liturgical year.</p>
