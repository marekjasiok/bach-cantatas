wiki:
  summary: >-
    Nur jedem das Seine, BWV 163, is a church cantata by Johann Sebastian Bach. He composed the work in Weimar for the
    twenty-third Sunday after Trinity and first performed it on 24 November 1715.
  image: >-
    https://upload.wikimedia.org/wikipedia/commons/thumb/2/24/Schlosskirche_Weimar_1660.jpg/330px-Schlosskirche_Weimar_1660.jpg
  url: https://en.wikipedia.org/wiki/Nur_jedem_das_Seine%2C_BWV_163
  summary_html: >-
    <p><b><span><i lang="de">Nur jedem das Seine</i></span></b>, <b><span class="nowrap">BWV 163</span></b>, is a church
    cantata by Johann Sebastian Bach. He composed the work in Weimar for the twenty-third Sunday after Trinity and first
    performed it on 24 November 1715.</p>
