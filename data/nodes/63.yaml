wiki:
  summary: "Christen, ätzet diesen Tag, BWV\_63, is a church cantata by Johann Sebastian Bach. He composed the Christmas cantata for the First Day of Christmas, possibly in 1713 for the Liebfrauenkirche in Halle. He performed it again for his first Christmas as Thomaskantor in Leipzig, on 25 December 1723."
  image: >-
    https://upload.wikimedia.org/wikipedia/commons/thumb/6/6a/MarienkircheHalle_Innenraum_2.jpg/330px-MarienkircheHalle_Innenraum_2.jpg
  url: https://en.wikipedia.org/wiki/Christen%2C_%C3%A4tzet_diesen_Tag%2C_BWV_63
  summary_html: "<p><b><span><i lang=\"de\">Christen, ätzet diesen Tag</i></span></b>, <b><abbr>BWV</abbr><span class=\"nowrap\">\_</span>63</b>, is a church cantata by Johann Sebastian Bach. He composed the Christmas cantata for the First Day of Christmas, possibly in 1713 for the <span><span style=\"font-style:normal\">Liebfrauenkirche</span></span> in Halle. He performed it again for his first Christmas as <span><span style=\"font-style:normal\">Thomaskantor</span></span> in Leipzig, on 25 December 1723.</p>"
