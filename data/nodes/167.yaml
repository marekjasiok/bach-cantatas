  url: https://en.wikipedia.org/wiki/Ihr_Menschen%2C_r%C3%BChmet_Gottes_Liebe%2C_BWV_167
  summary_html: "<p>Johann Sebastian Bach composed the church cantata <b><span><i lang=\"de\">Ihr Menschen, rühmet Gottes Liebe</i></span></b>, <b><abbr>BWV</abbr><span class=\"nowrap\">\_</span>167</b> in Leipzig for the Feast of St. John the Baptist and first performed it on 24 June 1723. It is part of his first cantata cycle in Leipzig.</p>"
