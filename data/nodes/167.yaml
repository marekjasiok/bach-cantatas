wiki:
  summary: "Johann Sebastian Bach composed the church cantata Ihr Menschen, rühmet Gottes Liebe, BWV\_167 in Leipzig for the Feast of St. John the Baptist and first performed it on 24 June 1723. It is part of his first cantata cycle in Leipzig."
