wiki:
  summary: "Herr Jesu Christ, wahr' Mensch und Gott, BWV\_127, is a cantata by Johann Sebastian Bach for use in a Lutheran service. He composed the chorale cantata in 1725 in Leipzig for the Sunday Estomihi, the Sunday before Lent, and first performed it on 11 February 1725. It is based on Paul Eber's 1582 hymn in eight stanzas \"Herr Jesu Christ, wahr Mensch und Gott\"."
  image: https://upload.wikimedia.org/wikipedia/commons/thumb/d/d4/Paul_Eber.jpg/330px-Paul_Eber.jpg
  url: https://en.wikipedia.org/wiki/Herr_Jesu_Christ%2C_wahr'_Mensch_und_Gott%2C_BWV_127
  summary_html: "<p><b><span><i lang=\"de\">Herr Jesu Christ, wahr' Mensch und Gott</i></span></b>, <b><abbr>BWV</abbr><span class=\"nowrap\">\_</span>127</b>, is a cantata by Johann Sebastian Bach for use in a Lutheran service. He composed the chorale cantata in 1725 in Leipzig for the Sunday Estomihi, the Sunday before Lent, and first performed it on 11 February 1725. It is based on Paul Eber's 1582 hymn in eight stanzas \"Herr Jesu Christ, wahr Mensch und Gott\".</p>"
