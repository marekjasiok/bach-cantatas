wiki:
  summary: "O ewiges Feuer, o Ursprung der Liebe, BWV\_34, is a church cantata by Johann Sebastian Bach. He composed it in Leipzig for Pentecost Sunday, and it was the basis for a later wedding cantata, BWV 34a, beginning with the same line. Bach led the first performance on 1 June 1727."
  image: >-
    https://upload.wikimedia.org/wikipedia/commons/thumb/b/bf/Eichst%C3%A4tt-Spitalkirche_%282%29.JPG/330px-Eichst%C3%A4tt-Spitalkirche_%282%29.JPG
  url: https://en.wikipedia.org/wiki/O_ewiges_Feuer%2C_o_Ursprung_der_Liebe%2C_BWV_34
  summary_html: "<p><b><span><i lang=\"de\">O ewiges Feuer, o Ursprung der Liebe</i></span></b>, <b><abbr>BWV</abbr><span class=\"nowrap\">\_</span>34</b>, is a church cantata by Johann Sebastian Bach. He composed it in Leipzig for Pentecost Sunday, and it was the basis for a later wedding cantata, BWV 34a, beginning with the same line. Bach led the first performance on 1 June 1727.</p>"
