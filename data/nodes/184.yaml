wiki:
  summary: "Erwünschtes Freudenlicht, BWV\_184, is a cantata by Johann Sebastian Bach for the Lutheran church service. He composed it in Leipzig for the third day of Pentecost and first performed it on 30 May 1724. It was probably based on an earlier secular cantata. This work, mostly lost, was composed in Köthen as a duet cantata for soprano and bass with several dance movements."
  image: https://upload.wikimedia.org/wikipedia/commons/thumb/0/0d/Thomaskirche-1885.png/330px-Thomaskirche-1885.png
  url: https://en.wikipedia.org/wiki/Erw%C3%BCnschtes_Freudenlicht%2C_BWV_184
  summary_html: "<p><b><span><i lang=\"de\">Erwünschtes Freudenlicht</i></span></b>, <b><abbr>BWV</abbr><span class=\"nowrap\">\_</span>184</b>, is a cantata by Johann Sebastian Bach for the Lutheran church service. He composed it in Leipzig for the third day of Pentecost and first performed it on 30 May 1724. It was probably based on an earlier secular cantata. This work, mostly lost, was composed in Köthen as a duet cantata for soprano and bass with several dance movements.</p>"
