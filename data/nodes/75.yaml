wiki:
  summary: "Johann Sebastian Bach composed the church cantata Die Elenden sollen essen, BWV\_75, for the first Sunday after Trinity. He led its first performance in Leipzig on 30 May 1723, his first Sunday in the position of Thomaskantor. The complex work is in two parts, each consisting of seven movements, and marks the beginning of his first annual cycle of cantatas."
  image: >-
    https://upload.wikimedia.org/wikipedia/commons/thumb/0/0a/Leipzig_Nikolaikirche_um_1850.jpg/330px-Leipzig_Nikolaikirche_um_1850.jpg
  url: https://en.wikipedia.org/wiki/Die_Elenden_sollen_essen%2C_BWV_75
  summary_html: "<p>Johann Sebastian Bach composed the church cantata <b><span><i lang=\"de\">Die Elenden sollen essen</i></span></b>, <b><abbr>BWV</abbr><span class=\"nowrap\">\_</span>75</b>, for the first Sunday after Trinity. He led its first performance in Leipzig on 30 May 1723, his first Sunday in the position of <span><span style=\"font-style:normal\">Thomaskantor</span></span>. The complex work is in two parts, each consisting of seven movements, and marks the beginning of his first annual cycle of cantatas.</p>"
