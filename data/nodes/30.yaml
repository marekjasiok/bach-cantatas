wiki:
  summary: "Freue dich, erlöste Schar, BWV\_30.2, BWV\_30, is a church cantata by Johann Sebastian Bach. It is one of his later realisations in the genre: he composed it for the Feast of John the Baptist in 1738, and based its music largely on Angenehmes Wiederau, a secular cantata which he had composed a year earlier. Christian Friedrich Henrici (Picander), the librettist of the secular model of the cantata, is likely also the author of the sacred cantata's version of the text."
  image: >-
    https://upload.wikimedia.org/wikipedia/commons/thumb/e/e3/1037_Lucas_Cranach_il_vecchio.jpg/330px-1037_Lucas_Cranach_il_vecchio.jpg
  url: https://en.wikipedia.org/wiki/Freue_dich%2C_erl%C3%B6ste_Schar%2C_BWV_30
  summary_html: "<p><b><span><i lang=\"de\">Freue dich, erlöste Schar</i></span></b>, <span><abbr>BWV</abbr></span><span class=\"nowrap\">\_</span>30.2, <b>BWV<span class=\"nowrap\">\_</span>30</b>, is a church cantata by Johann Sebastian Bach. It is one of his later realisations in the genre: he composed it for the Feast of John the Baptist in 1738, and based its music largely on <i>Angenehmes Wiederau</i>, a secular cantata which he had composed a year earlier. Christian Friedrich Henrici (Picander), the librettist of the secular model of the cantata, is likely also the author of the sacred cantata's version of the text.</p>"
