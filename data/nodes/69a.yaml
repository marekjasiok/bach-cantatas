wiki:
  summary: "Johann Sebastian Bach composed the church cantata Lobe den Herrn, meine Seele, BWV\_69a, also BWV\_69.1, in Leipzig for the twelfth Sunday after Trinity and first performed it on 15 August 1723. It is part of his first cantata cycle."
  image: https://upload.wikimedia.org/wikipedia/commons/thumb/6/6c/Thomaskirche_Interior.jpg/330px-Thomaskirche_Interior.jpg
  url: https://en.wikipedia.org/wiki/Lobe_den_Herrn%2C_meine_Seele%2C_BWV_69a
  summary_html: "<p>Johann Sebastian Bach composed the church cantata <b><span><i lang=\"de\">Lobe den Herrn, meine Seele</i></span></b>, <b><abbr>BWV</abbr><span class=\"nowrap\">\_</span>69a</b>, also BWV<span class=\"nowrap\">\_</span>69.1, in Leipzig for the twelfth Sunday after Trinity and first performed it on 15 August 1723. It is part of his first cantata cycle.</p>"
