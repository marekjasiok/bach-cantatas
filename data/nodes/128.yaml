wiki:
  summary: >-
    Auf Christi Himmelfahrt allein, BWV 128, is a church cantata by Johann Sebastian Bach. Bach composed it in Leipzig
    for the Feast of the Ascension and led the first performance on 10 May 1725.
  image: >-
    https://upload.wikimedia.org/wikipedia/commons/thumb/4/4b/Jelenia_G._Church_ascending.JPG/330px-Jelenia_G._Church_ascending.JPG
  url: https://en.wikipedia.org/wiki/Auf_Christi_Himmelfahrt_allein%2C_BWV_128
  summary_html: >-
    <p><i><b><span><i lang="de">Auf Christi Himmelfahrt allein</i></span></b></i>, <b><span class="nowrap">BWV
    128</span></b>, is a church cantata by Johann Sebastian Bach. Bach composed it in Leipzig for the Feast of the
    Ascension and led the first performance on 10 May 1725.</p>
