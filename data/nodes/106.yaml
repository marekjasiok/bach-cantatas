  summary_html: >-
    <p><b><span><i lang="de">Gottes Zeit ist die allerbeste Zeit</i></span></b>, <b><span class="nowrap">BWV
    106</span></b>, also known as <i><b>Actus tragicus</b></i>, is an early sacred cantata composed by Johann Sebastian
    Bach in Mühlhausen, intended for a funeral.</p>
