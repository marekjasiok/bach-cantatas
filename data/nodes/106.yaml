edges: {}
movements:
  - num: 4
    type: Chorus
    voices: SATB
    instruments: Flauto I/II, Viola da gamba I/II, Continuo
    de: |-
      Glorie, Lob, Ehr und Herrlichkeit
      Sei dir, Gott Vater und Sohn bereit,
      Dem heilgen Geist mit Namen!
      Die göttlich Kraft
      Mach uns sieghaft
      Durch Jesum Christum, Amen.
