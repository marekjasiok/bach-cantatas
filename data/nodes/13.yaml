    https://upload.wikimedia.org/wikipedia/commons/thumb/b/bb/Galante_Poetinnen_0001.png/330px-Galante_Poetinnen_0001.png
  url: https://en.wikipedia.org/wiki/Meine_Seufzer%2C_meine_Tr%C3%A4nen%2C_BWV_13
  summary_html: "<p><b><span><i lang=\"de\">Meine Seufzer, meine Tränen</i></span></b>, <b><abbr>BWV</abbr><span class=\"nowrap\">\_</span>13</b>, is a church cantata by Johann Sebastian Bach. He composed it in Leipzig for the second Sunday after Epiphany and first performed it on 20 January 1726 as part of his third cantata cycle.</p>"
key: E♭ major
