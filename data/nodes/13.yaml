wiki:
  summary: "Meine Seufzer, meine Tränen, BWV\_13, is a church cantata by Johann Sebastian Bach. He composed it in Leipzig for the second Sunday after Epiphany and first performed it on 20 January 1726 as part of his third cantata cycle."
