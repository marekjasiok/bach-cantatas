bwv: '4'
title: Christ lag in Todes Banden
occasion: Easter Sunday
cycle: EARLY
movements:
  - num: 1
    type: Sinfonia
    voices: ''
    instruments: Violino I/II, Viola I/II, Continuo
    de: ''
  - num: 2
    type: Chorus
    voices: SATB
    instruments: >-
      Violino I/II, Viola I/II, Cornetto col Soprano, Trombone I coll' Alto, Trombone II col Tenore, Trombone III col
      Basso, Continuo
    de: |-
      Christ lag in Todesbanden
      Für unsre Sünd gegeben,
      Er ist wieder erstanden
      Und hat uns bracht das Leben;
      Des wir sollen fröhlich sein,
      Gott loben und ihm dankbar sein
      Und singen halleluja,
      Halleluja!
  - num: 3
    type: Versus
    voices: ''
    instruments: Cornetto col Soprano, Trombone I coll' Alto, Continuo
    de: |-
      Den Tod niemand zwingen kunnt
      Bei allen Menschenkindern,
      Das macht' alles unsre Sünd,
      Kein Unschuld war zu finden.
      Davon kam der Tod so bald
      Und nahm über uns Gewalt,
      Hielt uns in seinem Reich gefangen.
      Halleluja!
  - num: 4
    type: Versus
    voices: ''
    instruments: Violino I/II, Continuo
    de: |-
      Jesus Christus, Gottes Sohn,
      An unser Statt ist kommen
      Und hat die Sünde weggetan,
      Damit dem Tod genommen
      All sein Recht und sein Gewalt,
      Da bleibet nichts denn Tods Gestalt,
      Den Stach'l hat er verloren.
      Halleluja!
  - num: 5
    type: Chorus
    voices: SATB
    instruments: Continuo
    de: |-
      Es war ein wunderlicher Krieg,
      Da Tod und Leben rungen,
      Das Leben behielt den Sieg,
      Es hat den Tod verschlungen.
      Die Schrift hat verkündigt das,
      Wie ein Tod den andern fraß,
      Ein Spott aus dem Tod ist worden.
      Halleluja!
  - num: 6
    type: Versus
    voices: ''
    instruments: Violino I/II, Viola I/II, Continuo
    de: |-
      Hier ist das rechte Osterlamm,
      Davon Gott hat geboten,
      Das ist hoch an des Kreuzes Stamm
      In heißer Lieb gebraten,
      Das Blut zeichnet unsre Tür,
      Das hält der Glaub dem Tode für,
      Der Würger kann uns nicht mehr schaden.
      Halleluja!
  - num: 7
    type: Versus
    voices: ''
    instruments: Continuo
    de: |-
      So feiern wir das hohe Fest
      Mit Herzensfreud und Wonne,
      Das uns der Herre scheinen lässt,
      Er ist selber die Sonne,
      Der durch seiner Gnade Glanz
      Erleuchtet unsre Herzen ganz,
      Der Sünden Nacht ist verschwunden.
      Halleluja!
  - num: 8
    type: Versus
    voices: ''
    instruments: >-
      Violino I/II e Cornetto col Soprano, Viola I e Trombone I coll' Alto, Viola II e Trombone II col Tenore, Trombone
      III col Basso, Continuo
    de: |-
      Wir essen und leben wohl
      In rechten Osterfladen,
      Der alte Sauerteig nicht soll
      Sein bei dem Wort der Gnaden,
      Christus will die Koste sein
      Und speisen die Seel allein,
      Der Glaub will keins andern leben.
      Halleluja!
