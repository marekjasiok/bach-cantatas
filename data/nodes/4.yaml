wiki:
  summary: "Christ lag in Todes Banden, BWV\_4, is a cantata for Easter by German composer Johann Sebastian Bach, one of his earliest church cantatas. It is agreed to be an early work partly for stylistic reasons and partly because there is evidence that it was probably written for a performance in 1707. Bach went on to complete many other works in the same genre, contributing complete cantata cycles for all occasions of the liturgical year. John Eliot Gardiner described it as Bach's \"first-known attempt at painting narrative in music\"."
  image: >-
    https://upload.wikimedia.org/wikipedia/en/thumb/c/c6/Christ_lag_in_Todesbanden_soprano-autograph_1724.png/330px-Christ_lag_in_Todesbanden_soprano-autograph_1724.png
  url: https://en.wikipedia.org/wiki/Christ_lag_in_Todes_Banden%2C_BWV_4
  summary_html: "<p><b><span><i lang=\"de\">Christ lag in Todes Banden</i></span></b>, <b><abbr>BWV</abbr><span class=\"nowrap\">\_</span>4</b>, is a cantata for Easter by German composer Johann Sebastian Bach, one of his earliest church cantatas. It is agreed to be an early work partly for stylistic reasons and partly because there is evidence that it was probably written for a performance in 1707. Bach went on to complete many other works in the same genre, contributing complete cantata cycles for all occasions of the liturgical year. John Eliot Gardiner described it as Bach's \"first-known attempt at painting narrative in music\".</p>"
