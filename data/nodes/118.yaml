wiki:
  summary: "O Jesu Christ, meins Lebens Licht, BWV\_118, is a sacred motet composed by Johann Sebastian Bach. It is known to have been performed at a funeral, and was possibly a generic work intended for funerals. When the work was first published in the nineteenth century it was called a cantata, perhaps because it has an instrumental accompaniment. While it is not an a cappella work, modern scholarship accepts it is a motet."
  image: null
  url: https://en.wikipedia.org/wiki/O_Jesu_Christ%2C_meins_Lebens_Licht%2C_BWV_118
  summary_html: "<p><i><b>O Jesu Christ, meins Lebens Licht</b></i>, <b>BWV\_118</b>, is a sacred motet composed by Johann Sebastian Bach. It is known to have been performed at a funeral, and was possibly a generic work intended for funerals. When the work was first published in the nineteenth century it was called a cantata, perhaps because it has an instrumental accompaniment. While it is not an a cappella work, modern scholarship accepts it is a motet.</p>"
