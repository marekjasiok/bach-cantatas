bwv: '118'
title: O Jesu Christ, meins Lebens Licht
cycle: LATE
occasion: Funeral
date: '1740'
url: https://en.wikipedia.org/wiki/BWV_118
edges: {}
movements:
  - num: 1
    type: Chorus
    voices: SATB
    instruments: ''
    de: |-
      O Jesu Christ, mein's Lebens Licht
      Mein Hort, mein Trost, mein' Zuversicht,
      Auf Erden bin ich nur ein Gast
      Und drückt mich sehr der Sünden Last.
  - num: 2
    type: Chorus
    voices: SATB
    instruments: ''
    de: |-
      Auf deinen Abschied Herr ich trau
      Darauf mein letzte Heimfahrt bau.
      Tu mir die Himmelstür weit auf
      Wenn ich beschließ mein Lebenslauf.
