bwv: '18'
title: Gleichwie der Regen und Schnee...
cycle: EARLY
occasion: Sexagesima
date: '1713'
url: https://en.wikipedia.org/wiki/BWV_18
edges: {}
movements:
  - num: 1
    type: Sinfonia
    voices: ''
    instruments: Flauto I/II, Viola I-IV, Fagotto, Violoncello, Continuo
    de: ''
  - num: 2
    type: Recitative
    voices: B
    instruments: Fagotto, Continuo
    de: |-
      Gleichwie der Regen und Schnee vom Himmel fällt
      und nicht wieder dahin kommet, sondern feuchtet die Erde und macht
      sie fruchtbar und wachsend, dass sie gibt Samen zu säen
      und Brot zu essen: Also soll das Wort, so aus meinem Munde gehet,
      auch sein; es soll nicht wieder zu mir leer kommen, sondern tun,
      das mir gefället, und soll ihm gelingen, dazu ich's sende.
  - num: 3
    type: Recitative
    voices: ''
    instruments: Flauto I/II, Viola I-IV, Fagotto, Continuo
    de: |-
      Tenor
      Mein Gott, hier wird mein Herze sein:
      Ich öffne dir's in meines Jesu Namen;
      So streue deinen Samen
      Als in ein gutes Land hinein.
      Mein Gott, hier wird mein Herze sein:
      Lass solches Frucht, und hundertfältig, bringen.
      O Herr, Herr, hilf! o Herr, lass wohlgelingen!
      Du wollest deinen Geist und Kraft zum Wortegeben
      Erhör uns, lieber Herre Gott!
      Bass
      Nur wehre, treuer Vater, wehre,
      Dass mich und keinen Christen nicht
      Des Teufels Trug verkehre.
      Sein Sinn ist ganz dahin gericht',
      Uns deines Wortes zu berauben
      Mit aller Seligkeit.
      Den Satan unter unsre Füße treten.
      Erhör uns, lieber Herre Gott!
      Tenor
      Ach! viel verleugnen Wort und Glauben
      Und fallen ab wie faules Obst,
      Wenn sie Verfolgung sollen leiden.
      So stürzen sie in ewig Herzeleid,
      Da sie ein zeitlich Weh vermeiden.
      Und uns für des Türken und des Papsts
      grausamen Mord und Lästerungen,
      Wüten und Toben väterlich behüten.
      Erhör uns, lieber Herre Gott!
      Bass
      Ein andrer sorgt nur für den Bauch;
      Inzwischen wird der Seele ganz vergessen;
      Der Mammon auch
      Hat vieler Herz besessen.
      So kann das Wort zu keiner Kraft gelangen.
      Und wieviel Seelen hält
      Die Wollust nicht gefangen?
      So sehr verführet sie die Welt,
      Die Welt, die ihnen muss anstatt des Himmels stehen,
      Darüber sie vom Himmel irregehen.
      Alle Irrige und Verführte wiederbringen.
      Erhör uns, lieber Herre Gott!
  - num: 4
    type: Aria
    voices: S
    instruments: Flauto I/II, Viola I-IV all' unisono, Continuo
    de: |-
      Mein Seelenschatz ist Gottes Wort;
      Außer dem sind alle Schätze
      Solche Netze,
      Welche Welt und Satan stricken,
      Schnöde Seelen zu berücken.
      Fort mit allen, fort, nur fort!
      Mein Seelenschatz ist Gottes Wort.
  - num: 5
    type: Chorale
    voices: SATB
    instruments: Flauto I/II e Viola I/II col Soprano, Viola III coll' Alto, Viola IV col Tenore, Fagotto col Basso, Continuo
    de: |-
      Ich bitt, o Herr, aus Herzens Grund,
      Du wollst nicht von mir nehmen
      Dein heilges Wort aus meinem Mund;
      So wird mich nicht beschämen
      Mein Sünd und Schuld, denn in dein Huld
      Setz ich all mein Vertrauen:
      Wer sich nur fest darauf verlässt,
      Der wird den Tod nicht schauen.
