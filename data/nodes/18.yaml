wiki:
  summary: "Gleichwie der Regen und Schnee vom Himmel fällt, BWV\_18, is an early church cantata by Johann Sebastian Bach. He composed it in Weimar for the Sunday Sexagesimae, the second Sunday before Lent, likely by 1713."
  image: >-
    https://upload.wikimedia.org/wikipedia/commons/thumb/2/24/Schlosskirche_Weimar_1660.jpg/330px-Schlosskirche_Weimar_1660.jpg
  url: https://en.wikipedia.org/wiki/Gleichwie_der_Regen_und_Schnee_vom_Himmel_f%C3%A4llt%2C_BWV_18
  summary_html: "<p><b><span><i lang=\"de\">Gleichwie der Regen und Schnee vom Himmel fällt</i></span></b>, <b><abbr>BWV</abbr><span class=\"nowrap\">\_</span>18</b>, is an early church cantata by Johann Sebastian Bach. He composed it in Weimar for the Sunday Sexagesimae, the second Sunday before Lent, likely by 1713.</p>"
