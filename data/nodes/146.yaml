  summary_html: "<p><b><span><i lang=\"de\">Wir müssen durch viel Trübsal</i></span></b>, <b><abbr>BWV</abbr><span class=\"nowrap\">\_</span>146</b>, is a cantata by Johann Sebastian Bach, a church cantata for the third Sunday after Easter. Bach composed it in Leipzig in 1726 or 1727.</p>"
