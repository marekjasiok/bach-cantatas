wiki:
  summary: "Darzu ist erschienen der Sohn Gottes, BWV\_40, is a church cantata by Johann Sebastian Bach. He composed it in 1723, his first year in Leipzig, for the Second Day of Christmas, and first performed it on 26 December that year in both main churches, Thomaskirche and Nikolaikirche. It was the first Christmas cantata Bach composed for Leipzig. The title of the cantata also appears in more modern German as Dazu ist erschienen der Sohn Gottes."
  image: https://upload.wikimedia.org/wikipedia/commons/thumb/6/6c/Thomaskirche_Interior.jpg/330px-Thomaskirche_Interior.jpg
  url: https://en.wikipedia.org/wiki/Darzu_ist_erschienen_der_Sohn_Gottes%2C_BWV_40
  summary_html: "<p><b><span><i lang=\"de\">Darzu ist erschienen der Sohn Gottes</i></span></b>, <b><abbr>BWV</abbr><span class=\"nowrap\">\_</span>40</b>, is a church cantata by Johann Sebastian Bach. He composed it in 1723, his first year in Leipzig, for the Second Day of Christmas, and first performed it on 26 December that year in both main churches, Thomaskirche and Nikolaikirche. It was the first Christmas cantata Bach composed for Leipzig. The title of the cantata also appears in more modern German as <span><i lang=\"de\">Dazu ist erschienen der Sohn Gottes</i></span>.</p>"
