bwv: '40'
title: Darzu ist erschienen der Sohn Gottes
cycle: C1
occasion: Christmas 2
date: '1723-12-26'
url: https://en.wikipedia.org/wiki/BWV_40
edges: {}
movements:
  - num: 1
    type: Chorus
    voices: SATB
    instruments: Corno I/II, Oboe I/II, Violino I/II, Viola, Continuo
    de: |-
      Darzu ist erschienen der Sohn Gottes,
      dass er die Werke des Teufels zerstöre.
  - num: 2
    type: Recitative
    voices: T
    instruments: Continuo
    de: |-
      Das Wort ward Fleisch und wohnet in der Welt,
      Das Licht der Welt bestrahlt den Kreis der Erden,
      Der große Gottessohn
      Verlässt des Himmels Thron,
      Und seiner Majestät gefällt,
      Ein kleines Menschenkind zu werden.
      Bedenkt doch diesen Tausch, wer nur gedenken kann;
      Der König wird ein Untertan,
      Der Herr erscheinet als ein Knecht
      Und wird dem menschlichen Geschlecht
      - O süßes Wort in aller Ohren! -
      Zu Trost und Heil geboren.
  - num: 3
    type: Chorale
    voices: SATB
    instruments: Corno I e Oboe I e Violino I col Soprano, Oboe II e Violino II coll' Alto, Viola col Tenore, Continuo
    de: |-
      Die Sünd macht Leid;
      Christus bringt Freud,
      Weil er zu Trost in diese Welt ist kommen.
      Mit uns ist Gott
      Nun in der Not:
      Wer ist, der uns als Christen kann verdammen?
  - num: 4
    type: Aria
    voices: B
    instruments: Oboe I/II, Violino I/II, Viola, Continuo
    de: |-
      Höllische Schlange,
      Wird dir nicht bange?
      Der dir den Kopf als ein Sieger zerknickt,
      Ist nun geboren,
      Und die verloren,
      Werden mit ewigem Frieden beglückt.
  - num: 5
    type: Recitative
    voices: A
    instruments: Violino I/II, Viola, Continuo
    de: |-
      Die Schlange, so im Paradies
      Auf alle Adamskinder
      Das Gift der Seelen fallen ließ,
      Bringt uns nicht mehr Gefahr;
      Des Weibes Samen stellt sich dar,
      Der Heiland ist ins Fleisch gekommen
      Und hat ihr allen Gift benommen.
      Drum sei getrost! betrübter Sünder.
  - num: 6
    type: Chorale
    voices: SATB
    instruments: Corno I e Oboe I e Violino I col Soprano, Oboe II e Violino II coll' Alto, Viola col Tenore, Continuo
    de: |-
      Schüttle deinen Kopf und sprich:
      Fleuch, du alte Schlange!
      Was erneurst du deinen Stich,
      Machst mir angst und bange?
      Ist dir doch der Kopf zerknickt,
      Und ich bin durchs Leiden
      Meines Heilands dir entrückt
      In den Saal der Freuden.
  - num: 7
    type: Aria
    voices: T
    instruments: Corno I/II, Oboe I/II, Continuo
    de: |-
      Christenkinder, freuet euch!
      Wütet schon das Höllenreich,
      Will euch Satans Grimm erschrecken:
      Jesus, der erretten kann,
      Nimmt sich seiner Küchlein an
      Und will sie mit Flügeln decken.
  - num: 8
    type: Chorale
    voices: SATB
    instruments: Corno I e Oboe I e Violino I col Soprano, Oboe II e Violino II coll' Alto, Viola col Tenore, Continuo
    de: |-
      Jesu, nimm dich deiner Glieder
      Ferner in Genaden an;
      Schenke, was man bitten kann,
      Zu erquicken deine Brüder:
      Gib der ganzen Christenschar
      Frieden und ein selges Jahr!
      Freude, Freude über Freude!
      Christus wehret allem Leide.
      Wonne, Wonne über Wonne!
      Er ist die Genadensonne.
