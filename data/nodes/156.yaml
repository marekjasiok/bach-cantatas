wiki:
  summary: "Ich steh mit einem Fuß im Grabe, BWV\_156, is a church cantata by Johann Sebastian Bach. He composed it in Leipzig for the third Sunday after Epiphany and first performed it in 1727 or 1729. The cantata is well known for its opening sinfonia for orchestra and oboe solo."
  image: null
  url: https://en.wikipedia.org/wiki/Ich_steh_mit_einem_Fu%C3%9F_im_Grabe%2C_BWV_156
  summary_html: "<p><b><span><i lang=\"de\">Ich steh mit einem Fuß im Grabe</i></span></b>, <b>BWV\_156</b>, is a church cantata by Johann Sebastian Bach. He composed it in Leipzig for the third Sunday after Epiphany and first performed it in 1727 or 1729. The cantata is well known for its opening sinfonia for orchestra and oboe solo.</p>"
