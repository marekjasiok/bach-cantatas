  summary_html: >-
    <p><b><span><i lang="de">Sie werden euch in den Bann tun</i></span></b>, <b><span class="nowrap">BWV 183</span></b>,
    is a church cantata by Johann Sebastian Bach. He composed it in Leipzig for Exaudi, the Sunday after Ascension, and
    first performed it on 13 May 1725.</p>
