wiki:
  summary: "Herr, wie du willt, so schicks mit mir, BWV\_73, is a church cantata by Johann Sebastian Bach. He composed it for the third Sunday after Epiphany and first performed it in Leipzig on 23 January 1724. It was probably composed shortly before the first performance."
  image: https://upload.wikimedia.org/wikipedia/commons/thumb/0/0d/Thomaskirche-1885.png/330px-Thomaskirche-1885.png
  url: https://en.wikipedia.org/wiki/Herr%2C_wie_du_willt%2C_so_schicks_mit_mir%2C_BWV_73
  summary_html: "<p><b><span><i lang=\"de\">Herr, wie du willt, so schicks mit mir</i></span></b>, <b><abbr>BWV</abbr><span class=\"nowrap\">\_</span>73</b>, is a church cantata by Johann Sebastian Bach. He composed it for the third Sunday after Epiphany and first performed it in Leipzig on 23 January 1724. It was probably composed shortly before the first performance.</p>"
