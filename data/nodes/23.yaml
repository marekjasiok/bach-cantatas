wiki:
  summary: >-
    Du wahrer Gott und Davids Sohn, BWV 23, is a church cantata by Johann Sebastian Bach. He composed it in Köthen
    between 1717 and 1723 for Quinquagesima Sunday and performed it as an audition piece for the position of
    Thomaskantor in Leipzig on 7 February 1723. The Sunday was the last occasion for music at church before the quiet
    time of Lent.
  image: https://upload.wikimedia.org/wikipedia/commons/thumb/0/0d/Thomaskirche-1885.png/330px-Thomaskirche-1885.png
  url: https://en.wikipedia.org/wiki/Du_wahrer_Gott_und_Davids_Sohn%2C_BWV_23
  summary_html: >-
    <p><b><span><i lang="de">Du wahrer Gott und Davids Sohn</i></span></b>, <b><span class="nowrap">BWV 23</span></b>,
    is a church cantata by Johann Sebastian Bach. He composed it in Köthen between 1717 and 1723 for <span><span
    style="font-style:normal">Quinquagesima</span></span> Sunday and performed it as an audition piece for the position
    of <span><i lang="de">Thomaskantor</i></span> in Leipzig on 7 February 1723. The Sunday was the last occasion for
    music at church before the quiet time of Lent.</p>
