wiki:
  summary: "Himmelskönig, sei willkommen, BWV\_182, is a church cantata by Johann Sebastian Bach. He composed it in Weimar for Palm Sunday, and first performed it on 25 March 1714, which was also the feast of the Annunciation that year."
  image: >-
    https://upload.wikimedia.org/wikipedia/commons/thumb/2/24/Schlosskirche_Weimar_1660.jpg/330px-Schlosskirche_Weimar_1660.jpg
  url: https://en.wikipedia.org/wiki/Himmelsk%C3%B6nig%2C_sei_willkommen%2C_BWV_182
  summary_html: "<p><b><span><i lang=\"de\">Himmelskönig, sei willkommen</i></span></b>, <b><abbr>BWV</abbr><span class=\"nowrap\">\_</span>182</b>, is a church cantata by Johann Sebastian Bach. He composed it in Weimar for Palm Sunday, and first performed it on 25 March 1714, which was also the feast of the Annunciation that year.</p>"
