bwv: '182'
title: Himmelskönig, sei willkommen
cycle: EARLY
occasion: Palm Sunday
date: '1714-03-25'
url: https://en.wikipedia.org/wiki/BWV_182
edges: {}
movements:
  - num: 2
    type: Chorus
    voices: SATB
    instruments: Flauto, Violino, Viola I/II, Violoncello, Continuo
    de: |-
      Himmelskönig, sei willkommen,
      Lass auch uns dein Zion sein!
      Komm herein,
      Du hast uns das Herz genommen.
  - num: 3
    type: Recitative
    voices: B
    instruments: Violoncello, Continuo
    de: |-
      Siehe, ich komme, im Buch ist von mir geschrieben;
      deinen Willen, mein Gott, tu ich gerne.
  - num: 4
    type: Aria
    voices: B
    instruments: Violino, Viola I/II, Continuo
    de: |-
      Starkes Lieben,
      Das dich, großer Gottessohn,
      Von dem Thron
      Deiner Herrlichkeit getrieben,
      Dass du dich zum Heil der Welt
      Als ein Opfer vorgestellt,
      Dass du dich mit Blut verschrieben.
  - num: 5
    type: Aria
    voices: A
    instruments: Flauto solo, Continuo
    de: |-
      Leget euch dem Heiland unter,
      Herzen, die ihr christlich seid!
      Tragt ein unbeflecktes Kleid
      Eures Glaubens ihm entgegen,
      Leib und Leben und Vermögen
      Sei dem König itzt geweiht.
  - num: 6
    type: Aria
    voices: T
    instruments: Violoncello, Continuo
    de: |-
      Jesu, lass durch Wohl und Weh
      Mich auch mit dir ziehen!
      Schreit die Welt nur "Kreuzige!",
      So lass mich nicht fliehen,
      Herr, von deinem Kreuzpanier;
      Kron und Palmen find ich hier.
  - num: 7
    type: Chorale
    voices: SATB
    instruments: Flauto, Violino, Viola I/II, Violoncello, Continuo
    de: |-
      Jesu, deine Passion
      Ist mir lauter Freude,
      Deine Wunden, Kron und Hohn
      Meines Herzens Weide;
      Meine Seel auf Rosen geht,
      Wenn ich dran gedenke,
      In dem Himmel eine Stätt
      Uns deswegen schenke.
  - num: 8
    type: Chorus
    voices: SATB
    instruments: Flauto, Violino, Viola I/II, Violoncello, Continuo
    de: |-
      So lasset uns gehen in Salem der Freuden,
      Begleitet den König in Lieben und Leiden.
      Er gehet voran
      Und öffnet die Bahn.
