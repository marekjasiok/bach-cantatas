wiki:
  summary: "Johann Sebastian Bach composed the church cantata O Ewigkeit, du Donnerwort, BWV\_20, in Leipzig for the first Sunday after Trinity, which fell on 11 June in 1724. Bach composed it when beginning his second year as Thomaskantor in Leipzig. It is the first cantata he composed for his second annual cycle which was planned to contain chorale cantatas, each based on a Lutheran hymn. The cantata is focused on Johann Rist's 1642 hymn \"O Ewigkeit, du Donnerwort\", with a chorale melody by Johann Schop. The topic of death and eternity matches the Gospel for the Sunday, the parable of the Rich man and Lazarus."
  image: >-
    https://upload.wikimedia.org/wikipedia/commons/thumb/0/0a/Leipzig_Nikolaikirche_um_1850.jpg/330px-Leipzig_Nikolaikirche_um_1850.jpg
  url: https://en.wikipedia.org/wiki/O_Ewigkeit%2C_du_Donnerwort%2C_BWV_20
  summary_html: "<p>Johann Sebastian Bach composed the church cantata <b><span><i lang=\"de\">O Ewigkeit, du Donnerwort</i></span></b>, <b><abbr>BWV</abbr><span class=\"nowrap\">\_</span>20</b>, in Leipzig for the first Sunday after Trinity, which fell on 11 June in 1724. Bach composed it when beginning his second year as Thomaskantor in Leipzig. It is the first cantata he composed for his second annual cycle which was planned to contain chorale cantatas, each based on a Lutheran hymn. The cantata is focused on Johann Rist's 1642 hymn \"<span><span style=\"font-style:normal\">O Ewigkeit, du Donnerwort</span></span>\", with a chorale melody by Johann Schop. The topic of death and eternity matches the Gospel for the Sunday, the parable of the Rich man and Lazarus.</p>"
