wiki:
  summary: "Ich hab in Gottes Herz und Sinn, BWV\_92, is a church cantata by Johann Sebastian Bach for use in the Lutheran service. He composed the chorale cantata in Leipzig for Septuagesimae and first performed it on 28 January 1725. It is based on the 1647 hymn \"Ich hab in Gottes Herz und Sinn\" by Paul Gerhardt, and is the only chorale cantata Bach based on a hymn by Gerhardt. The chorale revolves around faith in God and submission to his will. In nine movements, it is one of Bach's longer cantatas in terms of structure, text and music."
  image: https://upload.wikimedia.org/wikipedia/commons/f/f6/Paul_Gerhardt.jpg
  url: https://en.wikipedia.org/wiki/Ich_hab_in_Gottes_Herz_und_Sinn%2C_BWV_92
  summary_html: "<p><b><span><i lang=\"de\">Ich hab in Gottes Herz und Sinn</i></span></b>, <b><abbr>BWV</abbr><span class=\"nowrap\">\_</span>92</b>, is a church cantata by Johann Sebastian Bach for use in the Lutheran service. He composed the chorale cantata in Leipzig for Septuagesimae and first performed it on 28 January 1725. It is based on the 1647 hymn \"Ich hab in Gottes Herz und Sinn\" by Paul Gerhardt, and is the only chorale cantata Bach based on a hymn by Gerhardt. The chorale revolves around faith in God and submission to his will. In nine movements, it is one of Bach's longer cantatas in terms of structure, text and music.</p>"
