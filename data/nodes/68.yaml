wiki:
  summary: "Also hat Gott die Welt geliebt, BWV\_68, is a cantata by Johann Sebastian Bach, a church cantata for the second day of Pentecost. Bach composed the cantata in Leipzig and first performed it on 21 May 1725. It is one of nine cantatas on texts by Christiana Mariana von Ziegler, which Bach composed at the end of his second annual cycle of cantatas in Leipzig. In a unique structure among Bach's church cantatas, it begins with a chorale and ends with a complex choral movement on a quotation from the Gospel of John. Bach derived the two arias from his Hunting Cantata. He scored the cantata for two soloists, soprano and bass, a four-part choir, and a Baroque instrumental ensemble of a horn, cornett, three trombones, two oboes, taille, strings and basso continuo."
  image: >-
    https://upload.wikimedia.org/wikipedia/commons/thumb/e/e9/Christiana_Mariana_von_Ziegler.jpg/330px-Christiana_Mariana_von_Ziegler.jpg
  url: https://en.wikipedia.org/wiki/Also_hat_Gott_die_Welt_geliebt%2C_BWV_68
  summary_html: "<p><b><span><i lang=\"de\">Also hat Gott die Welt geliebt</i></span></b>, <b><abbr>BWV</abbr><span class=\"nowrap\">\_</span>68</b>, is a cantata by Johann Sebastian Bach, a church cantata for the second day of Pentecost. Bach composed the cantata in Leipzig and first performed it on 21 May 1725. It is one of nine cantatas on texts by Christiana Mariana von Ziegler, which Bach composed at the end of his second annual cycle of cantatas in Leipzig. In a unique structure among Bach's church cantatas, it begins with a chorale and ends with a complex choral movement on a quotation from the Gospel of John. Bach derived the two arias from his <i>Hunting Cantata</i>. He scored the cantata for two soloists, soprano and bass, a four-part choir, and a Baroque instrumental ensemble of a horn, cornett, three trombones, two oboes, taille, strings and basso continuo.</p>"
