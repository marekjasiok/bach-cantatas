wiki:
  summary: >-
    The Passio secundum Joannem or St John Passion, BWV 245, is a Passion or oratorio by Johann Sebastian Bach, the
    earliest of the surviving Passions by Bach. It was written during his first year as director of church music in
    Leipzig and was first performed on 7 April 1724, at Good Friday Vespers at the St. Nicholas Church.
  image: https://upload.wikimedia.org/wikipedia/commons/thumb/2/2f/Johannespassion.jpg/330px-Johannespassion.jpg
  url: https://en.wikipedia.org/wiki/St_John_Passion
  summary_html: >-
    <p>The <i><b>Passio secundum Joannem</b></i> or <i><b>St John Passion</b></i>, BWV 245, is a Passion or oratorio by
    Johann Sebastian Bach, the earliest of the surviving Passions by Bach. It was written during his first year as
    director of church music in Leipzig and was first performed on 7 April 1724, at Good Friday Vespers at the St.
    Nicholas Church.</p>
