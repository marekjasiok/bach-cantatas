bwv: '174'
title: Ich liebe den Höchsten von ganzem Gemüte
cycle: PICANDER
occasion: Pentecost 2
date: '1729-06-06'
url: https://en.wikipedia.org/wiki/BWV_174
edges: {}
movements:
  - num: 1
    type: Sinfonia
    voices: ''
    instruments: Corno da caccia I/II, Oboe I/II, Taille, Violino I-III, Viola I-III, Violoncello I-III, Fagotto, Violone, Continuo
    de: ''
  - num: 2
    type: Aria
    voices: A
    instruments: Oboe I/II, Continuo
    de: |-
      Ich liebe den Höchsten von ganzem Gemüte,
      Er hat mich auch am höchsten lieb.
      Gott allein
      Soll der Schatz der Seelen sein,
      Da hab ich die ewige Quelle der Güte.
  - num: 3
    type: Recitative
    voices: T
    instruments: Violino I-III, Viola I-III, Continuo
    de: |-
      O Liebe, welcher keine gleich!
      O unschätzbares Lösegeld!
      Der Vater hat des Kindes Leben
      Vor Sünder in den Tod gegeben
      Und alle, die das Himmelreich
      Verscherzet und verloren,
      Zur Seligkeit erkoren.
      Also hat Gott die Welt geliebt!
      Mein Herz, das merke dir
      Und stärke dich mit diesen Worten;
      Vor diesem mächtigen Panier
      Erzittern selbst die Höllenpforten.
  - num: 4
    type: Aria
    voices: B
    instruments: Violini, Viole, Continuo
    de: |-
      Greifet zu,
      Fasst das Heil, ihr Glaubenshände!
      Jesus gibt sein Himmelreich
      Und verlangt nur das von euch:
      Gläubt getreu bis an das Ende!
  - num: 5
    type: Chorale
    voices: SATB
    instruments: Oboe I e Violino I/II col Soprano, Oboe II e Violino III coll' Alto, Taille e Viola I-III col Tenore, Continuo
    de: |-
      Herzlich lieb hab ich dich, o Herr.
      Ich bitt, wollst sein von mir nicht fern
      Mit deiner Hülf und Gnaden.
      Die ganze Welt erfreut mich nicht,
      Nach Himml und Erden frag ich nicht,
      Wenn ich dich nur kann haben.
      Und wenn mir gleich mein Herz zerbricht,
      So bist du doch mein Zuversicht,
      Mein Heil und meines Herzens Trost,
      Der mich durch sein Blut hat erlöst.
      Herr Jesu Christ,
      Mein Gott und Herr, mein Gott und Herr,
      In Schanden lass mich nimmermehr!
