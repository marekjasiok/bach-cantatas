  url: https://en.wikipedia.org/wiki/Ich_liebe_den_H%C3%B6chsten_von_ganzem_Gem%C3%BCte%2C_BWV_174
  summary_html: "<p><b><span><i lang=\"de\">Ich liebe den Höchsten von ganzem Gemüte</i></span></b>, <b><abbr>BWV</abbr><span class=\"nowrap\">\_</span>174</b>, is a church cantata by Johann Sebastian Bach. He composed the cantata in Leipzig for the second day of Pentecost and first performed it on 6 June 1729.</p>"
