wiki:
  summary: "Wir danken dir, Gott, wir danken dir, BWV\_29, is a sacred cantata by Johann Sebastian Bach. He composed it in Leipzig in 1731 for Ratswechsel, the annual inauguration of a new town council, and first performed it on 27 August of that year. The cantata was part of a festive service in the St. Nicholas Church. The cantata text by an unknown author includes in movement 2 the beginning of Psalm 75, and as the closing chorale the fifth stanza of Johann Gramann's \"Nun lob, mein Seel, den Herren\". Bach scored the work in eight movements for four vocal parts and a festive Baroque orchestra of three trumpets, timpani, two oboes, strings, an obbligato organ and basso continuo. The organ dominates the first movement Sinfonia which Bach derived from a Partita for violin. The full orchestra accompanies the first choral movement and plays with the voices in the closing chorale, while a sequence of three arias alternating with two recitatives is scored intimately."
  image: >-
    https://upload.wikimedia.org/wikipedia/commons/thumb/c/c3/BWV29-sinfonia-organ-obbligato-1.jpg/330px-BWV29-sinfonia-organ-obbligato-1.jpg
  url: https://en.wikipedia.org/wiki/Wir_danken_dir%2C_Gott%2C_wir_danken_dir%2C_BWV_29
  summary_html: "<p><b><span><i lang=\"de\">Wir danken dir, Gott, wir danken dir</i></span></b>, <b><abbr>BWV</abbr><span class=\"nowrap\">\_</span>29</b>, is a sacred cantata by Johann Sebastian Bach. He composed it in Leipzig in 1731 for <span><i lang=\"de\">Ratswechsel</i></span>, the annual inauguration of a new town council, and first performed it on 27 August of that year. The cantata was part of a festive service in the St. Nicholas Church. The cantata text by an unknown author includes in movement 2 the beginning of Psalm 75, and as the closing chorale the fifth stanza of Johann Gramann's \"<span><span style=\"font-style:normal\">Nun lob, mein Seel, den Herren</span></span>\". Bach scored the work in eight movements for four vocal parts and a festive Baroque orchestra of three trumpets, timpani, two oboes, strings, an obbligato organ and basso continuo. The organ dominates the first movement <i>Sinfonia</i> which Bach derived from a <span><i>Partita</i> for violin</span>. The full orchestra accompanies the first choral movement and plays with the voices in the closing chorale, while a sequence of three arias alternating with two recitatives is scored intimately.</p>"
