bwv: '140'
title: Wachet auf, ruft uns die Stimme
cycle: LATE
occasion: Trinity XXVII
date: '1731-11-25'
url: https://en.wikipedia.org/wiki/BWV_140
edges: {}
movements:
  - num: 1
    type: Chorus
    voices: SATB
    instruments: Oboe I/II, Taille, Violino I/II, Violino piccolo, Viola, Corno col Soprano, Continuo
    de: |-
      Wachet auf, ruft uns die Stimme
      Der Wächter sehr hoch auf der Zinne,
      Wach auf, du Stadt Jerusalem!
      Mitternacht heißt diese Stunde;
      Sie rufen uns mit hellem Munde:
      Wo seid ihr klugen Jungfrauen?
      Wohl auf, der Bräutgam kömmt;
      Steht auf, die Lampen nehmt! Alleluja!
      Macht euch bereit
      Zu der Hochzeit,
      Ihr müsset ihm entgegen gehn!
  - num: 2
    type: Recitative
    voices: T
    instruments: Continuo
    de: |-
      Er kommt, er kommt,
      Der Bräutgam kommt!
      Ihr Töchter Zions, kommt heraus,
      Sein Ausgang eilet aus der Höhe
      In euer Mutter Haus.
      Der Bräutgam kommt, der einem Rehe
      Und jungen Hirsche gleich
      Auf denen Hügeln springt
      Und euch das Mahl der Hochzeit bringt.
      Wacht auf, ermuntert euch!
      Den Bräutgam zu empfangen!
      Dort, sehet, kommt er hergegangen.
  - num: 3
    type: Aria
    voices: ''
    instruments: Violino piccolo, Continuo
    de: |-
      Seele (S), Jesus (B)
      Sopran
      Wenn kömmst du, mein Heil?
      Bass
      Ich komme, dein Teil.
      Sopran
      Ich warte mit brennendem Öle.
      {Sopran, Bass}
      {Eröffne, Ich öffne} den Saal
      beide
      Zum himmlischen Mahl
      Sopran
      Komm, Jesu!
      Bass
      Komm, liebliche Seele!
  - num: 4
    type: Chorale
    voices: T
    instruments: Violino I/II, Viola, Continuo
    de: |-
      Zion hört die Wächter singen,
      Das Herz tut ihr vor Freuden springen,
      Sie wachet und steht eilend auf.
      Ihr Freund kommt vom Himmel prächtig,
      Von Gnaden stark, von Wahrheit mächtig,
      Ihr Licht wird hell, ihr Stern geht auf.
      Nun komm, du werte Kron,
      Herr Jesu, Gottes Sohn!
      Hosianna!
      Wir folgen all
      Zum Freudensaal
      Und halten mit das Abendmahl.
  - num: 5
    type: Recitative
    voices: B
    instruments: Violino I/II, Violino piccolo, Viola, Continuo
    de: |-
      So geh herein zu mir,
      Du mir erwählte Braut!
      Ich habe mich mit dir
      Von Ewigkeit vertraut.
      Dich will ich auf mein Herz,
      Auf meinem Arm gleich wie ein Siegel setzen
      Und dein betrübtes Aug ergötzen.
      Vergiß, o Seele, nun
      Die Angst, den Schmerz,
      Den du erdulden müssen;
      Auf meiner Linken sollst du ruhn,
      Und meine Rechte soll dich küssen.
  - num: 6
    type: Aria
    voices: ''
    instruments: Oboe solo, Continuo
    de: |-
      Seele (S), Jesus (B)
      Seele
      Mein Freund ist mein,
      Bass
      Und ich bin dein,
      beide
      Die Liebe soll nichts scheiden.
      {Seele, Bass}
      {Ich will, du sollst} mit {dir, mir} in Himmels Rosen weiden,
      beide
      Da Freude die Fülle, da Wonne wird sein.
  - num: 7
    type: Chorale
    voices: SATB
    instruments: >-
      Violino piccolo in octava e Corno e Oboe I e Violino I col Soprano, Oboe II e Violino II coll' Alto, Taille e
      Viola col Tenore, Continuo
    de: |-
      Gloria sei dir gesungen
      Mit Menschen- und englischen Zungen,
      Mit Harfen und mit Zimbeln schon.
      Von zwölf Perlen sind die Pforten,
      An deiner Stadt; wir sind Konsorten
      Der Engel hoch um deinen Thron.
      Kein Aug hat je gespürt,
      Kein Ohr hat je gehört
      Solche Freude.
      Des sind wir froh,
      Io, io!
      Ewig in dulci jubilo.
