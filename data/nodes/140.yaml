wiki:
  summary: "Wachet auf, ruft uns die Stimme, BWV\_140, also known as Sleepers Awake, is a church cantata by Johann Sebastian Bach, regarded as one of his most mature and popular sacred cantatas. He composed the chorale cantata in Leipzig for the 27th Sunday after Trinity and first performed it on 25 November 1731."
  image: >-
    https://upload.wikimedia.org/wikipedia/commons/thumb/b/b9/BWV_140_aria_obbligato_piccolo_violino.jpg/330px-BWV_140_aria_obbligato_piccolo_violino.jpg
  url: https://en.wikipedia.org/wiki/Wachet_auf%2C_ruft_uns_die_Stimme%2C_BWV_140
  summary_html: "<p><b><span><i lang=\"de\">Wachet auf, ruft uns die Stimme</i></span></b>, <b><abbr>BWV</abbr><span class=\"nowrap\">\_</span>140</b>, also known as <i>Sleepers Awake</i>, is a church cantata by Johann Sebastian Bach, regarded as one of his most mature and popular sacred cantatas. He composed the chorale cantata in Leipzig for the 27th Sunday after Trinity and first performed it on 25 November 1731.</p>"
