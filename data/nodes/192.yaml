bwv: '192'
title: Nun danket alle Gott
cycle: LATE
occasion: Reformation
date: 1730 (**Non-Extant/Partial**)
url: https://en.wikipedia.org/wiki/BWV_192
edges: {}
movements:
  - num: 1
    type: Chorus
    voices: SATB
    instruments: Flauto traverso I/II, Oboe I/II, Violino I/II, Viola, Continuo
    de: |-
      Nun danket alle Gott
      Mit Herzen, Mund und Händen,
      Der große Dinge tut
      An uns und allen Enden,
      Der uns von Mutterleib
      Und Kindesbeinen an
      Unzählig viel zugut
      Und noch jetzund getan.
  - num: 2
    type: Aria
    voices: ''
    instruments: Flauto traverso I, Oboe I, Violino I/II, Viola, Continuo
    de: |-
      Der ewig reiche Gott
      Woll uns bei unserm Leben
      Ein immer fröhlich Herz
      Und edlen Frieden geben
      Und uns in seiner Gnad
      Erhalten fort und fort
      Und uns aus aller Not
      Erlösen hier und dort.
  - num: 3
    type: Chorus
    voices: SATB
    instruments: Flauto traverso I/II, Oboe I/II, Violino I/II, Viola, Continuo
    de: |-
      Lob, Ehr und Preis sei Gott,
      Dem Vater und dem Sohne
      Und dem, der beiden gleich
      Im hohen Himmelsthrone,
      Dem dreieinigen Gott,
      Als der ursprünglich war
      Und ist und bleiben wird
      Jetzund und immerdar.
scoring: 'Soli: S B, Coro: S A T B, Flauto traverso I/II, Oboe I/II, Violino I/II, Viola, Continuo'
features:
  structure:
    - Chorus
    - Aria
    - Chorus
  opening: Chorus
  closing: Chorus
  voice_profile:
    SATB: 2
  instrumentation_families:
    - flauto_traverso
    - oboe
key: G major
wiki:
  summary: >-
    Nun danket alle Gott, BWV 192, is a church cantata for Trinity Sunday composed by Johann Sebastian Bach in Leipzig
    in 1730. It is an incomplete cantata, because its tenor part is missing. It is a chorale cantata, setting the
    unmodified three stanzas of Martin Rinckart's "Nun danket alle Gott". It has been regarded as an expansion of Bach's
    chorale cantata cycle.
  image: https://upload.wikimedia.org/wikipedia/commons/thumb/2/2b/Martin_Rinckart.jpg/330px-Martin_Rinckart.jpg
  url: https://en.wikipedia.org/wiki/Nun_danket_alle_Gott%2C_BWV_192
  summary_html: >-
    <p><b><span><i lang="de">Nun danket alle Gott</i></span></b>, BWV 192, is a church cantata for Trinity Sunday
    composed by Johann Sebastian Bach in Leipzig in 1730. It is an incomplete cantata, because its tenor part is
    missing. It is a chorale cantata, setting the unmodified three stanzas of Martin Rinckart's "Nun danket alle Gott".
    It has been regarded as an expansion of Bach's chorale cantata cycle.</p>
