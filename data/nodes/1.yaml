wiki:
  summary: >-
    Wie schön leuchtet der Morgenstern, BWV 1, is a church cantata for Annunciation by Johann Sebastian Bach. In 1725,
    when the cantata was composed, the feast of the Annunciation coincided with Palm Sunday. Based on Philipp Nicolai's
    hymn "Wie schön leuchtet der Morgenstern" (1599), it is one of Bach's chorale cantatas. Bach composed it in his
    second year as Thomaskantor in Leipzig, where the Marian feast was the only occasion during Lent when music of this
    kind was permitted. The theme of the hymn suits both the Annunciation and Palm Sunday occasions, in a spirit of
    longing expectation of an arrival. As usual for Bach's chorale cantata cycle, the hymn was paraphrased by a
    contemporary poet who retained the hymn's first and last stanzas unchanged, but transformed the themes of the inner
    stanzas into a sequence of alternating recitatives and arias.
  image: https://upload.wikimedia.org/wikipedia/commons/thumb/7/7f/BWV_1.jpg/330px-BWV_1.jpg
  url: https://en.wikipedia.org/wiki/Wie_sch%C3%B6n_leuchtet_der_Morgenstern%2C_BWV_1
  summary_html: >-
    <p><b><span><i lang="de">Wie schön leuchtet der Morgenstern</i></span></b>, <b><abbr>BWV</abbr> 1</b>, is a church
    cantata for Annunciation by Johann Sebastian Bach. In 1725, when the cantata was composed, the feast of the
    Annunciation coincided with Palm Sunday. Based on Philipp Nicolai's hymn "Wie schön leuchtet der Morgenstern"
    (1599), it is one of Bach's chorale cantatas. Bach composed it in his second year as Thomaskantor in Leipzig, where
    the Marian feast was the only occasion during Lent when music of this kind was permitted. The theme of the hymn
    suits both the Annunciation and Palm Sunday occasions, in a spirit of longing expectation of an arrival. As usual
    for Bach's chorale cantata cycle, the hymn was paraphrased by a contemporary poet who retained the hymn's first and
    last stanzas unchanged, but transformed the themes of the inner stanzas into a sequence of alternating recitatives
    and arias.</p>
