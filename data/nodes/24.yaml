wiki:
  summary: "Johann Sebastian Bach composed the church cantata Ein ungefärbt Gemüte, BWV\_24 in Leipzig for the fourth Sunday after Trinity and first performed it on 20 June 1723. It is the third new cantata of his first cantata cycle in Leipzig. The title has been translated more freely, for example as \"An unstained mind\", \"An unblemished conscience\", \"An undisguised intention\", and \"An unsophisticated mind\"."
  image: https://upload.wikimedia.org/wikipedia/commons/thumb/0/0d/Thomaskirche-1885.png/330px-Thomaskirche-1885.png
  url: https://en.wikipedia.org/wiki/Ein_ungef%C3%A4rbt_Gem%C3%BCte%2C_BWV_24
  summary_html: "<p>Johann Sebastian Bach composed the church cantata <b><span><i lang=\"de\">Ein ungefärbt Gemüte</i></span></b>, <b><abbr>BWV</abbr><span class=\"nowrap\">\_</span>24</b> in Leipzig for the fourth Sunday after Trinity and first performed it on 20 June 1723. It is the third new cantata of his first cantata cycle in Leipzig. The title has been translated more freely, for example as \"An unstained mind\", \"An unblemished conscience\", \"An undisguised intention\", and \"An unsophisticated mind\".</p>"
