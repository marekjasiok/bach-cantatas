wiki:
  summary: "Wer mich liebet, der wird mein Wort halten, BWV\_59, is a church cantata by Johann Sebastian Bach. He composed the cantata for Pentecost and probably first performed it in Leipzig on 28 May 1724, but an earlier performance on 16 May 1723 at the Paulinerkirche, the University Church of Leipzig, is possible."
  image: >-
    https://upload.wikimedia.org/wikipedia/commons/thumb/8/8b/Leipzig_Universit%C3%A4tskirche.JPG/330px-Leipzig_Universit%C3%A4tskirche.JPG
  url: https://en.wikipedia.org/wiki/Wer_mich_liebet%2C_der_wird_mein_Wort_halten%2C_BWV_59
  summary_html: "<p><b><span><i lang=\"de\">Wer mich liebet, der wird mein Wort halten</i></span></b>, <b><abbr>BWV</abbr><span class=\"nowrap\">\_</span>59</b>, is a church cantata by Johann Sebastian Bach. He composed the cantata for Pentecost and probably first performed it in Leipzig on 28 May 1724, but an earlier performance on 16 May 1723 at the <span><span style=\"font-style:normal\">Paulinerkirche</span></span>, the University Church of Leipzig, is possible.</p>"
