wiki:
  summary: "Alles, was von Gott geboren, BWV\_80.1, is a church cantata by Johann Sebastian Bach. He composed it in Weimar for Oculi, the third Sunday in Lent, and first performed it on 24 March 1715 or 15 March 1716. The music is lost, but Bach expanded on it in about 1730 to create his chorale cantata for Reformation Day, Ein feste Burg ist unser Gott, BWV\_80."
  image: >-
    https://upload.wikimedia.org/wikipedia/commons/thumb/2/24/Schlosskirche_Weimar_1660.jpg/330px-Schlosskirche_Weimar_1660.jpg
  url: https://en.wikipedia.org/wiki/Alles%2C_was_von_Gott_geboren%2C_BWV_80a
  summary_html: "<p><b><span><i lang=\"de\">Alles, was von Gott geboren</i></span></b>, BWV\_80.1, is a church cantata by Johann Sebastian Bach. He composed it in Weimar for Oculi, the third Sunday in Lent, and first performed it on 24 March 1715 or 15 March 1716. The music is lost, but Bach expanded on it in about 1730 to create his chorale cantata for Reformation Day, <span><i>Ein feste Burg ist unser Gott</i>, BWV\_80</span>.</p>"
