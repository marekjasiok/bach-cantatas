  summary_html: "<p><b><span><i lang=\"de\">O heilges Geist- und Wasserbad</i></span></b>, <b><abbr>BWV</abbr><span class=\"nowrap\">\_</span>165</b>, is a church cantata by Johann Sebastian Bach. He composed it in Weimar for Trinity Sunday and led the first performance on 16 June 1715.</p>"
