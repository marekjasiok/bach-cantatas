wiki:
  summary: "Jesu, der du meine Seele, BWV\_78, is a church cantata by Johann Sebastian Bach. He composed it in Leipzig for the 14th Sunday after Trinity and first performed it on 10 September 1724. It is based on the 1641 hymn by Johann Rist, \"Jesu, der du meine Seele\", for which it is named. The topic of the chorale, the Passion of Jesus cleansing the believer, is only distantly related to the Sunday's readings."
  image: https://upload.wikimedia.org/wikipedia/commons/thumb/c/cd/Rist_Johann.jpg/330px-Rist_Johann.jpg
  url: https://en.wikipedia.org/wiki/Jesu%2C_der_du_meine_Seele%2C_BWV_78
  summary_html: "<p><b><span><i lang=\"de\">Jesu, der du meine Seele</i></span></b>, <b><abbr>BWV</abbr><span class=\"nowrap\">\_</span>78</b>, is a church cantata by Johann Sebastian Bach. He composed it in Leipzig for the 14th Sunday after Trinity and first performed it on 10 September 1724. It is based on the 1641 hymn by Johann Rist, \"Jesu, der du meine Seele\", for which it is named. The topic of the chorale, the Passion of Jesus cleansing the believer, is only distantly related to the Sunday's readings.</p>"
