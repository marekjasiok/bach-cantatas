wiki:
  summary: >-
    Sie werden euch in den Bann tun, BWV 44, is a church cantata by Johann Sebastian Bach. He composed it in Leipzig for
    Exaudi, the Sunday after Ascension, and first performed it on 21 May 1724. It is part of his first cantata cycle.
  image: https://upload.wikimedia.org/wikipedia/commons/thumb/0/0d/Thomaskirche-1885.png/330px-Thomaskirche-1885.png
  url: https://en.wikipedia.org/wiki/Sie_werden_euch_in_den_Bann_tun%2C_BWV_44
  summary_html: >-
    <p><b><span><i lang="de">Sie werden euch in den Bann tun</i></span></b>, <b><span class="nowrap">BWV 44</span></b>,
    is a church cantata by Johann Sebastian Bach. He composed it in Leipzig for Exaudi, the Sunday after Ascension, and
    first performed it on 21 May 1724. It is part of his first cantata cycle.</p>
