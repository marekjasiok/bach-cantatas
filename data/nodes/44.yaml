bwv: '44'
title: Sie werden euch in den Bann tun
cycle: C1
occasion: Ascension I
date: '1724-05-21'
url: https://en.wikipedia.org/wiki/BWV_44
edges: {}
movements:
  - num: 1
    type: Aria
    voices: ''
    instruments: Oboe I/II, Fagotto, Continuo
    de: Sie werden euch in den Bann tun.
  - num: 2
    type: Chorus
    voices: SATB
    instruments: Oboe I/II, Violino I/II, Viola, Fagotto, Continuo
    de: |-
      Es kömmt aber die Zeit, dass, wer euch tötet,
      wird meinen, er tue Gott einen Dienst daran.
  - num: 3
    type: Aria
    voices: A
    instruments: Oboe I, Fagotto, Continuo
    de: |-
      Christen müssen auf der Erden
      Christi wahre Jünger sein.
      Auf sie warten alle Stunden,
      Bis sie selig überwunden,
      Marter, Bann und schwere Pein.
  - num: 4
    type: Chorale
    voices: T
    instruments: Fagotto, Continuo
    de: |-
      Ach Gott, wie manches Herzeleid
      Begegnet mir zu dieser Zeit.
      Der schmale Weg ist trübsalvoll,
      Den ich zum Himmel wandern soll.
  - num: 5
    type: Recitative
    voices: B
    instruments: Fagotto, Continuo
    de: |-
      Es sucht der Antichrist,
      Das große Ungeheuer,
      Mit Schwert und Feuer
      Die Glieder Christi zu verfolgen,
      Weil ihre Lehre ihm zuwider ist.
      Er bildet sich dabei wohl ein,
      Es müsse sein Tun Gott gefällig sein.
      Allein, es gleichen Christen denen Palmenzweigen,
      Die durch die Last nur desto höher steigen.
  - num: 6
    type: Aria
    voices: S
    instruments: Oboe I/II, Violino I/II, Viola, Fagotto, Continuo
    de: |-
      Es ist und bleibt der Christen Trost,
      Dass Gott vor seine Kirche wacht.
      Denn wenn sich gleich die Wetter türmen,
      So hat doch nach den Trübsalstürmen
      Die Freudensonne bald gelacht.
  - num: 7
    type: Chorale
    voices: SATB
    instruments: Oboe I e Violino I col Soprano, Oboe II e Violino II coll' Alto, Viola col Tenore, Fagotto, Continuo
    de: |-
      So sei nun, Seele, deine
      Und traue dem alleine,
      Der dich erschaffen hat.
      Es gehe, wie es gehe,
      Dein Vater in der Höhe,
      Der weiß zu allen Sachen Rat.
scoring: 'Soli: S A T B, Coro: S A T B, Oboe I/II, Violino I/II, Viola, Fagotto, Continuo'
