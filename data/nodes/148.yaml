wiki:
  summary: >-
    Bringet dem Herrn Ehre seines Namens, BWV 148, is a cantata by Johann Sebastian Bach, a church cantata for the 17th
    Sunday after Trinity. Bach composed it in Leipzig in 1723 or 1725.
