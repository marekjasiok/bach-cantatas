bwv: '6'
title: Bleib bei uns...
cycle: C2
occasion: Easter Monday
date: '1725-04-02'
url: https://en.wikipedia.org/wiki/BWV_6
edges: {}
movements:
  - num: 1
    type: Chorus
    voices: SATB
    instruments: Oboe I/II, Oboe da caccia, Violino I/II, Viola, Continuo
    de: |-
      Bleib bei uns, denn es will Abend werden,
      und der Tag hat sich geneiget.
  - num: 2
    type: Aria
    voices: A
    instruments: Oboe da caccia (o, Viola), Continuo
    de: |-
      Hochgelobter Gottessohn,
      Lass es dir nicht sein entgegen,
      Dass wir itzt vor deinem Thron
      Eine Bitte niederlegen:
      Bleib, ach bleibe unser Licht,
      Weil die Finsternis einbricht.
  - num: 3
    type: Chorale
    voices: S
    instruments: Violoncello piccolo, Continuo
    de: |-
      Ach bleib bei uns, Herr Jesu Christ,
      Weil es nun Abend worden ist,
      Dein göttlich Wort, das helle Licht,
      Lass ja bei uns auslöschen nicht.
      In dieser letzt'n betrübten Zeit
      Verleih uns, Herr, Beständigkeit,
      Dass wir dein Wort und Sakrament
      Rein b'halten bis an unser End.
  - num: 4
    type: Recitative
    voices: B
    instruments: Continuo
    de: |-
      Es hat die Dunkelheit
      An vielen Orten überhand genommen.
      Woher ist aber dieses kommen?
      Bloß daher, weil sowohl die Kleinen als die Großen
      Nicht in Gerechtigkeit
      Vor dir, o Gott, gewandelt
      Und wider ihre Christenpflicht gehandelt.
      Drum hast du auch den Leuchter umgestoßen.
  - num: 5
    type: Aria
    voices: T
    instruments: Violino I/II, Viola, Continuo
    de: |-
      Jesu, lass uns auf dich sehen,
      Dass wir nicht
      Auf den Sündenwegen gehen.
      Lass das Licht
      Deines Worts uns helle scheinen
      Und dich jederzeit treu meinen.
  - num: 6
    type: Chorale
    voices: SATB
    instruments: Violino I e Oboe I/II col Soprano, Violino II e Oboe da caccia coll' Alto, Viola col Tenore, Continuo
    de: |-
      Beweis dein Macht, Herr Jesu Christ,
      Der du Herr aller Herren bist;
      Beschirm dein arme Christenheit,
      Dass sie dich lob in Ewigkeit.
