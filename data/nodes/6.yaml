  summary_html: "<p><b><span><i lang=\"de\">Bleib bei uns, denn es will Abend werden</i></span></b>, <b><abbr>BWV</abbr><span class=\"nowrap\">\_</span>6</b>, is a cantata by Johann Sebastian Bach for use in a Lutheran service. He composed it in Leipzig in 1725 for Easter Monday and first performed it on 2 April 1725.</p>"
