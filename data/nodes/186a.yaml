wiki:
  summary: "Ärgre dich, o Seele, nicht, BWV\_186 is a church cantata by Johann Sebastian Bach. He composed it originally in Weimar in 1716 for Advent, BWV 186a, and expanded it in Leipzig in 1723 for the seventh Sunday after Trinity, where he first performed it on 11 July 1723."
  image: >-
    https://upload.wikimedia.org/wikipedia/commons/thumb/2/24/Schlosskirche_Weimar_1660.jpg/330px-Schlosskirche_Weimar_1660.jpg
  url: https://en.wikipedia.org/wiki/%C3%84rgre_dich%2C_o_Seele%2C_nicht%2C_BWV_186
  summary_html: "<p><b><span><i lang=\"de\">Ärgre dich, o Seele, nicht</i></span></b>, <b><abbr>BWV</abbr><span class=\"nowrap\">\_</span>186</b> is a church cantata by Johann Sebastian Bach. He composed it originally in Weimar in 1716 for Advent, <b><span class=\"nowrap\">BWV 186a</span></b>, and expanded it in Leipzig in 1723 for the seventh Sunday after Trinity, where he first performed it on 11 July 1723.</p>"
