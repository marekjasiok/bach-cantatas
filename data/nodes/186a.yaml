bwv: 186a
title: Ärgre dich, o Seele, nicht
cycle: EARLY
occasion: Advent III
date: 1716 (**Non-Extant**)
url: https://en.wikipedia.org/wiki/BWV_186a
edges: {}
movements:
  - num: 1
    type: Chorus
    voices: SATB
    instruments: Oboe I/II, Taille, Fagotto, Violino I/II, Viola, Continuo
    de: |-
      Ärgre dich, o Seele, nicht,
      Dass das allerhöchste Licht,
      Gottes Glanz und Ebenbild,
      Sich in Knechtsgestalt verhüllt.
      Ärgre dich, o Seele, nicht!
  - num: 2
    type: Aria
    voices: B
    instruments: Continuo
    de: |-
      Bist du, der da kommen soll,
      Seelenfreund im Kirchengarten?
      Mein Gemüt ist zweifelsvoll,
      Soll ich eines andern warten?
      Doch, o Seele, zweifle nicht.
      Lass Vernunft dich nicht verstricken,
      Deinen Schild, o Jakobs Licht,
      Kannst du in der Schrift erblicken!
  - num: 3
    type: Aria
    voices: T
    instruments: Viola, Continuo
    de: |-
      Messias lässt sich merken
      Aus seinen Gnadenwerken,
      Unreine werden rein.
      Die geistlich Lahme gehen,
      Die geistlich Blinde sehen
      Den hellen Gnadenschein.
  - num: 4
    type: Aria
    voices: S
    instruments: Violino I/II, Continuo
    de: |-
      Die Armen will der Herr umarmen
      Mit Gnaden hier und dort!
      Er schenket ihnen aus Erbarmen
      Den höchsten Schatz, des Lebens Wort!
  - num: 5
    type: Aria
    voices: S, A
    instruments: Oboe I/II, Violino I/II, Viola, Continuo
    de: |-
      Lass, Seele, kein Leiden
      Von Jesu dich scheiden,
      Sei, Seele, getreu!
      Dir bleibet die Krone
      Aus Gnaden zu Lohne,
      Wenn du von Banden des Leibes nun frei.
  - num: 6
    type: Chorale
    voices: SATB
    instruments: Oboe I/II, Violino I/II, Viola, Fagotto, Continuo
    de: |-
      Darum, ob ich schon dulde
      Hie Widerwärtigkeit,
      Wie ich auch wohl verschulde,
      Kommt doch die Ewigkeit,
      Ist aller Freuden voll,
      Dieselb ohn einigs Ende,
      Dieweil ich Christum kennt,
      Mir widerfahren soll.
