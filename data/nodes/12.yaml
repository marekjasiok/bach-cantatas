wiki:
  summary: "Weinen, Klagen, Sorgen, Zagen, BWV\_12, is a church cantata by Johann Sebastian Bach. He composed it in Weimar for Jubilate, the third Sunday after Easter, and led the first performance on 22 April 1714 in the Schlosskirche, the court chapel of the Schloss in Weimar."
  image: >-
    https://upload.wikimedia.org/wikipedia/commons/thumb/2/24/Schlosskirche_Weimar_1660.jpg/330px-Schlosskirche_Weimar_1660.jpg
  url: https://en.wikipedia.org/wiki/Weinen%2C_Klagen%2C_Sorgen%2C_Zagen%2C_BWV_12
  summary_html: "<p><b><span><i lang=\"de\">Weinen, Klagen, Sorgen, Zagen</i></span></b>, <b><abbr>BWV</abbr><span class=\"nowrap\">\_</span>12</b>, is a church cantata by Johann Sebastian Bach. He composed it in Weimar for Jubilate, the third Sunday after Easter, and led the first performance on 22 April 1714 in the Schlosskirche, the court chapel of the <i>Schloss</i> in Weimar.</p>"
