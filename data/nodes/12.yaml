bwv: '12'
title: Weinen, Klagen, Sorgen, Zagen
cycle: EARLY
occasion: Jubilate
date: '1714-04-22'
url: https://en.wikipedia.org/wiki/BWV_12
movements:
  - num: 1
    type: Sinfonia
    voices: ''
    instruments: Oboe, Violino I/II, Viola I/II, Continuo e Fagotto
  - num: 2
    type: Chorus
    voices: S, A, T, B
    instruments: Violino I/II, Viola I/II, Continuo e Fagotto
    de: |-
      Weinen, Klagen,
      Sorgen, Zagen,
      Angst und Not
      Sind der Christen Tränenbrot,
      Die das Zeichen Jesu tragen.
  - num: 3
    type: Recitative
    voices: A
    instruments: Violino I/II, Viola I/II, Continuo e Fagotto
    de: Wir müssen durch viel Trübsal in das Reich Gottes eingehen.
  - num: 4
    type: Aria
    voices: A
    instruments: Oboe, Continuo
    de: |-
      Kreuz und Krone sind verbunden,
      Kampf und Kleinod sind vereint.
      Christen haben alle Stunden
      Ihre Qual und ihren Feind,
      Doch ihr Trost sind Christi Wunden.
  - num: 5
    type: Aria
    voices: B
    instruments: Violino I/II, Continuo
    de: |-
      Ich folge Christo nach,
      Von ihm will ich nicht lassen
      Im Wohl und Ungemach,
      Im Leben und Erblassen.
      Ich küsse Christi Schmach,
      Ich will sein Kreuz umfassen.
      Ich folge Christo nach,
      Von ihm will ich nicht lassen.
  - num: 6
    type: Aria
    voices: T
    instruments: Tromba, Continuo
    de: |-
      Sei getreu, alle Pein
      Wird doch nur ein Kleines sein.
      Nach dem Regen
      Blüht der Segen,
      Alles Wetter geht vorbei.
      Sei getreu, sei getreu!
  - num: 7
    type: Chorale
    voices: S, A, T, B
    de: |-
      Instrumentierung nicht überliefert
      Was Gott tut, das ist wohlgetan
      Dabei will ich verbleiben,
      Es mag mich auf die rauhe Bahn
      Not, Tod und Elend treiben,
      So wird Gott mich
      Ganz väterlich
      In seinen Armen halten:
      Drum lass ich ihn nur walten.
