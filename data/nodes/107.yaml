wiki:
  summary: "Johann Sebastian Bach composed the church cantata Was willst du dich betrüben, BWV\_107 in Leipzig for the seventh Sunday after Trinity and first performed on 23 July 1724. The chorale cantata is based on Johann Heermann's hymn in seven stanzas \"Was willst du dich betrüben\" (1630)."
  image: https://upload.wikimedia.org/wikipedia/en/thumb/3/3a/Bwv107.jpg/330px-Bwv107.jpg
  url: https://en.wikipedia.org/wiki/Was_willst_du_dich_betr%C3%BCben%2C_BWV_107
  summary_html: "<p>Johann Sebastian Bach composed the church cantata <b><span><i lang=\"de\">Was willst du dich betrüben</i></span></b>, <b><abbr>BWV</abbr><span class=\"nowrap\">\_</span>107</b> in Leipzig for the seventh Sunday after Trinity and first performed on 23 July 1724. The chorale cantata is based on Johann Heermann's hymn in seven stanzas \"Was willst du dich betrüben\" (1630).</p>"
