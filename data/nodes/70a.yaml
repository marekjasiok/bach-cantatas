wiki:
  summary: "Wachet! betet! betet! wachet! is the title of two church cantatas by Johann Sebastian Bach. He composed a first version, BWV\_70a, in Weimar for the second Sunday in Advent of 1716 and expanded it in 1723 in Leipzig to BWV 70, a cantata in two parts for the 26th Sunday after Trinity."
  image: >-
    https://upload.wikimedia.org/wikipedia/commons/thumb/2/24/Schlosskirche_Weimar_1660.jpg/330px-Schlosskirche_Weimar_1660.jpg
  url: https://en.wikipedia.org/wiki/Wachet!_betet!_betet!_wachet!_BWV_70
  summary_html: "<p><b><span><i lang=\"de\">Wachet! betet! betet! wachet!</i></span></b> is the title of two church cantatas by Johann Sebastian Bach. He composed a first version, <b><abbr>BWV</abbr><span class=\"nowrap\">\_</span>70a</b>, in Weimar for the second Sunday in Advent of 1716 and expanded it in 1723 in Leipzig to <b><span class=\"nowrap\">BWV 70</span></b>, a cantata in two parts for the 26th Sunday after Trinity.</p>"
