bwv: '21'
title: Ich hatte viel Bekümmernis
cycle: EARLY
occasion: Trinity III
date: '1714-06-17'
url: https://en.wikipedia.org/wiki/BWV_21
edges: {}
movements:
  - num: 1
    type: Sinfonia
    voices: ''
    instruments: Oboe, Violino I/II, Viola, Fagotto, Organo e Continuo
    de: ''
  - num: 2
    type: Chorus
    voices: SATB
    instruments: Oboe, Violino I/II, Viola, Fagotto, Organo e Continuo
    de: |-
      Ich hatte viel Bekümmernis
      in meinem Herzen;
      aber deine Tröstungen erquicken meine Seele.
  - num: 3
    type: Aria
    voices: S
    instruments: Oboe, Organo e Continuo
    de: |-
      Seufzer, Tränen, Kummer, Not,
      Ängstlichs Sehnen, Furcht und Tod
      Nagen mein beklemmtes Herz,
      Ich empfinde Jammer, Schmerz.
  - num: 4
    type: Recitative
    voices: T
    instruments: Violino I/II, Viola, Fagotto, Organo e Continuo
    de: |-
      Wie hast du dich, mein Gott,
      In meiner Not,
      In meiner Furcht und Zagen
      Denn ganz von mir gewandt?
      Ach! kennst du nicht dein Kind?
      Ach! hörst du nicht das Klagen
      Von denen, die dir sind
      Mit Bund und Treu verwandt?
      Da warest meine Lust
      Und bist mir grausam worden;
      Ich suche dich an allen Orten,
      Ich ruf und schrei dir nach,
      Allein mein Weh und Ach!
      Scheint itzt, als sei es dir ganz unbewusst.
  - num: 5
    type: Aria
    voices: T
    instruments: Violino I/II, Viola, Fagotto, Organo e Continuo
    de: |-
      Bäche von gesalznen Zähren,
      Fluten rauschen stets einher.
      Sturm und Wellen mich versehren,
      Und dies trübsalsvolle Meer
      Will mir Geist und Leben schwächen,
      Mast und Anker wollen brechen,
      Hier versink ich in den Grund,
      Dort seh ich der Hölle Schlund.
  - num: 6
    type: Chorus
    voices: SATB
    instruments: Oboe, Violino I/II, Viola, Fagotto, Organo e Continuo
    de: |-
      Was betrübst du dich, meine Seele,
      und bist so unruhig in mir? Harre auf Gott; denn ich werde ihm noch
      danken, dass er meines Angesichtes Hilfe und mein Gott ist.
  - num: 7
    type: Recitative
    voices: ''
    instruments: Violino I/II, Viola, Fagotto e Organo e Continuo
    de: |-
      Seele (S), Jesus (B)
      Sopran
      Ach Jesu, meine Ruh,
      Mein Licht, wo bleibest du?
      Bass
      O Seele sieh! Ich bin bei dir.
      Sopran
      Bei mir?
      Hier ist ja lauter Nacht.
      Bass
      Ich bin dein treuer Freund,
      Der auch im Dunkeln wacht,
      Wo lauter Schalken seind.
      Sopran
      Brich doch mit deinem Glanz und Licht des Trostes ein.
      Bass
      Die Stunde kömmet schon,
      Da deines Kampfes Kron'
      Dir wird ein süßes Labsal sein.
  - num: 8
    type: Aria
    voices: ''
    instruments: Organo e Continuo
    de: |-
      Seele (S), Jesus (B)
      Sopran
      Komm, mein Jesu, und erquicke,
      Bass
      Ja, ich komme und erquicke
      Sopran
      Und erfreu mit deinem Blicke.
      Bass
      Dich mit meinem Gnadenblicke,
      Sopran
      Diese Seele,
      Bass
      Deine Seele,
      Sopran
      Die soll sterben,
      Bass
      Die soll leben,
      Sopran
      Und nicht leben
      Bass
      Und nicht sterben
      Sopran
      Und in ihrer Unglückshöhle
      Bass
      Hier aus dieser wunden Höhle
      Sopran
      Ganz verderben?
      Bass
      Sollst du erben
      Sopran
      Ich muss stets in Kummer schweben,
      Bass
      Heil! durch diesen Saft der Reben,
      Sopran
      Ja, ach ja, ich bin verloren!
      Bass
      Nein, ach nein, du bist erkoren!
      Sopran
      Nein, ach nein, du hassest mich!
      Bass
      Ja, ach ja, ich liebe dich!
      Sopran
      Ach, Jesu, durchsüße mir Seele und Herze,
      Bass
      Entweichet, ihr Sorgen, verschwinde, du Schmerze!
      Sopran
      Komm, mein Jesus, und erquicke
      Bass
      Ja, ich komme und erquicke
      Sopran
      Mit deinem Gnadenblicke!
      Bass
      Dich mit meinem Gnadenblicke
  - num: 9
    type: Chorus
    voices: SATB
    instruments: Oboe, Violino I-III, Trombone I-IV, Fagotto, Organo e Continuo
    de: |-
      Sei nun wieder zufrieden, meine Seele,
      denn der Herr tut dir Guts.
      Tenor
      Was helfen uns die schweren Sorgen,
      Was hilft uns unser Weh und Ach?
      Was hilft es, dass wir alle Morgen
      Beseufzen unser Ungemach?
      Wir machen unser Kreuz und Leid
      Nur größer durch die Traurigkeit.
      Sopran
      Denk nicht in deiner Drangsalshitze,
      Dass du von Gott verlassen seist,
      Und dass Gott der im Schoße sitze,
      Der sich mit stetem Glücke speist.
      Die folgend Zeit verändert viel
      Und setzet jeglichem sein Ziel.
  - num: 10
    type: Aria
    voices: T
    instruments: Organo e Continuo
    de: |-
      Erfreue dich, Seele, erfreue dich, Herze,
      Entweiche nun, Kummer, verschwinde, du Schmerze!
      Verwandle dich, Weinen, in lauteren Wein,
      Es wird nun mein Ächzen ein Jauchzen mir sein!
      Es brennet und sammet die reineste Kerze
      Der Liebe, des Trostes in Seele und Brust,
      Weil Jesus mich tröstet mit himmlischer Lust.
  - num: 11
    type: Chorus
    voices: T
    instruments: Tromba I-III, Tamburi, Oboe, Violino I/II, Viola, Fagotto, Organo, Continuo
    de: |-
      Das Lamm, das erwürget ist,
      ist würdig zu nehmen Kraft und Reichtum und Weisheit
      und Stärke und Ehre und Preis und Lob.
      Lob und Ehre und Preis und Gewalt sei unserm
      Gott von Ewigkeit zu Ewigkeit. Amen, Alleluja!
