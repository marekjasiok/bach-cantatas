wiki:
  summary: "Johann Sebastian Bach composed the church cantata Ich hatte viel Bekümmernis, BWV\_21 in Weimar, possibly in 1713, partly even earlier. He used it in 1714 and later for the third Sunday after Trinity of the liturgical year. The work marks a transition between motet style on biblical and hymn text to operatic recitatives and arias on contemporary poetry. Bach catalogued the work as e per ogni tempo, indicating that due to its general theme, the cantata is suited for any occasion."
  image: >-
    https://upload.wikimedia.org/wikipedia/commons/thumb/2/24/Schlosskirche_Weimar_1660.jpg/330px-Schlosskirche_Weimar_1660.jpg
  url: https://en.wikipedia.org/wiki/Ich_hatte_viel_Bek%C3%BCmmernis%2C_BWV_21
  summary_html: "<p>Johann Sebastian Bach composed the church cantata <b><span><i lang=\"de\">Ich hatte viel Bekümmernis</i></span></b>, <b><abbr>BWV</abbr><span class=\"nowrap\">\_</span>21</b> in Weimar, possibly in 1713, partly even earlier. He used it in 1714 and later for the third Sunday after Trinity of the liturgical year. The work marks a transition between motet style on biblical and hymn text to operatic recitatives and arias on contemporary poetry. Bach catalogued the work as <span><i lang=\"it\">e per ogni tempo</i></span>, indicating that due to its general theme, the cantata is suited for any occasion.</p>"
