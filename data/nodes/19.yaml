wiki:
  summary: "Es erhub sich ein Streit, BWV\_19, is a church cantata by Johann Sebastian Bach. He composed it in Leipzig in 1726 for the Feast of Saint Michael and first performed it on 29 September 1726. It is the second of his three extant cantatas for this feast."
  image: >-
    https://upload.wikimedia.org/wikipedia/commons/thumb/7/7a/GuidoReni_MichaelDefeatsSatan.jpg/330px-GuidoReni_MichaelDefeatsSatan.jpg
  url: https://en.wikipedia.org/wiki/Es_erhub_sich_ein_Streit%2C_BWV_19
  summary_html: "<p><i><b><span><i lang=\"de\">Es erhub sich ein Streit</i></span></b></i>, <b><span><abbr>BWV</abbr></span><span class=\"nowrap\">\_</span>19</b>, is a church cantata by Johann Sebastian Bach. He composed it in Leipzig in 1726 for the Feast of Saint Michael and first performed it on 29 September 1726. It is the second of his three extant cantatas for this feast.</p>"
