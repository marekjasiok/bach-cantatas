bwv: '19'
title: Es erhub sich ein Streit
cycle: C3
occasion: St. Michael's
date: '1726-09-29'
url: https://en.wikipedia.org/wiki/BWV_19
edges: {}
movements:
  - num: 1
    type: Chorus
    voices: T
    instruments: Tromba I-III, Tamburi, Violino I/II, Oboe I/II, Viola e Taille, Continuo
    de: |-
      Es erhub sich ein Streit.
      Die rasende Schlange, der höllische Drache
      Stürmt wider den Himmel mit wütender Rache.
      Aber Michael bezwingt,
      Und die Schar, die ihn umringt
      Stürzt des Satans Grausamkeit.
  - num: 2
    type: Recitative
    voices: B
    instruments: Continuo
    de: |-
      Gottlob! der Drache liegt.
      Der unerschaffne Michael
      Und seiner Engel
      Heer hat ihn besiegt.
      Dort liegt er in der Finsternis
      Mit Ketten angebunden,
      Und seine Stätte wird nicht mehr
      Im Himmelreich gefunden.
      Wir stehen sicher und gewiss,
      Und wenn uns gleich sein Brüllen schrecket,
      So wird doch unser Leib und Seel
      Mit Engeln zugedecket.
  - num: 3
    type: Aria
    voices: S
    instruments: Oboe d'amore I/II, Continuo
    de: |-
      Gott schickt uns Mahanaim zu;
      Wir stehen oder gehen,
      So können wir in sichrer Ruh
      Vor unsern Feinden stehen.
      Es lagert sich, so nah als fern,
      Um uns der Engel unsers Herrn
      Mit Feuer, Roß und Wagen.
  - num: 4
    type: Recitative
    voices: T
    instruments: Violino I/II, Viola, Continuo
    de: |-
      Was ist der schnöde Mensch, das Erdenkind?
      Ein Wurm, ein armer Sünder.
      Schaut, wie ihn selbst der Herr so lieb gewinnt,
      Dass er ihn nicht zu niedrig schätzet
      Und ihm die Himmelskinder,
      Der Seraphinen Heer,
      Zu seiner Wacht und Gegenwehr,
      Zu seinem Schutze setzet.
  - num: 5
    type: Aria
    voices: ''
    instruments: Tromba, Violino I/II, Viola, Continuo
    de: |-
      Bleibt, ihr Engel, bleibt bei mir!
      Führet mich auf beiden Seiten,
      Dass mein Fuß nicht möge gleiten!
      Aber lernt mich auch allhier
      Euer großes Heilig singen
      Und dem Höchsten Dank zu singen!
  - num: 6
    type: Recitative
    voices: S
    instruments: Continuo
    de: |-
      Lasst uns das Angesicht
      Der frommen Engel lieben
      Und sie mit unsern Sünden nicht
      Vertreiben oder auch betrüben.
      So sein sie, wenn der Herr gebeut,
      Der Welt Valet zu sagen,
      Zu unsrer Seligkeit
      Auch unser Himmelswagen.
  - num: 7
    type: Chorale
    voices: T
    instruments: >-
      Tromba I-III, Tamburi, Oboe I e Violino I col Soprano, Oboe II e Violino II coll' Alto, Taille e Viola col Tenore,
      Continuo
    de: |-
      Lass dein' Engel mit mir fahren
      Auf Elias Wagen rot
      Und mein Seele wohl bewahren,
      Wie Lazrum nach seinem Tod.
      Lass sie ruhn in deinem Schoß,
      Erfüll sie mit Freud und Trost,
      Bis der Leib kommt aus der Erde
      Und mit ihr vereinigt werde.
