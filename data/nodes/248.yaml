bwv: '248'
title: Weihnachtsoratorium
occasion: Christmas Day
cycle: C3
wiki:
  summary: "The Christmas Oratorio, BWV 248, is an oratorio by Johann Sebastian Bach intended for performance in church during the Christmas season. It is in six parts, each part a cantata intended for performance in a church service on a feast day of the Christmas period. It was written for the Christmas season of 1734 and incorporates music from earlier compositions, including three secular cantatas written during 1733 and 1734 and a largely lost church cantata, BWV\_248a. The date is confirmed in Bach's autograph manuscript. The next complete public performance was not until 17 December 1857 by the Sing-Akademie zu Berlin under Eduard Grell. The Christmas Oratorio is a particularly sophisticated example of parody music. The author of the text is unknown, although a likely collaborator was Christian Friedrich Henrici (Picander)."
  image: https://upload.wikimedia.org/wikipedia/commons/thumb/8/85/BWV_248_Autograph.jpg/330px-BWV_248_Autograph.jpg
  url: https://en.wikipedia.org/wiki/Christmas_Oratorio
  summary_html: "<p>The <i><b>Christmas Oratorio</b></i>, <b><span class=\"nowrap\">BWV 248</span></b>, is an oratorio by Johann Sebastian Bach intended for performance in church during the Christmas season. It is in six parts, each part a cantata intended for performance in a church service on a feast day of the Christmas period. It was written for the Christmas season of 1734 and incorporates music from earlier compositions, including three secular cantatas written during 1733 and 1734 and a largely lost church cantata, BWV\_248a. The date is confirmed in Bach's autograph manuscript. The next complete public performance was not until 17 December 1857 by the Sing-Akademie zu Berlin under Eduard Grell. The <i>Christmas Oratorio</i> is a particularly sophisticated example of parody music. The author of the text is unknown, although a likely collaborator was Christian Friedrich Henrici (Picander).</p>"
