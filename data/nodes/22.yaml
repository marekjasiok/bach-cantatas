wiki:
  summary: "Jesus nahm zu sich die Zwölfe, BWV\_22, is a church cantata by Johann Sebastian Bach composed for Quinquagesima, the last Sunday before Lent. Bach composed it as an audition piece for the position of Thomaskantor in Leipzig and first performed it there on 7 February 1723."
  image: >-
    https://upload.wikimedia.org/wikipedia/commons/thumb/6/66/Bach_BWV_22_manuscript_Kuhnau.jpg/330px-Bach_BWV_22_manuscript_Kuhnau.jpg
  url: https://en.wikipedia.org/wiki/Jesus_nahm_zu_sich_die_Zw%C3%B6lfe%2C_BWV_22
  summary_html: "<p><b><span><i lang=\"de\">Jesus nahm zu sich die Zwölfe</i></span></b>, <b><abbr>BWV</abbr><span class=\"nowrap\">\_</span>22</b>, is a church cantata by Johann Sebastian Bach composed for Quinquagesima, the last Sunday before Lent. Bach composed it as an audition piece for the position of Thomaskantor in Leipzig and first performed it there on 7 February 1723.</p>"
