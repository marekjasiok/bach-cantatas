bwv: '22'
title: Jesus nahm zu sich die Zwölfe
cycle: C1
occasion: Estomihi
date: '1723-02-07'
url: https://en.wikipedia.org/wiki/BWV_22
edges: {}
movements:
  - num: 1
    type: Aria
    voices: T, B
    instruments: Oboe, Violino I/II, Viola, Continuo
    de: |-
      Tenor
      Jesus nahm zu sich die Zwölfe und sprach:
      Bass
      Sehet, wir gehn hinauf gen Jerusalem,
      und es wird alles vollendet werden,
      das geschrieben ist von des Menschen Sohn.
      Chor
      Sie aber vernahmen der keines und wussten nicht,
      was das gesaget war.
  - num: 2
    type: Aria
    voices: A
    instruments: Oboe solo, Continuo
    de: |-
      Mein Jesu, ziehe mich nach dir,
      Ich bin bereit, ich will von hier
      Und nach Jerusalem zu deinen Leiden gehn.
      Wohl mir, wenn ich die Wichtigkeit
      Von dieser Leid- und Sterbenszeit
      Zu meinem Troste kann durchgehends wohl verstehn!
  - num: 3
    type: Recitative
    voices: B
    instruments: Violino I/II, Viola, Continuo
    de: |-
      Mein Jesu, ziehe mich, so werd ich laufen,
      Denn Fleisch und Blut verstehet ganz und gar,
      Nebst deinen Jüngern nicht, was das gesaget war.
      Es sehnt sich nach der Welt und nach dem größten Haufen;
      Sie wollen beiderseits, wenn du verkläret bist,
      Zwar eine feste Burg auf Tabors Berge bauen;
      Hingegen Golgatha, so voller Leiden ist,
      In deiner Niedrigkeit mit keinem Auge schauen.
      Ach! kreuzige bei mir in der verderbten Brust
      Zuvörderst diese Welt und die verbotne Lust,
      So werd ich, was du sagst, vollkommen wohl verstehen
      Und nach Jerusalem mit tausend Freuden gehen.
  - num: 4
    type: Aria
    voices: T
    instruments: Violino I/II, Viola, Continuo
    de: |-
      Mein alles in allem, mein ewiges Gut,
      Verbessre das Herze, verändre den Mut;
      Schlag alles darnieder,
      Was dieser Entsagung des Fleisches zuwider!
      Doch wenn ich nun geistlich ertötet da bin,
      So ziehe mich nach dir in Friede dahin!
  - num: 5
    type: Chorale
    voices: SATB
    instruments: Oboe, Violino I/II, Viola, Continuo
    de: |-
      Ertöt uns durch dein Güte,
      Erweck uns durch dein Gnad;
      Den alten Menschen kränke,
      Dass der neu' leben mag
      Wohl hie auf dieser Erden,
      Den Sinn und all Begehren
      Und G'danken hab'n zu dir.
scoring: 'Soli: A T B, Coro: S A T B, Oboe, Violino I/II, Viola, Continuo'
