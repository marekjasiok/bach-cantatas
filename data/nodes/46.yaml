wiki:
  summary: "Schauet doch und sehet, ob irgend ein Schmerz sei, BWV\_46, is a church cantata by Johann Sebastian Bach. He composed it for the tenth Sunday after Trinity and it was first performed on 1 August 1723 in Leipzig."
  image: https://upload.wikimedia.org/wikipedia/commons/thumb/0/0d/Thomaskirche-1885.png/330px-Thomaskirche-1885.png
  url: https://en.wikipedia.org/wiki/Schauet_doch_und_sehet%2C_ob_irgend_ein_Schmerz_sei%2C_BWV_46
  summary_html: "<p><i><b><span><i lang=\"de\">Schauet doch und sehet, ob irgend ein Schmerz sei</i></span></b></i>, <b><abbr>BWV</abbr><span class=\"nowrap\">\_</span>46</b>, is a church cantata by Johann Sebastian Bach. He composed it for the tenth Sunday after Trinity and it was first performed on 1 August 1723 in Leipzig.</p>"
