wiki:
  summary: >-
    Johann Sebastian Bach composed the church cantata Falsche Welt, dir trau ich nicht, BWV 52, in Leipzig for the 23rd
    Sunday after Trinity. He led the first performance of the solo cantata for soprano on 24 November 1726.
  image: >-
    https://upload.wikimedia.org/wikipedia/commons/thumb/4/46/The_Tribute_Money_%281516%29_-_Tizian_%28Gem%C3%A4ldegalerie_Alte_Meister%2C_Dresden%29.jpg/330px-The_Tribute_Money_%281516%29_-_Tizian_%28Gem%C3%A4ldegalerie_Alte_Meister%2C_Dresden%29.jpg
  url: https://en.wikipedia.org/wiki/Falsche_Welt%2C_dir_trau_ich_nicht%2C_BWV_52
  summary_html: >-
    <p>Johann Sebastian Bach composed the church cantata <i><b><span><i lang="de">Falsche Welt, dir trau ich
    nicht</i></span></b></i>, <b><span class="nowrap">BWV 52</span></b>, in Leipzig for the 23rd Sunday after Trinity.
    He led the first performance of the solo cantata for soprano on 24 November 1726.</p>
