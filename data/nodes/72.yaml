  url: https://en.wikipedia.org/wiki/Alles_nur_nach_Gottes_Willen%2C_BWV_72
  summary_html: "<p><b><span><i lang=\"de\">Alles nur nach Gottes Willen</i></span></b>, <b><abbr>BWV</abbr><span class=\"nowrap\">\_</span>72</b>, is a church cantata by Johann Sebastian Bach. He composed it in Leipzig in 1726 for the third Sunday after Epiphany and first performed it on 27 January 1726. It is part of his third cantata cycle and concluded the Christmas season. Bach later used the opening chorus for the Gloria of his Missa in G minor, BWV 235.</p>"
key: G minor
