wiki:
  summary: "Alles nur nach Gottes Willen, BWV\_72, is a church cantata by Johann Sebastian Bach. He composed it in Leipzig in 1726 for the third Sunday after Epiphany and first performed it on 27 January 1726. It is part of his third cantata cycle and concluded the Christmas season. Bach later used the opening chorus for the Gloria of his Missa in G minor, BWV 235."
