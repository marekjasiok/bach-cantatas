descriptions:
  Advent I: First Sunday of Advent — the beginning of the church year, anticipating Christ's coming.
  Advent II: Second Sunday of Advent — reflection on the signs of the last days.
  Advent III: Third Sunday of Advent (Gaudete) — a Sunday of joy amid the penitential season.
  Advent IV: Fourth Sunday of Advent — the final preparation before Christmas.
  Christmas Day: The Feast of the Nativity — the principal feast celebrating the Incarnation.
  Christmas 2: Second Day of Christmas (St. Stephen's Day) — honouring the first martyr.
  Christmas 3: Third Day of Christmas (St. John's Day) — honouring the beloved disciple.
  New Year: Feast of the Circumcision — the naming of Jesus, eight days after Christmas.
  Epiphany: The manifestation of Christ to the Gentiles — the visit of the Magi.
  Purification: Candlemas — the presentation of Christ at the Temple, 40 days after Christmas.
  Annunciation: The angel Gabriel announces to Mary that she will bear the Son of God.
  Septuagesima: Seventy days before Easter — the pre-Lenten season begins.
  Sexagesima: Sixty days before Easter — themes of the Word of God as seed.
  Estomihi: The Sunday before Ash Wednesday — the last Sunday before Lent.
  Invocavit: First Sunday of Lent — Christ's temptation in the wilderness.
  Reminiscere: Second Sunday of Lent — remembering God's mercy and compassion.
  Oculi: Third Sunday of Lent — "My eyes are ever toward the Lord."
  Laetare: Fourth Sunday of Lent — a day of rejoicing amid the Lenten fast.
  Judica: Fifth Sunday of Lent (Passion Sunday) — Christ's suffering draws near.
  Palm Sunday: The triumphal entry of Christ into Jerusalem — Holy Week begins.
  Good Friday: The Crucifixion of our Lord — the most solemn day of the church year. In Leipzig, the Passion was performed during Vespers.
  Easter Sunday: The Resurrection of our Lord — the most joyful feast of the church year.
  Easter Monday: The second day of Easter — continuing the celebration of the Resurrection.
  Easter Tuesday: The third day of Easter — the Emmaus road encounter.
  Quasimodogeniti: '"As newborn babes, desire the pure milk of the Word" — the first Sunday after Easter.'
  Misericordias Domini: '"The earth is full of the goodness of the Lord" — the Good Shepherd Sunday.'
  Jubilate: '"Make a joyful noise unto the Lord, all the earth" — the third Sunday after Easter.'
  Cantate: '"O sing unto the Lord a new song" — the fourth Sunday after Easter.'
  Rogate: The Sunday of prayer before Ascension — "Ask, and you shall receive."
  Ascension: Christ ascends to heaven forty days after Easter.
  Exaudi: '"Hear, O Lord" — the Sunday after Ascension, awaiting the Holy Spirit.'
  Pentecost: The descent of the Holy Spirit upon the apostles — the birthday of the Church.
  Trinity: Trinity Sunday — celebrating the mystery of the Triune God.
  St. John's: Feast of St. John the Baptist (Jun 24) — the forerunner of Christ.
  Visitation: The Visitation of Mary to Elizabeth — "My soul magnifies the Lord."
  St. Michael's: Michaelmas — the feast of St. Michael and All Angels.
  Reformation: Reformation Day (Oct 31) — commemorating Luther's 95 Theses of 1517.
  Ratswahl: Council inauguration (Ratswechsel) — the annual ceremony installing Leipzig's new town council, held at the Nikolaikirche on the Monday after St. Bartholomew's Day.

